# Church of the Holy Comforter - Episcopal COA
# Realistic Episcopal parish with CPF and diocesan assessment
church_id: holy_comforter
church_name: Church of the Holy Comforter
denomination_type: EPISCOPAL
fiscal_year: 2026
fiscal_year_start: 2026-01-01

# Capitalization threshold
capitalisation_threshold_usd: "2500"

# Clergy allowance (Episcopal rector)
parsonage_allowance_current_year: "42000"
parsonage_allowance_used_ytd: "21000"

# Funds
funds:
  - fund_id: GEN
    fund_name: General Operating
    fund_category: GENERAL_OPERATING
    restriction_class: WITHOUT_RESTRICTION
    purpose_description: Day-to-day ministry and operations
    expenditure_rules: Unrestricted - any operating expense
    current_balance: "120000"

  - fund_id: BLDG
    fund_name: Building Fund
    fund_category: CAPITAL_CAMPAIGN
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: Capital improvements and restoration
    expenditure_rules: Building improvements only
    current_balance: "185000"

  - fund_id: MISS
    fund_name: World Relief
    fund_category: TEMP_RESTRICTED_PURPOSE
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: International mission support
    expenditure_rules: Vetted charitable organizations only
    current_balance: "35000"

  - fund_id: RECTOR
    fund_name: Rector's Discretionary
    fund_category: BOARD_DESIGNATED
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: Emergency assistance at rector's discretion
    expenditure_rules: IRS Form 8282 required; charitable purposes
    current_balance: "5000"

  - fund_id: ENDOW
    fund_name: Endowment Fund
    fund_category: PERMANENTLY_RESTRICTED
    restriction_class: WITH_RESTRICTION_PERMANENT
    purpose_description: Permanent capital; income supports operations
    expenditure_rules: Income only; 4% annual distribution
    current_balance: "350000"

