# Grace United Methodist Church - Sample COA
# Realistic UMC church with multi-fund structure
church_id: grace_umc
church_name: Grace United Methodist Church
denomination_type: UMC
fiscal_year: 2026
fiscal_year_start: 2026-01-01

# Capitalization threshold
capitalisation_threshold_usd: "2500"

# Clergy allowance (UMC parsonage)
parsonage_allowance_current_year: "36000"
parsonage_allowance_used_ytd: "18500"

# Funds
funds:
  - fund_id: GEN
    fund_name: General Operating
    fund_category: GENERAL_OPERATING
    restriction_class: WITHOUT_RESTRICTION
    purpose_description: Day-to-day ministry and operations
    expenditure_rules: Unrestricted - any operating expense
    current_balance: "85000"

  - fund_id: BLDG
    fund_name: Building Fund
    fund_category: CAPITAL_CAMPAIGN
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: Capital improvements to facilities
    expenditure_rules: Construction, major HVAC, capital equipment only
    current_balance: "142000"

  - fund_id: MISS
    fund_name: World Missions Fund
    fund_category: TEMP_RESTRICTED_PURPOSE
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: Support of missionaries and mission organizations
    expenditure_rules: Pass-through to registered missionary organizations
    current_balance: "28500"

  - fund_id: YOUTH
    fund_name: Youth Ministry Fund
    fund_category: TEMP_RESTRICTED_PURPOSE
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: Youth retreats, materials, scholarships
    expenditure_rules: Youth ministry expenses only (ministry_area=YOUTH)
    current_balance: "9750"

  - fund_id: BENEV
    fund_name: Pastor's Benevolence Fund
    fund_category: BOARD_DESIGNATED
    restriction_class: WITH_RESTRICTION_PURPOSE
    purpose_description: Aid to individuals in need
    expenditure_rules: IRS substantiation required; pastor discretion
    current_balance: "4200"

  - fund_id: ENDOW
    fund_name: Smith Endowment
    fund_category: PERMANENTLY_RESTRICTED
    restriction_class: WITH_RESTRICTION_PERMANENT
    purpose_description: Principal preserved; income funds music ministry
    expenditure_rules: Income only; principal never spent
    current_balance: "250000"

