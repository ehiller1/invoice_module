<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pledge Matching — Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399', 100: '#dbe7f5' },
            gold: { 500: '#c9a227', 400: '#d4ad3a' },
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/eime-bus.js"></script>
  <script src="/eime-chat-rail.js"></script>
  <script src="/eime-shell.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans">

<template id="page-center-content">
  <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between flex-shrink-0">
    <div>
      <h1 class="text-lg font-semibold text-slate-800">Pledge → Gift Matching</h1>
      <p class="text-sm text-slate-500">Match pledges to gift receipts and track fulfillment status.</p>
    </div>
    <div class="flex items-center gap-3">
      <select id="church-selector" onchange="loadMatches()" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white text-slate-700 focus:ring-2 focus:ring-navy-600 outline-none"></select>
      <button onclick="createPledge()" class="text-sm px-3 py-2 bg-navy-700 text-white rounded-lg hover:bg-navy-600">+ New Pledge</button>
      <button onclick="loadMatches()" class="text-sm text-navy-700 hover:underline">Refresh</button>
    </div>
  </header>

  <div class="flex flex-col h-full">
    <!-- Stats -->
    <div class="px-8 py-6 border-b border-slate-200 bg-blue-50">
      <div class="grid grid-cols-4 gap-4">
        <div>
          <p class="text-xs text-slate-600 font-medium">Total Pledges</p>
          <p class="text-2xl font-bold text-navy-700" id="stat-total">—</p>
        </div>
        <div>
          <p class="text-xs text-slate-600 font-medium">Matched Gifts</p>
          <p class="text-2xl font-bold text-green-600" id="stat-matched">—</p>
        </div>
        <div>
          <p class="text-xs text-slate-600 font-medium">Pending</p>
          <p class="text-2xl font-bold text-amber-600" id="stat-pending">—</p>
        </div>
        <div>
          <p class="text-xs text-slate-600 font-medium">Partial</p>
          <p class="text-2xl font-bold text-red-600" id="stat-partial">—</p>
        </div>
      </div>
    </div>

    <!-- Matching Table -->
    <div class="overflow-y-auto flex-1 px-8 py-6">
      <div class="space-y-4">
        <div class="bg-white border border-slate-200 rounded-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-slate-50 border-b border-slate-200">
              <tr>
                <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Donor</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Pledge Amount</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Gift Received</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Status</th>
                <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Match Quality</th>
              </tr>
            </thead>
            <tbody id="pledge-table-body" class="divide-y divide-slate-200">
              <tr><td colspan="5" class="px-4 py-8 text-center text-sm text-slate-500">Loading pledges…</td></tr>
            </tbody>
          </table>
        </div>

        <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
          <h3 class="font-semibold text-amber-900 text-sm mb-2">📋 Matching Rules</h3>
          <ul class="text-sm text-amber-800 space-y-1">
            <li>• Automatic matching: Same donor, ±5% amount variance, within 12 months</li>
            <li>• Partial matches tracked for accountability and follow-up</li>
            <li>• Unfulfilled pledges flagged after 18 months for stewardship outreach</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</template>

<script>
let activeChurch = null;

async function init() {
  await EIMEShell.mount({
    activeNav: 'giving',
    pageTitle: 'Pledge Matching',
    centerContent: document.getElementById('page-center-content').innerHTML
  });

  const churches = await fetch('/api/churches').then(r => r.json());
  const sel = document.getElementById('church-selector');
  sel.innerHTML = churches.map(c => `<option value="${c.church_id}">${c.church_name||c.church_id}</option>`).join('');
  if (churches.length) {
    // Prefer the user's session church if it's in the list; else first.
    const _ses = (window.EIMESession && EIMESession.getChurch()) || null;
    const _match = _ses ? churches.find(c => c.church_id === _ses) : null;
    activeChurch = (_match && _match.church_id) || churches[0].church_id;
    sel.value = activeChurch;
    window.eime.setContext({
      page: 'pledge-matching',
      payload: { church_id: activeChurch }
    });
    await loadMatches();
    // Keep the dropdown in sync if the user changes church via the sidebar chip.
    if (window.EIMESession && typeof EIMESession.onChange === 'function') {
      EIMESession.onChange(() => {
        const c = EIMESession.getChurch();
        if (c && c !== activeChurch) {
          const sel = document.getElementById('church-selector');
          if (sel && Array.from(sel.options).some(o => o.value === c)) {
            sel.value = c;
          }
          activeChurch = c;
          // Refresh the current view without re-entering the church-set loop.
          const refresh = window.loadMatches || window.loadJobs || window.loadAccruals || window.loadCompliance || window.loadKb;
          if (refresh) refresh();
        }
      });
    }
  }
}

async function loadMatches() {
  activeChurch = document.getElementById('church-selector').value;

  if (window.EIMESession && activeChurch) EIMESession.setChurch(activeChurch);
  window.eime.setContext({
    page: 'pledge-matching',
    payload: { church_id: activeChurch }
  });
  try {
    const res = await fetch(`/api/pledges/matches?church_id=${activeChurch}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderMatches(data.matches || [], data.summary || {});
  } catch (e) {
    console.error('Error loading pledges:', e);
    document.getElementById('pledge-table-body').innerHTML =
      '<tr><td colspan="5" class="px-4 py-8 text-center text-sm text-red-600">Error loading pledges: ' + e.message + '</td></tr>';
  }
}

function renderMatches(matches, summary) {
  document.getElementById('stat-total').textContent = summary.total ?? matches.length;
  document.getElementById('stat-matched').textContent = summary.matched ?? matches.filter(m => m.status === 'matched').length;
  document.getElementById('stat-pending').textContent = summary.pending ?? matches.filter(m => m.status === 'pending').length;
  document.getElementById('stat-partial').textContent = summary.partial ?? matches.filter(m => m.status === 'partial').length;

  const tbody = document.getElementById('pledge-table-body');
  if (!matches.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="px-4 py-8"><div class="text-center">
      <div class="text-5xl mb-3">🤝</div>
      <h3 class="text-lg font-semibold text-slate-800 mb-2">No Pledges Yet</h3>
      <p class="text-sm text-slate-600 mb-4">Track donor commitments and match them to actual gifts received.</p>
      <p class="text-sm text-slate-500">Pledges are commitments from donors to give funds in the future. When gifts are received, they're automatically matched to pledges and tracked for fulfillment.</p>
    </div></td></tr>`;
    return;
  }

  const statusColor = { matched: 'text-green-600 bg-green-50', partial: 'text-amber-600 bg-amber-50', pending: 'text-slate-500 bg-slate-50' };
  tbody.innerHTML = matches.map(m => {
    const pct = m.fulfillment_pct != null ? m.fulfillment_pct.toFixed(0) + '%' : '—';
    const sc = statusColor[m.status] || 'text-slate-600 bg-slate-50';
    return `<tr class="hover:bg-slate-50">
      <td class="px-4 py-3 text-sm text-slate-800">${m.donor_name || '—'}</td>
      <td class="px-4 py-3 text-sm text-slate-800">$${Number(m.pledge_amount || 0).toLocaleString()}</td>
      <td class="px-4 py-3 text-sm text-slate-800">$${Number(m.matched_amount || 0).toLocaleString()}</td>
      <td class="px-4 py-3"><span class="text-xs font-medium px-2 py-1 rounded ${sc}">${m.status || '—'}</span></td>
      <td class="px-4 py-3 text-sm text-slate-700">${pct}</td>
    </tr>`;
  }).join('');
}

async function createPledge() {
  const donor_name = prompt('Donor name:');
  if (!donor_name) return;
  const amountRaw = prompt(`Pledge amount (USD):`);
  const amount = parseFloat(amountRaw);
  if (!amount || amount <= 0) { alert('Amount must be a positive number.'); return; }
  const purpose = prompt('Purpose (e.g., "Annual fund 2026", "Capital campaign"):', 'Annual fund');
  if (!purpose) return;
  const today = new Date().toISOString().slice(0, 10);
  const pledge_date = prompt('Pledge date (YYYY-MM-DD):', today) || today;
  const pledge_id = 'pld-' + Math.random().toString(36).slice(2, 10);
  try {
    const res = await fetch('/api/pledges', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pledge_id, donor_name, amount, purpose, pledge_date }),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    alert(`Pledge from ${donor_name} for $${amount.toLocaleString()} recorded.`);
    loadMatches();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
window.createPledge = createPledge;
window.loadMatches = loadMatches;

init();
</script>

</body>
</html>
