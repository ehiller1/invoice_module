<!DOCTYPE html>
<html>
<head>
<title>Journal Entries — Books</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-4">Journal Entries</h1>

  <div class="border-b mb-4 flex items-center justify-between gap-4">
    <nav class="flex gap-4 overflow-x-auto flex-1 min-w-0">
      <button class="je-tab flex-shrink-0" data-state="DRAFT">Drafts <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
      <button class="je-tab flex-shrink-0" data-state="OPEN">In Review <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
      <button class="je-tab flex-shrink-0" data-state="PENDING_TREASURER">Awaiting Treasurer <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
      <button class="je-tab flex-shrink-0" data-state="APPROVED">Approved <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
      <button class="je-tab flex-shrink-0" data-state="POSTED">Recorded <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
      <button class="je-tab flex-shrink-0" data-state="REJECTED">Rejected <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
      <button class="je-tab flex-shrink-0" data-state="RECURRING">Recurring <span class="je-tab-count ml-1 bg-slate-200 text-slate-700 text-xs rounded-full px-1.5"></span></button>
    </nav>
    <div class="flex gap-2">
      <input id="csv-file-input" type="file" accept=".csv" class="hidden" />
      <button id="csv-import-btn" class="px-3 py-1.5 text-sm rounded bg-indigo-600 text-white hover:bg-indigo-700">Import CSV</button>
    </div>
  </div>

  <div id="je-list" class="space-y-3"></div>
  <div id="csv-result" class="mt-4"></div>

  <!-- Create Recurring Schedule Button (shown only on RECURRING tab) -->
  <div id="recurring-header" class="hidden mt-4 flex justify-end">
    <button onclick="showCreateRecurringModal()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">+ Create Recurring Schedule</button>
  </div>
</div>

<!-- Create Recurring Schedule Modal -->
<div id="create-recurring-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
    <h2 class="text-2xl font-bold text-slate-900 mb-4">Create Recurring Schedule</h2>
    <div class="space-y-4 mb-6">
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1 block">Description/Memo</label>
        <input type="text" id="rec-memo" class="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="e.g., Monthly rent payment" />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-1 block">Debit Account</label>
          <input type="text" id="rec-debit" class="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="account number" />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-1 block">Credit Account</label>
          <input type="text" id="rec-credit" class="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="account number" />
        </div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-1 block">Amount</label>
          <input type="number" id="rec-amount" class="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="0.00" step="0.01" />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-1 block">Fund (optional)</label>
          <input type="text" id="rec-fund" class="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="fund_id" />
        </div>
      </div>
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1 block">Cron Schedule</label>
        <input type="text" id="rec-cron" class="w-full px-3 py-2 border border-slate-300 rounded-lg" placeholder="e.g., 0 2 1 * * (2 AM on 1st of month)" value="0 2 1 * *" />
        <p class="text-xs text-slate-500 mt-1">5-field cron: minute hour day month dayofweek</p>
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="closeCreateRecurringModal()" class="flex-1 px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Cancel</button>
      <button onclick="saveRecurringSchedule()" class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Create</button>
    </div>
  </div>
</div>

<!-- FR-NF: ACS confirmation gate modal -->
<div id="acs-confirm-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center" role="dialog" aria-modal="true" aria-labelledby="acs-confirm-title">
  <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4 p-6">
    <h2 id="acs-confirm-title" class="text-xl font-bold text-red-700 mb-2 flex items-center gap-2">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
      Confirm ACS Realm Posting
    </h2>
    <p class="text-gray-700 mb-3">You are about to post journal entry <code id="acs-confirm-jeid" class="font-mono bg-gray-100 px-1 rounded"></code> to the live ACS Realm system.</p>
    <ul class="text-sm text-gray-600 mb-4 list-disc ml-5 space-y-1">
      <li>This action runs browser automation against the live ACS system.</li>
      <li>This action <strong>cannot be undone</strong>.</li>
      <li>The journal entry will be permanently recorded.</li>
      <li>Only the treasurer is authorized to take this action.</li>
    </ul>
    <label class="flex items-start gap-2 mb-4 text-sm">
      <input id="acs-confirm-checkbox" type="checkbox" class="mt-0.5" />
      <span>I am the treasurer authorizing this post and I understand it cannot be undone.</span>
    </label>
    <div class="flex justify-end gap-2">
      <button id="acs-cancel-btn" class="px-4 py-2 text-sm rounded bg-gray-200 text-gray-800 hover:bg-gray-300">Cancel</button>
      <button id="acs-confirm-btn" class="px-4 py-2 text-sm rounded bg-red-600 text-white hover:bg-red-700 disabled:bg-red-300 disabled:cursor-not-allowed" disabled>Post to ACS</button>
    </div>
  </div>
</div>
</template>

<script>
let currentChurch = (window.EIMESession && EIMESession.getChurch()) || 'holy_comforter';
let currentRole = 'TREASURER_ADMIN';  // TODO: read from /api/me

EIMEShell.mount({
  activeNav: 'jobs',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'jes',
      payload: { church_id: currentChurch, state: 'DRAFT' }
    });
    setupTabs();
  }
});

function setupTabs() {
  document.querySelectorAll('.je-tab').forEach(tab => {
    tab.className = 'je-tab flex-shrink-0 px-3 py-2 text-sm font-medium border-b-2 border-transparent';
    tab.addEventListener('click', () => {
      document.querySelectorAll('.je-tab').forEach(t => t.classList.remove('border-blue-500', 'text-blue-600'));
      tab.classList.add('border-blue-500', 'text-blue-600');
      const state = tab.dataset.state;
      window.eime.setContext({
        page: 'jes',
        payload: { church_id: currentChurch, state: state }
      });
      if (state === 'RECURRING') {
        loadRecurring();
      } else {
        loadJes(state);
      }
    });
  });
  document.querySelector('.je-tab[data-state="DRAFT"]').click();
  setupCsvImport();
}

function setupCsvImport() {
  const btn = document.getElementById('csv-import-btn');
  const input = document.getElementById('csv-file-input');
  const resultBox = document.getElementById('csv-result');
  if (!btn || !input) return;
  btn.addEventListener('click', () => input.click());
  input.addEventListener('change', async () => {
    const file = input.files && input.files[0];
    if (!file) return;
    resultBox.innerHTML = '<div class="text-gray-500">Uploading...</div>';
    const fd = new FormData();
    fd.append('file', file);
    fd.append('church_id', currentChurch);
    try {
      const res = await fetch('/api/jes/import-csv', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Import failed');
      const errsHtml = (data.errors && data.errors.length)
        ? `<details class="mt-2"><summary class="cursor-pointer text-red-600">${data.errors.length} row error(s)</summary>
            <ul class="list-disc ml-6 text-sm text-red-600">${data.errors.map(e => `<li>${typeof e === 'string' ? e : (e.error || JSON.stringify(e))}</li>`).join('')}</ul>
          </details>`
        : '';
      resultBox.innerHTML = `
        <div class="border border-green-200 bg-green-50 text-green-800 rounded p-3">
          Imported ${data.drafted_count || 0} JEs from <code>${file.name}</code>.
          ${errsHtml}
        </div>`;
      // Refresh draft list.
      const draftTab = document.querySelector('.je-tab[data-state="DRAFT"]');
      if (draftTab) draftTab.click();
    } catch (err) {
      resultBox.innerHTML = `<div class="border border-red-200 bg-red-50 text-red-700 rounded p-3">Error: ${err.message}</div>`;
    } finally {
      input.value = '';
    }
  });
}

async function loadRecurring() {
  const list = document.getElementById('je-list');
  const header = document.getElementById('recurring-header');
  header.classList.remove('hidden');
  list.innerHTML = '<div class="text-gray-500">Loading recurring schedules...</div>';
  try {
    const url = `/api/jes/recurring?church_id=${encodeURIComponent(currentChurch)}`;
    const res = await fetch(url);
    const items = await res.json();
    if (!Array.isArray(items) || !items.length) {
      list.innerHTML = '<div class="text-gray-500 italic">No recurring schedules configured.</div>';
      return;
    }
    list.innerHTML = items.map(renderRecurringCard).join('');
  } catch (e) {
    list.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

function renderRecurringCard(rec) {
  const tpl = rec.template_je || {};
  const memo = tpl.description || tpl.memo || '(no memo)';
  const cron = rec.schedule_cron || '';
  const next = rec.next_run ? new Date(rec.next_run).toLocaleString() : '—';
  const last = rec.last_drafted_at ? new Date(rec.last_drafted_at).toLocaleString() : 'never';
  const draftCount = rec.draft_count || 0;
  const activeBadge = rec.active
    ? '<span class="px-2 py-0.5 text-xs rounded bg-green-100 text-green-700">ACTIVE</span>'
    : '<span class="px-2 py-0.5 text-xs rounded bg-gray-200 text-gray-600">PAUSED</span>';
  return `
    <div class="border rounded-lg p-4 bg-white shadow-sm">
      <div class="flex justify-between items-start">
        <div>
          <div class="text-sm text-gray-500">${rec.recurring_id} · cron <code>${cron}</code></div>
          <div class="font-semibold">${memo} ${activeBadge}</div>
          <div class="text-xs text-gray-500 mt-1">Next: ${next} · Last: ${last} · Drafted ${draftCount}×</div>
        </div>
        <div class="flex gap-2">
          <button class="rec-action px-3 py-1 text-sm rounded bg-yellow-100 text-yellow-800" data-rec="${rec.recurring_id}" data-action="toggle" data-active="${rec.active}">${rec.active ? 'Pause' : 'Resume'}</button>
          <button class="rec-action px-3 py-1 text-sm rounded bg-blue-100 text-blue-700" data-rec="${rec.recurring_id}" data-action="edit-cron" data-cron="${cron}">Edit cron</button>
          <button class="rec-action px-3 py-1 text-sm rounded bg-red-100 text-red-700" data-rec="${rec.recurring_id}" data-action="delete">Delete</button>
        </div>
      </div>
    </div>`;
}

document.addEventListener('click', async (e) => {
  if (!e.target.classList.contains('rec-action')) return;
  const rid = e.target.dataset.rec;
  const action = e.target.dataset.action;
  let body = null;
  let method = 'PUT';
  if (action === 'toggle') {
    body = { active: e.target.dataset.active !== 'true' };
  } else if (action === 'edit-cron') {
    const next = prompt('5-field cron expression:', e.target.dataset.cron || '0 2 1 * *');
    if (!next) return;
    body = { schedule_cron: next };
  } else if (action === 'delete') {
    if (!confirm(`Delete recurring schedule ${rid}? This cannot be undone.`)) return;
    method = 'DELETE';
  } else {
    return;
  }
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`/api/jes/recurring/${encodeURIComponent(rid)}`, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Update failed');
    loadRecurring();
  } catch (err) {
    alert('Error: ' + err.message);
  }
});

async function loadJes(state) {
  const list = document.getElementById('je-list');
  list.innerHTML = '<div class="text-gray-500">Loading...</div>';
  try {
    const url = `/api/jes?church_id=${encodeURIComponent(currentChurch)}&status=${encodeURIComponent(state)}`;
    const res = await fetch(url);
    const jes = await res.json();
    if (!jes.length) {
      list.innerHTML = '<div class="text-gray-500 italic">No journal entries in this state.</div>';
      return;
    }
    list.innerHTML = jes.map(je => renderJeCard(je, state)).join('');
  } catch (e) {
    list.innerHTML = `<div class="text-red-500">Error: ${e.message}</div>`;
  }
}

function lineDebit(l) {
  return parseFloat(l.debit ?? l.debit_amount ?? 0) || 0;
}
function lineCredit(l) {
  return parseFloat(l.credit ?? l.credit_amount ?? 0) || 0;
}

const RECOG_LABELS = {
  cash_basis:        { label: 'Recognize at Receipt',     color: 'bg-green-100 text-green-800' },
  deferred:          { label: 'Defer — Multi-Period',      color: 'bg-blue-100 text-blue-800'  },
  restricted:        { label: 'Restricted — Hold',         color: 'bg-purple-100 text-purple-800' },
  conditional_grant: { label: 'Conditional Grant',         color: 'bg-orange-100 text-orange-800' },
  pledge:            { label: 'Pledge — Recognize Ratably', color: 'bg-yellow-100 text-yellow-800' },
};

async function classifyRevenue(jeId) {
  const API = (window.EIME_API ?? '');
  const badge = document.getElementById(`rev-badge-${jeId}`);
  if (badge) badge.innerHTML = '<p class="text-xs text-gray-400 mt-1 animate-pulse">Classifying…</p>';

  try {
    // Find the JE in the currently loaded list
    const card = document.getElementById(`je-card-${jeId}`);
    const lines = [];
    if (card) {
      card.querySelectorAll('[data-account]').forEach(el => {
        lines.push({ account_number: el.dataset.account, debit: parseFloat(el.dataset.debit || 0), credit: parseFloat(el.dataset.credit || 0) });
      });
    }
    const res = await fetch(`${API}/api/jes/classify-recognition`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entry_id: jeId, lines, church_id: currentChurch || 'holy_comforter' }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const style = RECOG_LABELS[data.classification] || { label: data.label || data.classification, color: 'bg-gray-100 text-gray-700' };
    const conf = data.confidence != null ? `${(data.confidence * 100).toFixed(0)}%` : '';
    const signals = data.signals || {};
    const signalTags = Object.entries(signals)
      .filter(([k, v]) => v === true)
      .map(([k]) => k.replace(/_/g, ' '))
      .join(' · ');
    if (badge) badge.innerHTML = `
      <div class="mt-2 p-2 rounded border border-gray-100 bg-gray-50">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="px-2 py-0.5 rounded text-xs font-semibold ${style.color}">${style.label}</span>
          ${conf ? `<span class="text-xs text-gray-400">${conf} confidence</span>` : ''}
          ${signalTags ? `<span class="text-xs text-gray-400">· ${signalTags}</span>` : ''}
        </div>
        <p class="text-xs text-gray-500 mt-1">${data.reasoning || ''}</p>
        <p class="text-xs text-gray-400 mt-0.5 italic">${data.reference || ''}</p>
      </div>`;
  } catch (err) {
    if (badge) badge.innerHTML = `<p class="text-xs text-red-500 mt-1">Classification failed: ${err.message}</p>`;
  }
}

function renderJeCard(je, state) {
  const lines = je.lines || [];
  const totalDebit = lines.reduce((s, l) => s + lineDebit(l), 0);
  const actions = [];
  if (state === 'DRAFT') actions.push({ label: 'Submit for Review', toState: 'OPEN', role: currentRole });
  if (state === 'OPEN') actions.push({ label: 'Send to Treasurer', toState: 'PENDING_TREASURER', role: currentRole });
  if (state === 'PENDING_TREASURER') {
    actions.push({ label: 'Approve &amp; Send', toState: 'APPROVED', role: currentRole });
    actions.push({ label: 'Reject', toState: 'REJECTED', role: currentRole });
  }
  if (state === 'APPROVED') {
    actions.push({ label: 'Create Payment', toState: null, role: currentRole, isPayment: true });
    actions.push({ label: 'Record in ACS', toState: 'POSTED', role: currentRole, isPost: true });
  }

  const memoText = je.description || je.memo || 'Journal Entry';

  // Show "Classify Revenue" button on DRAFT JEs that have revenue lines (4xxx accounts)
  const hasRevLine = lines.some(l => String(l.account_number || '').startsWith('4'));
  const revClassifyBtn = (state === 'DRAFT' && hasRevLine)
    ? `<button onclick="classifyRevenue('${je.entry_id}')"
         class="px-3 py-1 text-sm rounded bg-amber-100 text-amber-800 hover:bg-amber-200 transition-colors">
         Classify Revenue
       </button>`
    : '';

  return `
    <div class="border rounded-lg p-4 bg-white shadow-sm" id="je-card-${je.entry_id}">
      <div class="flex justify-between items-start">
        <div>
          <div class="text-sm text-gray-500">${je.entry_id} · ${je.entry_date || 'No date'}</div>
          <div class="font-semibold">${memoText}</div>
        </div>
        <div class="text-lg font-bold">$${totalDebit.toFixed(2)}</div>
      </div>
      <div id="rev-badge-${je.entry_id}"></div>
      <div class="mt-3 text-sm">
        ${lines.slice(0, 3).map(l => {
          const dr = lineDebit(l), cr = lineCredit(l);
          const amt = dr > 0 ? dr : cr;
          return `
          <div class="flex justify-between text-gray-600">
            <span>${l.account_number || ''} · ${l.fund_id || ''}</span>
            <span>${dr > 0 ? 'Dr' : 'Cr'} $${amt.toFixed(2)}</span>
          </div>`;
        }).join('')}
        ${lines.length > 3 ? `<div class="text-gray-400">+${lines.length - 3} more lines</div>` : ''}
      </div>
      <div class="mt-3 flex gap-2 flex-wrap">
        ${revClassifyBtn}
        ${actions.map(a => `<button class="je-action px-3 py-1 text-sm rounded ${a.isPost ? 'bg-green-600 text-white' : a.isPayment ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}" data-je="${je.entry_id}" data-state="${a.toState}" data-ispost="${a.isPost || false}" data-ispayment="${a.isPayment || false}">${a.label}</button>`).join('')}
      </div>
    </div>
  `;
}

// FR-NF: ACS confirmation gate modal helper. Returns Promise<boolean>.
function openAcsConfirmModal(jeId) {
  return new Promise(resolve => {
    const modal = document.getElementById('acs-confirm-modal');
    const idEl = document.getElementById('acs-confirm-jeid');
    const checkbox = document.getElementById('acs-confirm-checkbox');
    const confirmBtn = document.getElementById('acs-confirm-btn');
    const cancelBtn = document.getElementById('acs-cancel-btn');
    if (!modal || !idEl || !checkbox || !confirmBtn || !cancelBtn) {
      // Fallback to native confirm if modal is missing for any reason.
      resolve(window.confirm(`Post JE ${jeId} to ACS Realm? This cannot be undone.`));
      return;
    }
    idEl.textContent = jeId;
    checkbox.checked = false;
    confirmBtn.disabled = true;
    modal.classList.remove('hidden');

    function cleanup(result) {
      modal.classList.add('hidden');
      checkbox.removeEventListener('change', onCheck);
      confirmBtn.removeEventListener('click', onConfirm);
      cancelBtn.removeEventListener('click', onCancel);
      modal.removeEventListener('click', onBackdrop);
      document.removeEventListener('keydown', onKey);
      resolve(result);
    }
    function onCheck() { confirmBtn.disabled = !checkbox.checked; }
    function onConfirm() { if (checkbox.checked) cleanup(true); }
    function onCancel() { cleanup(false); }
    function onBackdrop(ev) { if (ev.target === modal) cleanup(false); }
    function onKey(ev) { if (ev.key === 'Escape') cleanup(false); }

    checkbox.addEventListener('change', onCheck);
    confirmBtn.addEventListener('click', onConfirm);
    cancelBtn.addEventListener('click', onCancel);
    modal.addEventListener('click', onBackdrop);
    document.addEventListener('keydown', onKey);
  });
}

document.addEventListener('click', async (e) => {
  if (!e.target.classList.contains('je-action')) return;
  const jeId = e.target.dataset.je;
  const toState = e.target.dataset.state;
  const isPost = e.target.dataset.ispost === 'true';
  const isPayment = e.target.dataset.ispayment === 'true';

  if (isPayment) {
    e.target.disabled = true;
    e.target.textContent = 'Creating...';
    try {
      const res = await fetch(`/api/jes/${encodeURIComponent(jeId)}/payment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ je_id: jeId })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Payment creation failed');
      alert(`Payment created: ${data.payment_id}`);
      document.querySelector('.je-tab.border-blue-500').click();
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      e.target.disabled = false;
      e.target.textContent = 'Create Payment';
    }
    return;
  }

  if (isPost) {
    // FR-NF: ACS confirmation gate — explicit modal with checkbox attestation.
    const confirmed = await openAcsConfirmModal(jeId);
    if (!confirmed) return;
    e.target.disabled = true;
    e.target.textContent = 'Posting...';
    try {
      const res = await fetch(`/api/jes/${encodeURIComponent(jeId)}/post`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Role': 'TREASURER_ADMIN',
        },
        body: JSON.stringify({ confirmed: true }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Posting failed');
      alert(`Posted! ACS Reference: ${data.acs_reference}${data.mock ? ' (MOCK MODE)' : ''}`);
      document.querySelector('.je-tab.border-blue-500').click();
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      e.target.disabled = false;
    }
  } else {
    try {
      const res = await fetch(`/api/jes/${encodeURIComponent(jeId)}/transition`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to_state: toState, role: currentRole }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Transition failed');
      document.querySelector('.je-tab.border-blue-500').click();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }
});

function showCreateRecurringModal() {
  document.getElementById('rec-memo').value = '';
  document.getElementById('rec-debit').value = '';
  document.getElementById('rec-credit').value = '';
  document.getElementById('rec-amount').value = '';
  document.getElementById('rec-fund').value = '';
  document.getElementById('rec-cron').value = '0 2 1 * *';
  document.getElementById('create-recurring-modal').classList.remove('hidden');
}

function closeCreateRecurringModal() {
  document.getElementById('create-recurring-modal').classList.add('hidden');
}

async function saveRecurringSchedule() {
  const memo = document.getElementById('rec-memo').value.trim();
  const debit = document.getElementById('rec-debit').value.trim();
  const credit = document.getElementById('rec-credit').value.trim();
  const amount = parseFloat(document.getElementById('rec-amount').value);
  const fund = document.getElementById('rec-fund').value.trim() || null;
  const cron = document.getElementById('rec-cron').value.trim();

  if (!memo || !debit || !credit || !amount || !cron) {
    alert('Please fill in all required fields');
    return;
  }

  const payload = {
    description: memo,
    memo,
    schedule_cron: cron,
    template_je: {
      description: memo,
      debit_account: debit,
      credit_account: credit,
      amount,
      fund_id: fund
    }
  };

  try {
    const res = await fetch(`/api/jes/recurring?church_id=${encodeURIComponent(currentChurch)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('Recurring schedule created');
    closeCreateRecurringModal();
    loadRecurring();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
</script>
