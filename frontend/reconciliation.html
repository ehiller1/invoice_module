<!DOCTYPE html>
<html>
<head>
<title>EIME — Bank Reconciliation</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 mb-1">Bank Reconciliation</h1>
      <p class="text-slate-600">Match Plaid transactions to journal entries with fuzzy matching and exception analysis</p>
    </div>
    <div class="flex gap-2">
      <button onclick="syncPlaid()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
        Sync Plaid
      </button>
      <button onclick="autoMatch()" class="px-4 py-2 bg-navy-900 text-white rounded-lg hover:bg-navy-800">
        Auto-Match
      </button>
    </div>
  </div>

  <!-- Account Selector -->
  <div class="bg-white border border-slate-200 rounded-lg p-4 mb-6">
    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1 block">Bank Account</label>
        <select id="account-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none">
          <option value="">Loading accounts…</option>
        </select>
      </div>
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1 block">Period Start</label>
        <input type="date" id="period-start" class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
      </div>
      <div>
        <label class="text-sm font-semibold text-slate-700 mb-1 block">Period End</label>
        <input type="date" id="period-end" class="w-full px-3 py-2 border border-slate-300 rounded-lg" />
      </div>
    </div>
  </div>

  <!-- Bank Statement Upload Zone -->
  <div class="bg-white border border-slate-200 rounded-lg p-6 mb-6">
    <h2 class="text-lg font-semibold text-slate-900 mb-3">Upload Bank Statement</h2>
    <p class="text-sm text-slate-600 mb-4">Upload a CSV, OFX, or QFX statement to reconcile against your transactions</p>
    <div id="statement-upload-zone" class="border-2 border-dashed border-slate-300 rounded-lg p-8 text-center hover:border-navy-600 hover:bg-slate-50 transition-all cursor-pointer" onclick="document.getElementById('statement-file-input').click()">
      <svg class="w-8 h-8 text-slate-400 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
      </svg>
      <p class="text-slate-600 font-medium text-sm">Drop statement file here or click to browse</p>
      <p class="text-slate-400 text-xs mt-1">CSV, OFX, or QFX • Max 10 MB</p>
      <input type="file" id="statement-file-input" accept=".csv,.ofx,.qfx" class="hidden" onchange="uploadStatement()" />
    </div>
    <div id="upload-status" class="hidden mt-3 text-sm"></div>
  </div>

  <!-- Status Cards -->
  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Total Transactions</p>
      <p class="text-3xl font-bold text-slate-900" id="count-total">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Auto-Matched</p>
      <p class="text-3xl font-bold text-green-600" id="count-matched">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Exceptions</p>
      <p class="text-3xl font-bold text-orange-600" id="count-exceptions">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Variance</p>
      <p class="text-3xl font-bold text-slate-900" id="variance">$0</p>
    </div>
  </div>

  <!-- Reconciliation Summary -->
  <div class="grid grid-cols-5 gap-4 mb-6">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Opening Balance</p>
      <p class="text-2xl font-bold text-slate-900" id="opening-balance">$0.00</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Deposits</p>
      <p class="text-2xl font-bold text-emerald-600" id="total-deposits">$0.00</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Disbursements</p>
      <p class="text-2xl font-bold text-rose-600" id="total-disbursements">$0.00</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Closing Balance</p>
      <p class="text-2xl font-bold text-slate-900" id="closing-balance">$0.00</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Net Variance</p>
      <p class="text-2xl font-bold text-slate-900" id="net-variance">$0.00</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="border-b border-slate-200 mb-4">
    <div class="flex gap-4">
      <button onclick="switchTab('exceptions')" class="recon-tab active px-4 py-2 text-sm font-medium border-b-2 border-navy-600 text-navy-600">Exceptions</button>
      <button onclick="switchTab('matched')" class="recon-tab px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-600 hover:text-slate-900">Matched</button>
      <button onclick="switchTab('all')" class="recon-tab px-4 py-2 text-sm font-medium border-b-2 border-transparent text-slate-600 hover:text-slate-900">All Transactions</button>
    </div>
  </div>

  <!-- Transaction List -->
  <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
    <div id="transactions-list" class="divide-y divide-slate-200"></div>
  </div>

  <!-- Exception Modal -->
  <div id="exception-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4">Exception Analysis</h2>
      <div id="exception-content" class="space-y-4 mb-6"></div>
      <div class="flex gap-2">
        <button onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Close</button>
        <button id="create-je-btn" onclick="createCorrectiveJE()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Create Corrective JE</button>
      </div>
    </div>
  </div>
</div>
</template>

<script>
const API = 'http://localhost:8000';
let allTransactions = [];
let activeTab = 'exceptions';
let currentException = null;

EIMEShell.mount({
  activeNav: 'reconciliation',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'reconciliation',
      payload: { church_id: 'holy_comforter', account_id: null }
    });
    setDefaultDates();
    loadAccounts();
  }
});

function setDefaultDates() {
  const today = new Date();
  const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
  document.getElementById('period-start').value = lastMonth.toISOString().split('T')[0];
  document.getElementById('period-end').value = today.toISOString().split('T')[0];
}

async function loadAccounts() {
  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/plaid/accounts`);
    const accounts = await res.json();
    const select = document.getElementById('account-select');
    if (!accounts || accounts.length === 0) {
      select.innerHTML = '<option value="">No Plaid accounts linked</option>';
      document.getElementById('transactions-list').innerHTML = `
        <div class="px-6 py-12 text-center">
          <p class="text-slate-700 font-medium mb-2">No Bank Accounts Connected</p>
          <p class="text-sm text-slate-500 mb-4">Link a bank account via Plaid to start reconciliation</p>
          <a href="/settings/plaid-linking.html" class="inline-block px-4 py-2 bg-navy-900 text-white rounded-lg hover:bg-navy-800">Set Up Plaid →</a>
        </div>
      `;
      return;
    }
    select.innerHTML = accounts.map(a => `<option value="${a.account_id}">${a.name} (${a.mask || '****'})</option>`).join('');
    select.addEventListener('change', loadTransactions);
    loadTransactions();
  } catch (e) {
    console.error('Error loading accounts:', e);
    document.getElementById('account-select').innerHTML = '<option value="">Error loading accounts</option>';
  }
}

async function loadTransactions() {
  const accountId = document.getElementById('account-select').value;
  if (!accountId) return;

  window.eime.setContext({
    page: 'reconciliation',
    payload: { church_id: 'holy_comforter', account_id: accountId }
  });

  try {
    const start = document.getElementById('period-start').value;
    const end = document.getElementById('period-end').value;
    const res = await fetch(`${API}/api/churches/holy_comforter/plaid/transactions?account_id=${accountId}&start=${start}&end=${end}`);
    allTransactions = await res.json();
    updateCounts();
    renderTransactions();
  } catch (e) {
    console.error('Error loading transactions:', e);
    allTransactions = [];
    renderTransactions();
  }
}

function updateCounts() {
  const matched = allTransactions.filter(t => t.matched).length;
  const exceptions = allTransactions.filter(t => !t.matched).length;

  // Calculate reconciliation summary
  let openingBalance = 0;
  let deposits = 0;
  let disbursements = 0;
  let closingBalance = 0;

  allTransactions.forEach(t => {
    if (t.opening_balance) openingBalance = t.opening_balance;
    if (t.closing_balance) closingBalance = t.closing_balance;
    if (t.amount > 0) deposits += t.amount;
    else disbursements += Math.abs(t.amount);
  });

  const netVariance = closingBalance - (openingBalance + deposits - disbursements);

  document.getElementById('count-total').textContent = allTransactions.length;
  document.getElementById('count-matched').textContent = matched;
  document.getElementById('count-exceptions').textContent = exceptions;
  document.getElementById('variance').textContent = `$${Math.abs(netVariance).toFixed(2)}`;

  document.getElementById('opening-balance').textContent = `$${openingBalance.toFixed(2)}`;
  document.getElementById('total-deposits').textContent = `$${deposits.toFixed(2)}`;
  document.getElementById('total-disbursements').textContent = `$${disbursements.toFixed(2)}`;
  document.getElementById('closing-balance').textContent = `$${closingBalance.toFixed(2)}`;
  document.getElementById('net-variance').textContent = `$${netVariance.toFixed(2)}`;
}

function renderTransactions() {
  let txns = allTransactions;
  if (activeTab === 'exceptions') txns = allTransactions.filter(t => !t.matched);
  else if (activeTab === 'matched') txns = allTransactions.filter(t => t.matched);
  
  const list = document.getElementById('transactions-list');
  if (txns.length === 0) {
    list.innerHTML = `<div class="px-6 py-12 text-center text-slate-500">No ${activeTab === 'all' ? '' : activeTab} transactions found</div>`;
    return;
  }
  
  list.innerHTML = txns.map(t => `
    <div class="px-6 py-4 hover:bg-slate-50 ${!t.matched ? 'cursor-pointer' : ''} transition-colors" ${!t.matched ? `onclick="showException('${t.transaction_id}')"` : ''}>
      <div class="flex items-center justify-between">
        <div class="flex-1">
          <p class="font-medium text-slate-900">${t.description || t.name || 'Transaction'}</p>
          <p class="text-sm text-slate-500">${t.date || '—'} • ${t.category || 'Uncategorized'}</p>
          ${t.matched ? `<p class="text-xs text-green-600 mt-1">✓ Matched to JE ${t.matched_je_id || 'unknown'}</p>` : ''}
        </div>
        <div class="text-right">
          <p class="font-bold ${t.amount < 0 ? 'text-red-600' : 'text-green-600'}">${t.amount < 0 ? '-' : '+'}$${Math.abs(t.amount || 0).toFixed(2)}</p>
          ${!t.matched ? '<span class="px-2 py-0.5 bg-orange-100 text-orange-800 rounded text-xs">Unmatched</span>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.recon-tab').forEach(t => {
    t.classList.remove('border-navy-600', 'text-navy-600', 'active');
    t.classList.add('border-transparent', 'text-slate-600');
  });
  event.target.classList.add('border-navy-600', 'text-navy-600', 'active');
  event.target.classList.remove('border-transparent', 'text-slate-600');
  renderTransactions();
}

async function syncPlaid() {
  try {
    document.getElementById('transactions-list').innerHTML = '<div class="px-6 py-12 text-center text-slate-500">Syncing transactions from Plaid…</div>';
    await fetch(`${API}/api/churches/holy_comforter/plaid/sync-transactions`, { method: 'POST' });
    loadTransactions();
  } catch (e) {
    alert('Error syncing: ' + e.message);
  }
}

async function autoMatch() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Matching...';
  btn.classList.add('opacity-50', 'cursor-not-allowed');

  try {
    const accountId = document.getElementById('account-select').value;
    if (!accountId) {
      alert('Please select a bank account first.');
      return;
    }

    const res = await fetch(`${API}/api/churches/holy_comforter/plaid/auto-match?account_id=${accountId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });

    if (!res.ok) {
      // Backend not yet implemented — show coming soon message
      btn.textContent = 'Auto-Match (Coming Soon)';
      btn.disabled = true;
      alert('Auto-match is coming soon. We\'ll compare bank transactions to journal entries using fuzzy matching (amount within $0.01, date within 3 days).');
      return;
    }

    const data = await res.json();
    alert(`Auto-match complete: ${data.matched} transactions matched, ${data.exceptions} exceptions.`);
    await loadTransactions();
  } catch (e) {
    // Backend not yet implemented
    btn.textContent = 'Auto-Match (Coming Soon)';
    btn.disabled = true;
    console.warn('Auto-match not yet available:', e.message);
  }
}

async function uploadStatement() {
  const fileInput = document.getElementById('statement-file-input');
  const file = fileInput.files[0];
  if (!file) return;

  const accountId = document.getElementById('account-select').value;
  if (!accountId) {
    alert('Please select a bank account first.');
    return;
  }

  const status = document.getElementById('upload-status');
  status.classList.remove('hidden');
  status.className = 'mt-3 text-sm text-slate-600';
  status.innerHTML = `<p>📤 Uploading ${file.name}...</p>`;

  const fd = new FormData();
  fd.append('file', file);
  fd.append('account_id', accountId);

  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/bank-statements/upload`, {
      method: 'POST',
      body: fd
    });

    if (!res.ok) {
      // Backend not yet implemented
      status.className = 'mt-3 text-sm text-amber-600';
      status.innerHTML = `<p>⚠️ Bank statement parser coming soon. We'll auto-ingest CSV/OFX/QFX files.</p>`;
      return;
    }

    const data = await res.json();
    status.className = 'mt-3 text-sm text-emerald-600';
    status.innerHTML = `<p>✅ ${data.transactions_parsed || 0} transactions parsed from statement</p>`;
    await loadTransactions();
  } catch (e) {
    // Backend not yet implemented
    status.className = 'mt-3 text-sm text-amber-600';
    status.innerHTML = `<p>⚠️ Bank statement upload feature coming soon (bank_statement_parser.py backend integration)</p>`;
    console.warn('Bank statement upload not yet available:', e.message);
  }
}

function showException(txnId) {
  currentException = allTransactions.find(t => t.transaction_id === txnId);
  if (!currentException) return;
  
  document.getElementById('exception-content').innerHTML = `
    <div class="bg-orange-50 border border-orange-200 rounded p-4">
      <p class="font-semibold text-orange-900">Unmatched Transaction</p>
      <p class="text-sm text-orange-800 mt-1">${currentException.description}</p>
      <p class="text-sm text-orange-800">Amount: $${Math.abs(currentException.amount).toFixed(2)} on ${currentException.date}</p>
    </div>
    
    <div>
      <p class="text-sm font-semibold text-slate-700 mb-2">Possible Matches</p>
      <div class="space-y-2">
        <p class="text-sm text-slate-500">No similar journal entries found within tolerance.</p>
      </div>
    </div>
    
    <div>
      <p class="text-sm font-semibold text-slate-700 mb-2">AI Analysis</p>
      <div class="bg-blue-50 border border-blue-200 rounded p-3 text-sm text-blue-900">
        This transaction appears to be unrecorded in your journal. Consider creating a corrective JE to capture this transaction.
      </div>
    </div>
  `;
  
  document.getElementById('exception-modal').classList.remove('hidden');
}

async function createCorrectiveJE() {
  if (!currentException) return;
  alert('Corrective JE will be drafted with: From "Operating Cash" To "Suspense" for $' + Math.abs(currentException.amount).toFixed(2) + '. Review in Journal Entries page.');
  closeModal();
}

function closeModal() {
  document.getElementById('exception-modal').classList.add('hidden');
  currentException = null;
}
</script>

</body>
</html>
