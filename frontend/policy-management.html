<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Policies — Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <template id="page-center-content">
        <div class="p-6 max-w-7xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Policies</h1>
                <p class="text-gray-600">The rules the system follows when coding and routing transactions &mdash; what counts as a "small" bill, who approves what, and how to handle restricted gifts.</p>
            </div>

            <!-- Tabs -->
            <div class="mb-6 border-b border-gray-200">
                <div class="flex gap-4 overflow-x-auto">
                    <button onclick="switchPolicyTab('active')" id="tabPolicyActive" class="pb-3 px-1 border-b-2 border-blue-600 text-blue-600 font-medium text-sm whitespace-nowrap">
                        Current Rules
                    </button>
                    <button onclick="switchPolicyTab('drift')" id="tabPolicyDrift" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm whitespace-nowrap hover:text-gray-900">
                        Things Have Changed
                    </button>
                    <button onclick="switchPolicyTab('history')" id="tabPolicyHistory" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm whitespace-nowrap hover:text-gray-900">
                        Rule History
                    </button>
                    <button onclick="switchPolicyTab('create')" id="tabPolicyCreate" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm whitespace-nowrap hover:text-gray-900">
                        New Rule
                    </button>
                </div>
            </div>

            <!-- ACTIVE POLICIES Tab -->
            <div id="tabContentActive" class="space-y-4">
                <div id="activePoliciesList"></div>
            </div>

            <!-- DRIFT ALERTS Tab -->
            <div id="tabContentDrift" class="hidden space-y-4">
                <div id="driftAlertsList"></div>
            </div>

            <!-- HISTORY Tab -->
            <div id="tabContentHistory" class="hidden space-y-4">
                <div id="historyList"></div>
            </div>

            <!-- CREATE POLICY Tab -->
            <div id="tabContentCreate" class="hidden">
                <div class="bg-white rounded-lg shadow-sm p-6">
                    <h2 class="text-lg font-semibold text-gray-900 mb-6">Create New Policy</h2>
                    <form id="newPolicyForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Policy Name</label>
                            <input type="text" id="policyName" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm" placeholder="e.g., Facility Maintenance Classification">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Policy Type</label>
                            <select id="policyType" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                                <option value="">Select type...</option>
                                <option value="classification">GL Account Classification</option>
                                <option value="capitalization">Capitalization Eligibility</option>
                                <option value="revenue">Revenue Recognition Rules</option>
                                <option value="approval">Approval Routing</option>
                                <option value="tax">Tax Treatment</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Policy Description</label>
                            <textarea id="policyDesc" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm h-24" placeholder="Describe the policy in natural language..."></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Triggering Conditions</label>
                            <textarea id="policyConditions" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm h-20" placeholder="e.g., expense_type='facility' AND amount<5000 → account 6100"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Effective Date</label>
                            <input type="date" id="policyEffective" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        </div>
                        <div>
                            <button type="button" onclick="runDryRun()" class="px-4 py-2 text-sm border border-blue-600 text-blue-600 rounded-lg hover:bg-blue-50 mr-2">
                                Dry Run
                            </button>
                            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
                                Create Policy
                            </button>
                        </div>
                        <div id="dryRunResult" class="hidden"></div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Vote Modal -->
        <div id="voteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-lg max-w-md w-full mx-4 p-6">
                <h2 class="text-lg font-bold text-gray-900 mb-1">Cast Your Vote</h2>
                <p id="voteModalTitle" class="text-sm text-gray-600 mb-4"></p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Vote</label>
                        <select id="voteSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="yes">Approve</option>
                            <option value="no">Reject</option>
                            <option value="abstain">Abstain</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Rationale (optional)</label>
                        <textarea id="voteRationale" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm h-20" placeholder="Explain your vote..."></textarea>
                    </div>
                    <p id="voteError" class="text-sm text-red-600"></p>
                    <div class="flex gap-2">
                        <button onclick="submitVote()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">Submit Vote</button>
                        <button onclick="closeVoteModal()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Policy Detail Modal -->
        <div id="policyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-lg max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 id="policyModalTitle" class="text-xl font-bold text-gray-900">Policy Details</h2>
                    <button onclick="closePolicyModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-6">
                    <div id="policyDetail"></div>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
                            Edit Policy
                        </button>
                        <button class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-400">
                            Deprecate
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="eime-bus.js"></script>
    <script src="eime-shell.js"></script>
    <script src="eime-chat-rail.js"></script>
    <script>
        const API = (window.EIME_API ?? '');
        const CHURCH_ID = 'holy_comforter';

        let allCards = [];      // raw cards from API
        let voteTarget = null;  // card being voted on

        // ── Data loading ────────────────────────────────────────────────────

        async function loadPolicies() {
            try {
                const res = await fetch(`${API}/api/churches/${CHURCH_ID}/policies`);
                const data = await res.json();
                allCards = data.cards || [];
                renderActivePolicies();
                renderConflicts();
                renderHistory();
            } catch (err) {
                console.error('Error loading policies:', err);
                document.getElementById('activePoliciesList').innerHTML =
                    '<div class="text-center text-red-500 bg-white rounded-lg p-6">Failed to load policies</div>';
            }
        }

        // ── Rendering ───────────────────────────────────────────────────────

        function renderActivePolicies() {
            const container = document.getElementById('activePoliciesList');
            if (allCards.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 bg-white rounded-lg p-6">No policies found</div>';
                return;
            }

            // Detect conflicts before rendering
            const conflicts = detectConflicts(allCards);

            container.innerHTML = allCards.map(card => {
                const ev = card.evidence || {};
                const votes = ev.voted_by || [];
                const required = ev.votes_required || 3;
                const yesVotes = votes.filter(v => v.vote === 'yes').length;
                const noVotes  = votes.filter(v => v.vote === 'no').length;
                const isOpen   = (card.status || '').toUpperCase() === 'OPEN';
                const isActive = (card.status || '').toUpperCase() === 'ACTIVE';
                const hasConflict = conflicts.some(c => c.a === card.policy_id || c.b === card.policy_id);

                const statusBadge = isActive
                    ? '<span class="px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">ACTIVE</span>'
                    : isOpen
                    ? '<span class="px-2 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">PENDING VOTE</span>'
                    : `<span class="px-2 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600">${card.status}</span>`;

                const conflictBadge = hasConflict
                    ? '<span class="ml-2 px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700">CONFLICT</span>'
                    : '';

                const voteBar = isOpen ? `
                    <div class="mt-3 pt-3 border-t border-gray-100">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs text-gray-500">Votes: ${yesVotes} yes · ${noVotes} no · ${required} required</span>
                            <div class="flex gap-2">
                                <button onclick="event.stopPropagation(); openVoteModal('${card.policy_id}', 'yes')"
                                    class="px-3 py-1 text-xs bg-green-600 text-white rounded hover:bg-green-700">
                                    Approve
                                </button>
                                <button onclick="event.stopPropagation(); openVoteModal('${card.policy_id}', 'no')"
                                    class="px-3 py-1 text-xs bg-red-600 text-white rounded hover:bg-red-700">
                                    Reject
                                </button>
                            </div>
                        </div>
                        <div class="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-green-500 rounded-full transition-all"
                                 style="width:${Math.min(100, (yesVotes/required)*100)}%"></div>
                        </div>
                    </div>` : '';

                const borderColor = hasConflict ? 'border-red-400' : isActive ? 'border-green-500' : 'border-yellow-400';

                return `
                <div onclick="showPolicyDetail('${card.policy_id}')"
                     class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md cursor-pointer transition border-l-4 ${borderColor}">
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex-1">
                            <div class="flex items-center flex-wrap gap-1">
                                <p class="font-semibold text-gray-900">${card.title}</p>
                                ${conflictBadge}
                            </div>
                            <p class="text-xs text-gray-500 mt-0.5">ID: ${card.policy_id} · Proposed by ${card.proposed_by || 'unknown'} · ${new Date(card.created_at).toLocaleDateString()}</p>
                        </div>
                        ${statusBadge}
                    </div>
                    <p class="text-sm text-gray-700">${card.description}</p>
                    ${voteBar}
                </div>`;
            }).join('');
        }

        function renderConflicts() {
            const container = document.getElementById('driftAlertsList');
            const conflicts = detectConflicts(allCards);
            if (conflicts.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 bg-white rounded-lg p-6">No conflicts detected between active policies</div>';
                return;
            }
            container.innerHTML = conflicts.map(c => `
                <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-red-500">
                    <div class="flex items-start justify-between mb-3">
                        <div>
                            <p class="font-semibold text-gray-900">Potential Policy Conflict</p>
                            <p class="text-xs text-gray-500">Detected automatically</p>
                        </div>
                        <span class="px-2 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800">REVIEW NEEDED</span>
                    </div>
                    <div class="space-y-2 mb-3">
                        <div class="bg-gray-50 rounded p-2 text-sm"><strong>${c.titleA}</strong><br><span class="text-gray-600 text-xs">${c.descA}</span></div>
                        <div class="text-center text-xs text-red-600 font-medium">conflicts with</div>
                        <div class="bg-gray-50 rounded p-2 text-sm"><strong>${c.titleB}</strong><br><span class="text-gray-600 text-xs">${c.descB}</span></div>
                    </div>
                    <p class="text-xs text-red-700 bg-red-50 p-2 rounded">${c.reason}</p>
                </div>
            `).join('');
        }

        function detectConflicts(cards) {
            const conflicts = [];
            // Simple keyword-overlap heuristic: policies with shared keywords may contradict each other
            const keywordSets = cards.map(c => ({
                id: c.policy_id,
                title: c.title,
                desc: c.description,
                words: new Set((c.title + ' ' + c.description).toLowerCase()
                    .match(/\b(fund|restrict|capital|approval|threshold|discretionary|limit|amount|purchase|expense|draw)\b/g) || [])
            }));
            for (let i = 0; i < keywordSets.length; i++) {
                for (let j = i + 1; j < keywordSets.length; j++) {
                    const a = keywordSets[i], b = keywordSets[j];
                    const shared = [...a.words].filter(w => b.words.has(w));
                    if (shared.length >= 2) {
                        conflicts.push({
                            a: a.id, titleA: a.title, descA: cards[i].description,
                            b: b.id, titleB: b.title, descB: cards[j].description,
                            reason: `Both policies govern "${shared.join('", "')}" — verify they don't set contradictory limits.`
                        });
                    }
                }
            }
            return conflicts;
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            // Build history from vote records on each card
            const historyRows = [];
            allCards.forEach(card => {
                const votes = (card.evidence || {}).voted_by || [];
                votes.forEach(v => {
                    historyRows.push({
                        title: card.title,
                        voter: v.voter_id || v.voter_role || 'unknown',
                        role: v.voter_role || '',
                        vote: v.vote,
                        rationale: v.rationale || '',
                        timestamp: v.timestamp,
                    });
                });
                // Also log the proposal
                historyRows.push({
                    title: card.title,
                    voter: card.proposed_by || 'system',
                    role: 'proposer',
                    vote: 'proposed',
                    rationale: card.description,
                    timestamp: card.created_at,
                });
            });
            historyRows.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));

            if (historyRows.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 bg-white rounded-lg p-6">No history yet</div>';
                return;
            }
            const voteBadge = v => {
                if (v === 'yes') return '<span class="px-2 py-0.5 bg-green-100 text-green-800 rounded text-xs">Approved</span>';
                if (v === 'no')  return '<span class="px-2 py-0.5 bg-red-100 text-red-800 rounded text-xs">Rejected</span>';
                return `<span class="px-2 py-0.5 bg-gray-100 text-gray-700 rounded text-xs">${v}</span>`;
            };
            container.innerHTML = historyRows.map(h => `
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <div class="flex items-start justify-between mb-1">
                        <p class="font-medium text-gray-900 text-sm">${h.title}</p>
                        ${voteBadge(h.vote)}
                    </div>
                    <p class="text-xs text-gray-500 mb-1">${h.voter}${h.role ? ' · ' + h.role : ''} · ${h.timestamp ? new Date(h.timestamp).toLocaleString() : '—'}</p>
                    ${h.rationale ? `<p class="text-xs text-gray-600 italic">"${h.rationale}"</p>` : ''}
                </div>
            `).join('');
        }

        // ── Vote modal ──────────────────────────────────────────────────────

        function openVoteModal(policyId, defaultVote) {
            voteTarget = { policyId, defaultVote };
            const card = allCards.find(c => c.policy_id === policyId);
            document.getElementById('voteModalTitle').textContent = card ? card.title : policyId;
            document.getElementById('voteSelect').value = defaultVote;
            document.getElementById('voteRationale').value = '';
            document.getElementById('voteError').textContent = '';
            document.getElementById('voteModal').classList.remove('hidden');
        }

        function closeVoteModal() {
            document.getElementById('voteModal').classList.add('hidden');
            voteTarget = null;
        }

        async function submitVote() {
            if (!voteTarget) return;
            const vote     = document.getElementById('voteSelect').value;
            const rationale = document.getElementById('voteRationale').value.trim();
            const voterId  = (window.EIMESession && EIMESession.getUserId && EIMESession.getUserId()) || 'treasurer@holy-comforter.org';
            const errEl    = document.getElementById('voteError');
            errEl.textContent = '';

            try {
                const res = await fetch(`${API}/api/policies/${voteTarget.policyId}/vote`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vote, rationale, voter_id: voterId, church_id: CHURCH_ID }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    errEl.textContent = err.detail || `Error ${res.status}`;
                    return;
                }
                closeVoteModal();
                await loadPolicies();
            } catch (err) {
                errEl.textContent = 'Network error — please try again';
            }
        }

        // ── Policy detail modal ─────────────────────────────────────────────

        function showPolicyDetail(policyId) {
            const card = allCards.find(c => c.policy_id === policyId);
            if (!card) return;
            const ev     = card.evidence || {};
            const votes  = ev.voted_by || [];
            const req    = ev.votes_required || 3;
            const yesN   = votes.filter(v => v.vote === 'yes').length;
            const noN    = votes.filter(v => v.vote === 'no').length;

            document.getElementById('policyModalTitle').textContent = card.title;
            document.getElementById('policyDetail').innerHTML = `
                <div class="space-y-4">
                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-200">
                        <p class="text-sm font-medium text-gray-900 mb-1">Description</p>
                        <p class="text-sm text-gray-700">${card.description}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><p class="text-xs font-medium text-gray-500">Status</p><p>${card.status}</p></div>
                        <div><p class="text-xs font-medium text-gray-500">Proposed by</p><p>${card.proposed_by || '—'}</p></div>
                        <div><p class="text-xs font-medium text-gray-500">Requires vote</p><p>${card.requires_vote ? 'Yes' : 'No'}</p></div>
                        <div><p class="text-xs font-medium text-gray-500">Created</p><p>${new Date(card.created_at).toLocaleDateString()}</p></div>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-700 mb-2">Vote tally: ${yesN} / ${req} needed</p>
                        <div class="h-2 bg-gray-100 rounded-full overflow-hidden mb-2">
                            <div class="h-full bg-green-500 rounded-full" style="width:${Math.min(100, (yesN/req)*100)}%"></div>
                        </div>
                        ${votes.length > 0 ? `<div class="space-y-1">${votes.map(v => `
                            <div class="flex items-center gap-2 text-xs">
                                <span class="font-medium">${v.voter_id || v.voter_role}</span>
                                <span class="${v.vote === 'yes' ? 'text-green-700' : 'text-red-700'}">${v.vote}</span>
                                ${v.rationale ? `<span class="text-gray-500 italic">"${v.rationale}"</span>` : ''}
                            </div>`).join('')}</div>` : '<p class="text-xs text-gray-400">No votes cast yet</p>'}
                    </div>
                </div>
            `;
            document.getElementById('policyModal').classList.remove('hidden');
        }

        function closePolicyModal() {
            document.getElementById('policyModal').classList.add('hidden');
        }

        // ── Tab switching ───────────────────────────────────────────────────

        function switchPolicyTab(tab) {
            ['Active', 'Drift', 'History', 'Create'].forEach(t => {
                document.getElementById(`tabContent${t}`).classList.add('hidden');
                document.getElementById(`tabPolicy${t}`).classList.remove('border-blue-600', 'text-blue-600');
                document.getElementById(`tabPolicy${t}`).classList.add('border-transparent', 'text-gray-600');
            });
            const cap = tab.charAt(0).toUpperCase() + tab.slice(1);
            document.getElementById(`tabContent${cap}`).classList.remove('hidden');
            document.getElementById(`tabPolicy${cap}`).classList.add('border-blue-600', 'text-blue-600');
            document.getElementById(`tabPolicy${cap}`).classList.remove('border-transparent', 'text-gray-600');
        }

        // ── Create policy form ──────────────────────────────────────────────

        async function runDryRun() {
            const desc = document.getElementById('policyDesc').value;
            const out  = document.getElementById('dryRunResult');
            out.classList.remove('hidden');
            out.innerHTML = '<p class="text-xs text-gray-500">Checking compliance impact...</p>';
            try {
                // Extract an amount from the description if present
                const amtMatch = desc.match(/\$?([\d,]+)/);
                const amount   = amtMatch ? parseFloat(amtMatch[1].replace(/,/g, '')) : 5000;
                const res  = await fetch(`${API}/api/compliance/check`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transaction_amount: amount, account: '6100', department: 'general', transaction_type: 'expense' }),
                });
                const data = await res.json();
                const color = data.compliant ? 'text-green-700 bg-green-50 border-green-200' : 'text-red-700 bg-red-50 border-red-200';
                const icon  = data.compliant ? '✓' : '✗';
                out.innerHTML = `<div class="${color} border rounded p-3 text-xs">
                    <p class="font-semibold">${icon} Dry-run result for $${amount.toLocaleString()}</p>
                    <p class="mt-1">${data.compliant ? 'Transaction would be compliant under active policies.' : 'Violations: ' + (data.violations || []).join(', ')}</p>
                    ${(data.violations || []).length > 0 ? '<p class="mt-1 text-orange-700">Review conflicts before enacting this policy.</p>' : ''}
                </div>`;
            } catch (e) {
                out.innerHTML = '<p class="text-xs text-red-500">Dry-run failed — backend unavailable</p>';
            }
        }

        async function onMounted() {
            document.getElementById('newPolicyForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('policyName').value.trim();
                const type  = document.getElementById('policyType').value;
                const desc  = document.getElementById('policyDesc').value.trim();
                const eff   = document.getElementById('policyEffective').value;
                if (!title || !type || !desc || !eff) { alert('Please fill all fields'); return; }
                const policyId = 'pol-' + title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '').slice(0, 40);
                try {
                    const res = await fetch(`${API}/api/policies`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ policy_id: policyId, title, description: desc, effective_date: eff, enforcement_level: type, policy_rules: {} }),
                    });
                    if (!res.ok) { const e = await res.json(); alert(e.detail || 'Create failed'); return; }
                    document.getElementById('newPolicyForm').reset();
                    document.getElementById('dryRunResult').classList.add('hidden');
                    switchPolicyTab('active');
                    await loadPolicies();
                } catch (err) {
                    alert('Network error');
                }
            });

            await loadPolicies();
            eime.setContext({ page: 'policy-management', payload: { churchId: CHURCH_ID } });
        }

        EIMEShell.mount({
            activeNav: 'policy-management',
