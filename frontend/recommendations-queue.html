<!DOCTYPE html>
<html>
<head>
<title>Suggestions — Books</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
<script src="/components/card-renderer.js?v=2"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-6xl mx-auto p-6">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">⭐ Suggestions</h1>
    <p class="text-slate-600">Recommended next actions — <span id="queue-count">0</span> awaiting your decision</p>
  </div>

  <!-- Recommendations List -->
  <div id="recommendations-list" class="space-y-4">
    <p class="text-slate-500 text-center py-8">Loading recommendation queue...</p>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
const CHURCH_ID = (window.EIMESession && EIMESession.getChurch()) || 'holy_comforter';
let currentUserTier = 2;
let allRecommendations = [];

EIMEShell.mount({
  activeNav: 'council',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'recommendations-queue',
      payload: { church_id: CHURCH_ID }
    });
    loadRecommendations();
    setInterval(loadRecommendations, 10000);
  }
});

async function loadRecommendations() {
  try {
    // Phase 3: Call real endpoint
    const res = await fetch(`${API}/api/churches/${CHURCH_ID}/recommendations`);
    const data = await res.json();

    if (data.cards && Array.isArray(data.cards) && data.cards.length > 0) {
      // Convert DB format to frontend format. When the backend hasn't populated
      // rationale / impact_projection in `evidence`, derive sensible fallbacks
      // from the fields it does provide so the user never sees blank labels.
      allRecommendations = data.cards.map((card, idx) => {
        const ev = card.evidence || {};
        // Backend enrichment provides cash_impact_usd / confidence_bucket / confidence_pct on evidence.
        const cashUsd = ev.cash_impact_usd != null ? Number(ev.cash_impact_usd) : 0;
        const basis   = ev.cash_impact_basis || 'estimated';
        const bucket  = ev.confidence_bucket || 'unknown';
        const conf    = ev.confidence_pct != null ? Number(ev.confidence_pct) : 0;
        const fmtUsd  = (n) => n >= 1000
          ? '$' + (n / 1000).toFixed(n >= 100000 ? 0 : 1) + 'K/yr'
          : '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 }) + '/yr';
        const cashLabel = cashUsd > 0
          ? `${fmtUsd(cashUsd)} (${basis})`
          : 'Not yet modelled';
        const confLabel = conf > 0 ? `${bucket} (${conf.toFixed(0)}%)` : 'unknown';

        const rationale = ev.rationale
          || card.description
          || 'No additional rationale recorded.';
        const ip = ev.impact_projection || {};
        return {
          recommendation_id: card.card_id,
          state: card.status,
          title: card.title,
          description: card.description,
          candidates: ev.candidates || [],
          selected_candidate: ev.selected_candidate || null,
          rationale,
          impact_projection: {
            cash_impact:    ip.cash_impact    || cashLabel,
            mission_impact: ip.mission_impact || (`confidence ${confLabel}`),
            covenant_impact: ip.covenant_impact || null,
          },
          decision_deadline: ev.decision_deadline || new Date(Date.now() + 14 * 24 * 3600000).toISOString(),
          decided_by: ev.decided_by || null,
          decision: ev.decision || null,
          privacy_class: ev.privacy_class || 'P2',
          version: 1,
          created_at: card.created_at,
          updated_at: card.resolved_at || card.created_at,
        };
      });
    } else {
      // Fallback to mock data
      allRecommendations = [
        {
          recommendation_id: 'rec_001',
          state: 'OPEN',
          title: 'Establish Monthly Cash Reserve Target',
          description: 'Build cash reserves to cover 6 months of operating expenses',
          candidates: [
            { id: 'c1', description: 'Immediate: Allocate 15% of monthly surplus', impact_projection: '+$25K/month' },
            { id: 'c2', description: 'Gradual: Build over 3 years via 10% allocation', impact_projection: '+$17K/month' },
            { id: 'c3', description: 'Deferred: Allocate only after achieving $500K baseline', impact_projection: '+$0K/month (now)' }
          ],
          selected_candidate: null,
          rationale: 'Current reserves at 2.1 months; industry standard is 4-6 months',
          impact_projection: {
            cash_impact: '$25K monthly increase in reserves',
            covenant_impact: 'Improves liquidity covenants',
            mission_impact: 'Enables counter-cyclical grant-making during downturns'
          },
          decision_deadline: new Date(Date.now() + 14 * 24 * 3600000).toISOString(),
          decided_by: null,
          decision: null,
          privacy_class: 'P2',
          version: 1,
          created_at: new Date(Date.now() - 48 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 48 * 3600000).toISOString()
        },
        {
          recommendation_id: 'rec_002',
          state: 'OPEN',
          title: 'Reallocate Underperforming Fund',
          description: 'Move $75K from Legacy Scholarship (0 grants) to Active Mission Fund',
          candidates: [
            { id: 'c1', description: 'Full reallocation: $75K to Active Mission', impact_projection: '+$12 grants/year' },
            { id: 'c2', description: 'Partial: $50K reallocation, keep $25K reserves', impact_projection: '+$8 grants/year' }
          ],
          selected_candidate: null,
          rationale: 'Legacy Scholarship has no qualified applications; Active Mission has 40+ pending requests',
          impact_projection: {
            cash_impact: '$75K annual redistribution',
            mission_impact: 'Increase active grants from 8 to 20 per year',
            covenant_impact: 'Maintains restricted fund intent via Active Mission alignment'
          },
          decision_deadline: new Date(Date.now() + 7 * 24 * 3600000).toISOString(),
          decided_by: null,
          decision: null,
          privacy_class: 'P2',
          version: 1,
          created_at: new Date(Date.now() - 3 * 24 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 3 * 24 * 3600000).toISOString()
        }
      ];
    }

    renderRecommendations();
  } catch (e) {
    console.error('Error loading recommendations:', e);
    allRecommendations = [];
    renderRecommendations();
  }
}

function renderRecommendations() {
  document.getElementById('queue-count').textContent = allRecommendations.filter(r => r.state === 'OPEN').length;

  const container = document.getElementById('recommendations-list');

  if (allRecommendations.length === 0) {
    container.innerHTML = '<p class="text-slate-500 text-center py-8">✓ No recommendations pending</p>';
    return;
  }

  container.innerHTML = allRecommendations.map(rec => {
    const daysUntilDeadline = Math.floor((new Date(rec.decision_deadline) - new Date()) / (24 * 3600000));
    const urgency = daysUntilDeadline < 3 ? 'text-red-900 bg-red-100' : daysUntilDeadline < 7 ? 'text-orange-900 bg-orange-100' : 'text-blue-900 bg-blue-100';

    return `
      <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 transition-colors">
        <div class="flex items-start justify-between mb-4">
          <div>
            <p class="font-semibold text-slate-900">${rec.title}</p>
            <p class="text-sm text-slate-700 mt-1">${rec.description}</p>
          </div>
          <span class="text-xs font-semibold rounded px-2 py-1 ${urgency}">
            ${daysUntilDeadline} days
          </span>
        </div>

        <div class="bg-slate-50 rounded p-3 mb-4">
          <p class="text-sm font-semibold text-slate-900 mb-2">Rationale</p>
          <p class="text-sm text-slate-700">${rec.rationale}</p>
        </div>

        <div class="bg-blue-50 border border-blue-200 rounded p-3 mb-4">
          <p class="text-xs font-semibold text-blue-900 mb-2">Projected Impact</p>
          <div class="grid grid-cols-2 gap-2 text-xs text-blue-900">
            <div>💰 Cash: ${rec.impact_projection.cash_impact}</div>
            <div>🎯 Mission: ${rec.impact_projection.mission_impact}</div>
            ${rec.impact_projection.covenant_impact ? `<div>📋 Covenant: ${rec.impact_projection.covenant_impact}</div>` : ''}
          </div>
        </div>

        ${rec.candidates && rec.candidates.length > 0 ? `
        <div class="mb-4">
          <p class="text-xs font-semibold text-slate-900 mb-2">Candidates</p>
          <div class="space-y-2">
            ${rec.candidates.map(cand => `
              <div class="border border-slate-200 rounded p-2 text-xs">
                <p class="font-medium text-slate-900">${cand.description}</p>
                <p class="text-slate-600 mt-1">${cand.impact_projection}</p>
                ${rec.state === 'OPEN' ? `
                  <button onclick="selectCandidate('${rec.recommendation_id}', '${cand.id}')" class="mt-2 px-2 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 text-xs">
                    Select
                  </button>
                ` : ''}
              </div>
            `).join('')}
          </div>
        </div>
        ` : ''}

        ${rec.state === 'OPEN' ? `
          <div class="flex gap-2">
            <button onclick="acceptRecommendation('${rec.recommendation_id}')" class="text-xs px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700">Approve</button>
            <button onclick="declineRecommendation('${rec.recommendation_id}')" class="text-xs px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">Reject</button>
            <button onclick="deferRecommendation('${rec.recommendation_id}')" class="text-xs px-3 py-1 bg-amber-600 text-white rounded hover:bg-amber-700">Defer</button>
            <button onclick="modifyRecommendation('${rec.recommendation_id}')" class="text-xs px-3 py-1 bg-slate-600 text-white rounded hover:bg-slate-700">Review Details</button>
          </div>
        ` : `
          <div class="text-xs text-slate-600">
            <strong>Decision:</strong> ${rec.decision} by ${rec.decided_by || 'pending'}
          </div>
        `}
      </div>
    `;
  }).join('');
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (hours < 1) return 'Just now';
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}

async function selectCandidate(recId, candId) {
  try {
    const res = await fetch(`${API}/api/recommendations/${recId}/select`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ candidate_id: candId })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('Candidate selected');
    loadRecommendations();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function _sessionHeaders() {
  const s = window.EIMESession;
  return s ? Object.assign({ 'Content-Type': 'application/json' }, s.authHeaders())
           : { 'Content-Type': 'application/json' };
}

async function _decideRecommendation(recId, action, opts = {}) {
  try {
    const res = await fetch(`${API}/api/recommendations-session/${encodeURIComponent(recId)}/${action}`, {
      method: 'POST',
      headers: _sessionHeaders(),
      body: JSON.stringify(opts || {}),
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    const result = await res.json();
    return { ok: true, result };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function acceptRecommendation(recId) {
  const r = await _decideRecommendation(recId, 'accept');
  alert(r.ok ? 'Suggestion accepted.' : 'Error: ' + r.error);
  if (r.ok) loadRecommendations();
}

async function declineRecommendation(recId) {
  const reason = prompt('Why are you declining this? (optional)') || '';
  const r = await _decideRecommendation(recId, 'decline', { reason });
  alert(r.ok ? 'Suggestion declined.' : 'Error: ' + r.error);
  if (r.ok) loadRecommendations();
}

async function deferRecommendation(recId) {
  const days = parseInt(prompt('Defer for how many days?', '30'), 10);
  if (!days || days < 1) return;
  const r = await _decideRecommendation(recId, 'defer', { defer_days: days });
  if (r.ok) {
    const until = new Date(r.result.defer_until).toLocaleDateString();
    alert(`Suggestion deferred until ${until}.`);
    loadRecommendations();
  } else {
    alert('Error: ' + r.error);
  }
}

function modifyRecommendation(recId) {
  alert('Modification interface coming in Phase 3');
}
</script>

</body>
</html>
