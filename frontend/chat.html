<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Books — Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
            gold: { 500: '#c9a227' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .prose p { margin-bottom: 0.5em; }
    .prose ul { list-style: disc; margin-left: 1.2em; margin-bottom: 0.5em; }
    .prose strong { font-weight: 600; }
    .prose code { font-family: monospace; font-size: 0.85em; background:#f1f5f9; padding:0 3px; border-radius:3px; }
    #messages { scroll-behavior: smooth; }
    .dot-pulse { display:inline-flex; gap:4px; align-items:center; }
    .dot-pulse span { width:6px; height:6px; background:#94a3b8; border-radius:50%; animation:dotPulse 1.2s infinite; }
    .dot-pulse span:nth-child(2) { animation-delay:0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay:0.4s; }
    @keyframes dotPulse { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }
  </style>
  <link rel="stylesheet" href="/responsive.css" />
  <script src="/eime-bus.js"></script>
  <script src="/eime-shell.js"></script>
  <script src="/eime-chat-rail.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans">

<template id="page-center-content">
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between flex-shrink-0">
      <div>
        <h1 class="text-lg font-semibold text-slate-800">Ask Books</h1>
        <p class="text-sm text-slate-500">Ask anything &mdash; about a bill, a budget line, a donor, or how the books are doing. Plain English, no jargon needed.</p>
      </div>
      <div class="flex items-center gap-3">
        <select id="job-selector" class="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white text-slate-700 focus:ring-2 focus:ring-navy-600 outline-none">
          <option value="">General (no job context)</option>
        </select>
        <button onclick="clearChat()" class="text-xs text-slate-400 hover:text-slate-600 border border-slate-200 rounded-lg px-3 py-2">Clear</button>
      </div>
    </header>

    <!-- Suggested questions -->
    <div id="suggestions" class="bg-white border-b border-slate-100 px-6 py-3 flex gap-2 flex-wrap flex-shrink-0">
      <p class="text-xs text-slate-400 self-center mr-1">Try:</p>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">What's our financial position right now?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">Why does this bill need my approval?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">What looks unusual about this transaction?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">How does this bill get recorded?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">What accounts apply for our diocesan apportionment?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">Why is this line flagged as risky?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">What GL account should housing allowance use?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">How does GAAP ASC 958 affect fund accounting?</button>
      <button onclick="sendSuggestion(this)" class="suggestion text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full transition-colors">Who needs to approve this payment?</button>
    </div>

    <!-- Chat messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-6 py-6 space-y-4">
      <!-- Welcome message -->
      <div class="flex gap-3 fade-in">
        <div class="w-8 h-8 bg-navy-900 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5">
          <svg class="w-4 h-4 text-gold-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        </div>
        <div class="flex-1">
          <p class="text-xs font-semibold text-slate-500 mb-1">Books Assistant</p>
          <div class="bg-white rounded-xl rounded-tl-none border border-slate-200 px-4 py-3 max-w-2xl prose text-sm text-slate-700">
            <p>Hi — I'm the Books assistant. I can:</p>
            <ul class="mt-2 space-y-1 list-disc pl-5">
              <li>Tell you <strong>where the books stand right now</strong> — cash, fund balances, net position with confidence framing.</li>
              <li>Explain any <strong>invoice decision</strong> — classification rationale, GL coding, risk scores, fund restrictions, JE construction.</li>
              <li>Answer <strong>general accounting questions</strong> for a parish — GAAP ASC 958, denomination rules, journal entries.</li>
            </ul>
            <p class="mt-2 text-xs text-slate-500">Tip: pick a specific job from the dropdown above to ground my answer in one invoice; leave it on <em>General</em> for books-wide questions.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="bg-white border-t border-slate-200 px-6 py-4 flex-shrink-0">
      <div class="flex gap-3 max-w-4xl">
        <textarea
          id="question-input"
          placeholder="Ask anything — about a bill, donor, budget line, or a flagged item…"
          class="flex-1 text-sm border border-slate-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-navy-600 outline-none resize-none leading-relaxed"
          rows="2"
          onkeydown="handleKey(event)"
        ></textarea>
        <button
          onclick="sendQuestion()"
          id="send-btn"
          class="bg-navy-900 hover:bg-navy-800 text-white font-medium px-5 py-3 rounded-xl text-sm transition-colors flex items-center gap-2 self-end"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
          Send
        </button>
      </div>
      <p class="text-xs text-slate-400 mt-2">
        <kbd class="bg-slate-100 px-1.5 py-0.5 rounded text-xs">Shift+Enter</kbd> for new line &nbsp;·&nbsp;
        <kbd class="bg-slate-100 px-1.5 py-0.5 rounded text-xs">Enter</kbd> to send
      </p>
    </div>
  </div>
</template>

<script>
const API = (window.EIME_API ?? '');
let sending = false;

async function loadJobs() {
  try {
    const res = await fetch(`${API}/api/jobs`);
    const jobs = await res.json();
    const sel = document.getElementById('job-selector');
    const preselect = new URLSearchParams(window.location.search).get('job');
    jobs.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j.job_id;
      const status = j.status;
      const vendor = j.invoice_document?.vendor_name || j.filename;
      opt.textContent = `${vendor} — ${status} (${j.job_id.slice(0, 8)})`;
      if (preselect && j.job_id === preselect) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {}
}

async function checkApiKey() {
  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: '__ping__' }),
    });
    const d = await r.json();
    if (d.answer && d.answer.includes('ANTHROPIC_API_KEY')) {
      // API key not set - user will see this in the UI
    }
  } catch {
    // API offline - user will see this in the UI
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuestion();
  }
}

function sendSuggestion(btn) {
  document.getElementById('question-input').value = btn.textContent;
  sendQuestion();
}

function appendMessage(role, html, meta) {
  const messages = document.getElementById('messages');
  const isAgent = role === 'agent';
  const div = document.createElement('div');
  div.className = 'flex gap-3 fade-in';
  if (!isAgent) div.classList.add('justify-end');

  if (isAgent) {
    div.innerHTML = `
      <div class="w-8 h-8 bg-navy-900 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5">
        <svg class="w-4 h-4 text-gold-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      </div>
      <div class="flex-1 max-w-3xl">
        <p class="text-xs font-semibold text-slate-500 mb-1">Books Assistant${meta ? ` · ${meta}` : ''}</p>
        <div class="bg-white rounded-xl rounded-tl-none border border-slate-200 px-4 py-3 prose text-sm text-slate-700 leading-relaxed">${html}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="max-w-2xl">
        <div class="bg-navy-900 text-white rounded-xl rounded-tr-none px-4 py-3 text-sm leading-relaxed">${escapeHtml(html)}</div>
      </div>
      <div class="w-8 h-8 bg-slate-200 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5">
        <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>`;
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function appendThinking() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'flex gap-3 fade-in';
  div.id = 'thinking-indicator';
  div.innerHTML = `
    <div class="w-8 h-8 bg-navy-900 rounded-lg flex items-center justify-center flex-shrink-0">
      <svg class="w-4 h-4 text-gold-500 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
    </div>
    <div class="bg-white rounded-xl rounded-tl-none border border-slate-200 px-4 py-3">
      <div class="dot-pulse"><span></span><span></span><span></span></div>
    </div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeThinking() {
  document.getElementById('thinking-indicator')?.remove();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^> (.+)$/gm, '<blockquote class="border-l-2 border-slate-200 pl-3 text-slate-500 italic">$1</blockquote>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

async function sendQuestion() {
  if (sending) return;
  const input = document.getElementById('question-input');
  const question = input.value.trim();
  if (!question) return;

  const jobId = document.getElementById('job-selector').value || null;
  input.value = '';
  sending = true;
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', question);
  appendThinking();

  try {
    const church_id = (window.EIMESession && window.EIMESession.getChurch()) || 'holy_comforter';
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, job_id: jobId, church_id }),
    });
    const data = await res.json();
    removeThinking();

    const meta = data.model
      ? `${data.model.split('-').slice(1,3).join('-')} · ${data.input_tokens ?? '?'}in / ${data.output_tokens ?? '?'}out tokens`
      : null;

    const skillsHtml = data.skills_consulted?.length
      ? `<div class="mt-2 flex flex-wrap gap-1">${data.skills_consulted.map(s =>
          `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${s}</span>`).join('')}</div>`
      : '';

    appendMessage('agent', renderMarkdown(data.answer) + skillsHtml, meta);
  } catch (err) {
    removeThinking();
    appendMessage('agent', `<span class="text-red-500">Error contacting the agent: ${err.message}</span>`);
  } finally {
    sending = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function clearChat() {
  const messages = document.getElementById('messages');
  while (messages.children.length > 1) messages.removeChild(messages.lastChild);
}

EIMEShell.mount({
  activeNav: 'invoices',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'chat',
      payload: {}
    });
    loadJobs();
    checkApiKey();
    const preQ = new URLSearchParams(window.location.search).get('q');
    if (preQ) {
      const inp = document.getElementById('question-input');
      if (inp) inp.value = preQ;
    }
  }
});
</script>
<script src="/eime-responsive.js"></script>
</body>
</html>
