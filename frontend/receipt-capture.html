<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Capture — Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399', 100: '#dbe7f5' },
            gold: { 500: '#c9a227', 400: '#d4ad3a' },
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/eime-bus.js"></script>
  <script src="/eime-chat-rail.js"></script>
  <script src="/eime-shell.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans">

<template id="page-center-content">
  <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between flex-shrink-0">
    <div>
      <h1 class="text-lg font-semibold text-slate-800">Receipt Capture</h1>
      <p class="text-sm text-slate-500">Capture and process receipts on-site with instant GL coding.</p>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="downloadMobileApp()" class="text-sm bg-navy-600 text-white px-4 py-2 rounded-lg hover:bg-navy-700">📱 Get Mobile App</button>
    </div>
  </header>

  <div class="flex flex-col h-full">
    <!-- Upload Section -->
    <div class="px-8 py-6 border-b border-slate-200 bg-gradient-to-r from-blue-50 to-indigo-50">
      <h2 class="text-sm font-semibold text-slate-800 mb-4">Capture Receipt</h2>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white border-2 border-dashed border-slate-300 rounded-lg p-6 text-center cursor-pointer hover:border-navy-600 hover:bg-blue-50 transition">
          <p class="text-2xl mb-2">📸</p>
          <p class="text-sm font-medium text-slate-700">Take Photo</p>
          <p class="text-xs text-slate-500 mt-1">Use device camera</p>
        </div>

        <div class="bg-white border-2 border-dashed border-slate-300 rounded-lg p-6 text-center cursor-pointer hover:border-navy-600 hover:bg-blue-50 transition">
          <p class="text-2xl mb-2">📁</p>
          <p class="text-sm font-medium text-slate-700">Upload File</p>
          <p class="text-xs text-slate-500 mt-1">PDF, JPG, or PNG</p>
        </div>
      </div>
    </div>

    <!-- Recent Captures -->
    <div class="overflow-y-auto flex-1 px-8 py-6">
      <h3 class="text-sm font-semibold text-slate-800 mb-4">Recent Captures</h3>

      <div class="space-y-3">
        <div class="bg-white border border-slate-200 rounded-lg p-4 hover:shadow-md transition">
          <div class="flex items-start justify-between mb-2">
            <div>
              <h4 class="font-semibold text-slate-800 text-sm">Duke Energy — Utility Bill</h4>
              <p class="text-xs text-slate-500 mt-1">Captured: May 8, 2026 • 2:34 PM</p>
            </div>
            <span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-medium">Coded</span>
          </div>
          <div class="grid grid-cols-3 gap-3 text-xs">
            <div>
              <p class="text-slate-500">Amount</p>
              <p class="font-mono text-slate-700 font-semibold">$324.50</p>
            </div>
            <div>
              <p class="text-slate-500">GL Code</p>
              <p class="font-mono text-slate-700 font-semibold">7200</p>
            </div>
            <div>
              <p class="text-slate-500">Confidence</p>
              <p class="text-green-700 font-semibold">98%</p>
            </div>
          </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-lg p-4 hover:shadow-md transition">
          <div class="flex items-start justify-between mb-2">
            <div>
              <h4 class="font-semibold text-slate-800 text-sm">Office Depot — Supplies</h4>
              <p class="text-xs text-slate-500 mt-1">Captured: May 7, 2026 • 10:15 AM</p>
            </div>
            <span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs font-medium">Pending Review</span>
          </div>
          <div class="grid grid-cols-3 gap-3 text-xs">
            <div>
              <p class="text-slate-500">Amount</p>
              <p class="font-mono text-slate-700 font-semibold">$127.83</p>
            </div>
            <div>
              <p class="text-slate-500">GL Code</p>
              <p class="font-mono text-slate-700 font-semibold">7400?</p>
            </div>
            <div>
              <p class="text-slate-500">Confidence</p>
              <p class="text-amber-700 font-semibold">72%</p>
            </div>
          </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-lg p-4 hover:shadow-md transition">
          <div class="flex items-start justify-between mb-2">
            <div>
              <h4 class="font-semibold text-slate-800 text-sm">Staples — Office Furniture</h4>
              <p class="text-xs text-slate-500 mt-1">Captured: May 5, 2026 • 3:45 PM</p>
            </div>
            <span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs font-medium">Coded</span>
          </div>
          <div class="grid grid-cols-3 gap-3 text-xs">
            <div>
              <p class="text-slate-500">Amount</p>
              <p class="font-mono text-slate-700 font-semibold">$892.00</p>
            </div>
            <div>
              <p class="text-slate-500">GL Code</p>
              <p class="font-mono text-slate-700 font-semibold">1500</p>
            </div>
            <div>
              <p class="text-slate-500">Confidence</p>
              <p class="text-green-700 font-semibold">95%</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile Features -->
      <div class="mt-8 bg-indigo-50 border border-indigo-200 rounded-lg p-4">
        <h3 class="font-semibold text-indigo-900 text-sm mb-3">📱 Mobile App Features</h3>
        <ul class="text-sm text-indigo-800 space-y-2">
          <li class="flex items-start gap-2">
            <span class="text-lg">✓</span>
            <span><strong>On-Site Capture:</strong> Photograph receipts immediately at point of purchase or event</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-lg">✓</span>
            <span><strong>OCR Processing:</strong> Auto-extract amount, vendor, and date from receipt image</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-lg">✓</span>
            <span><strong>GL Coding:</strong> Instant GL code suggestion based on vendor and amount</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-lg">✓</span>
            <span><strong>Sync to Cloud:</strong> Receipts automatically sync to EIME for processing</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-lg">✓</span>
            <span><strong>Offline Support:</strong> Capture works offline; syncs when connection returns</span>
          </li>
        </ul>
      </div>
    </div>
  </div>
</template>

<script>
async function init() {
  await EIMEShell.mount({
    activeNav: 'upload-invoice',
    pageTitle: 'Receipt Capture',
    centerContent: document.getElementById('page-center-content').innerHTML
  });

  window.eime.setContext({
    page: 'receipt-capture',
    payload: { }
  });
}

function downloadMobileApp() {
  alert('Mobile app download:\n\n• iOS: App Store (EIME Books)\n• Android: Google Play (EIME Books)\n\nScanning receipts saves them securely to your church account.');
}

window.downloadMobileApp = downloadMobileApp;

init();
</script>

</body>
</html>
