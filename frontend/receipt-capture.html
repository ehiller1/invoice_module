<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Receipt Capture — Books</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399', 100: '#dbe7f5' },
            gold: { 500: '#c9a227', 400: '#d4ad3a' },
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/eime-bus.js"></script>
  <script src="/eime-chat-rail.js"></script>
  <script src="/eime-shell.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans">

<template id="page-center-content">
  <header class="bg-white border-b border-slate-200 px-8 py-4 flex items-center justify-between flex-shrink-0">
    <div>
      <h1 class="text-lg font-semibold text-slate-800">Receipt Capture</h1>
      <p class="text-sm text-slate-500">Drop a receipt here and walk away — we OCR it, suggest a GL code, and route low-confidence items to the Questions queue.</p>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="downloadMobileApp()" class="text-xs text-slate-500 hover:text-slate-700 underline">📱 Get the mobile app</button>
    </div>
  </header>

  <!-- Toast notifications -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <div class="flex flex-col h-full">
    <!-- Drag-and-drop primary affordance -->
    <div class="px-8 py-6 border-b border-slate-200">
      <input type="file" id="receipt-file-input" accept=".pdf,.jpg,.jpeg,.png" multiple style="display: none;" />

      <div id="receipt-dropzone"
           onclick="document.getElementById('receipt-file-input').click()"
           class="bg-white border-2 border-dashed border-slate-300 rounded-xl p-10 text-center cursor-pointer hover:border-navy-600 hover:bg-blue-50 transition">
        <p class="text-5xl mb-3">📥</p>
        <p class="text-base font-medium text-slate-800">Drop receipts here, or click to choose files</p>
        <p class="text-xs text-slate-500 mt-2">PDF · JPG · PNG · multiple files OK</p>
        <p id="receipt-dropzone-hint" class="text-xs text-slate-400 mt-1">We OCR each one, suggest a GL code, and add high-confidence items straight to the books.</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-4">
        <button onclick="document.getElementById('receipt-file-input').click()"
                class="bg-white border border-slate-200 rounded-lg p-3 text-sm font-medium text-slate-700 hover:bg-slate-50 transition flex items-center gap-2 justify-center">
          📸 Take photo / use camera
        </button>
        <button onclick="document.getElementById('receipt-file-input').click()"
                class="bg-white border border-slate-200 rounded-lg p-3 text-sm font-medium text-slate-700 hover:bg-slate-50 transition flex items-center gap-2 justify-center">
          📁 Choose file from this computer
        </button>
      </div>
    </div>

    <!-- Recent Captures -->
    <div class="overflow-y-auto flex-1 px-8 py-6">
      <h3 class="text-sm font-semibold text-slate-800 mb-4">Recent Captures</h3>
      <div id="receipts-container" class="space-y-3"></div>

      <!-- Mobile app — collapsed by default, the desktop drag-drop is the primary flow. -->
      <details class="mt-8">
        <summary class="cursor-pointer text-xs text-slate-500 hover:text-slate-700">📱 On the go? Get the mobile app for on-site capture</summary>
        <div class="mt-3 bg-indigo-50 border border-indigo-200 rounded-lg p-4 text-sm text-indigo-800">
          The mobile app photographs receipts at point of purchase, OCRs offline, and syncs back here once you reconnect. Same backend — receipts captured on mobile show up in this list.
        </div>
      </details>
    </div>
  </div>
</template>

<script>
const CHURCH_ID = (window.EIMESession && EIMESession.getChurch()) || 'holy_comforter';
let recentReceipts = [];

function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const bgColor = type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-blue-50 border-blue-200 text-blue-700';
  const icon = type === 'error' ? '❌' : type === 'success' ? '✓' : 'ℹ️';
  toast.className = `border rounded-lg px-4 py-3 text-sm ${bgColor} shadow-lg animate-pulse`;
  toast.innerHTML = `<div class="flex items-center gap-2"><span>${icon}</span><span>${message}</span></div>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

async function init() {
  await EIMEShell.mount({
    activeNav: 'receipt-capture',
    pageTitle: 'Receipt Capture',
    centerContent: document.getElementById('page-center-content').innerHTML
  });

  window.eime.setContext({
    page: 'receipt-capture',
    payload: { }
  });

  document.getElementById('receipt-file-input').addEventListener('change', handleFileUpload);

  // Real drag-and-drop on the dropzone — accepts multiple files, ignores
  // non-image/PDF drops, surfaces visual feedback.
  const dz = document.getElementById('receipt-dropzone');
  if (dz) {
    const setHover = (on) => {
      dz.classList.toggle('border-navy-600', on);
      dz.classList.toggle('bg-blue-50', on);
    };
    ['dragenter', 'dragover'].forEach((evt) => {
      dz.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); setHover(true); });
    });
    ['dragleave', 'dragend', 'drop'].forEach((evt) => {
      dz.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); setHover(false); });
    });
    dz.addEventListener('drop', async (e) => {
      const files = Array.from(e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files : []);
      const accepted = files.filter(f => /\.(pdf|jpe?g|png)$/i.test(f.name));
      if (accepted.length === 0) {
        showToast('No PDF/JPG/PNG files in that drop.', 'warn');
        return;
      }
      if (accepted.length < files.length) {
        showToast(`Skipped ${files.length - accepted.length} unsupported file(s).`, 'warn');
      }
      // Reuse handleFileUpload one file at a time so progress is visible.
      const input = document.getElementById('receipt-file-input');
      for (const f of accepted) {
        const dt = new DataTransfer();
        dt.items.add(f);
        input.files = dt.files;
        await handleFileUpload({ target: input });
      }
    });
  }

  await loadRecentReceipts();
}

async function loadRecentReceipts() {
  try {
    const response = await fetch(`/api/churches/${CHURCH_ID}/receipts`);
    if (response.ok) {
      recentReceipts = await response.json();
      renderReceipts();
    }
  } catch (error) {
    console.error('Error loading receipts:', error);
  }
}

function renderReceipts() {
  const container = document.getElementById('receipts-container');
  if (!recentReceipts || recentReceipts.length === 0) {
    container.innerHTML = '<p class="text-sm text-slate-500 text-center py-8">No receipts captured yet.</p>';
    return;
  }

  container.innerHTML = recentReceipts.map(receipt => `
    <div class="bg-white border border-slate-200 rounded-lg p-4 hover:shadow-md transition">
      <div class="flex items-start justify-between mb-2">
        <div>
          <h4 class="font-semibold text-slate-800 text-sm">${receipt.vendor || 'Unknown'} — ${receipt.description || 'Receipt'}</h4>
          <p class="text-xs text-slate-500 mt-1">Captured: ${new Date(receipt.created_at).toLocaleDateString()} • ${new Date(receipt.created_at).toLocaleTimeString()}</p>
        </div>
        <span class="px-2 py-1 ${receipt.gl_code ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700'} rounded text-xs font-medium">
          ${receipt.gl_code ? 'Coded' : 'Pending Review'}
        </span>
      </div>
      <div class="grid grid-cols-3 gap-3 text-xs">
        <div>
          <p class="text-slate-500">Amount</p>
          <p class="font-mono text-slate-700 font-semibold">$${(receipt.amount || 0).toFixed(2)}</p>
        </div>
        <div>
          <p class="text-slate-500">GL Code</p>
          <p class="font-mono text-slate-700 font-semibold">${receipt.gl_code || 'TBD'}</p>
        </div>
        <div>
          <p class="text-slate-500">Confidence</p>
          <p class="text-${receipt.confidence >= 90 ? 'green' : receipt.confidence >= 70 ? 'amber' : 'red'}-700 font-semibold">${(receipt.confidence || 0).toFixed(0)}%</p>
        </div>
      </div>
    </div>
  `).join('');
}

async function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) {
    showToast('Please select a file to upload', 'info');
    return;
  }

  if (!['image/jpeg', 'image/png', 'application/pdf'].includes(file.type)) {
    showToast('Only PDF, JPG, and PNG files are supported', 'error');
    return;
  }

  if (file.size > 50 * 1024 * 1024) {
    showToast('File is too large. Maximum size is 50 MB', 'error');
    return;
  }

  showToast('Processing receipt...', 'info');

  // Backend expects JSON with base64-encoded image_data, not multipart FormData
  let base64;
  try {
    base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  } catch (error) {
    showToast('Failed to read file. Please try again', 'error');
    console.error('FileReader error:', error);
    return;
  }

  try {
    const response = await fetch('/api/receipts/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image_data: base64, file_name: file.name, church_id: CHURCH_ID }),
    });

    if (!response.ok) {
      const errorData = await response.json().catch(() => ({}));
      const errorMsg = errorData.detail || response.statusText || 'Unable to process receipt';
      showToast(`Error: ${errorMsg}`, 'error');
      return;
    }

    const receipt = await response.json();

    if (receipt.vendor && receipt.amount) {
      const glSuggestion = await getSuggestedGL(receipt.vendor, receipt.amount);
      if (glSuggestion && glSuggestion.gl_code) {
        receipt.gl_code = glSuggestion.gl_code;
        receipt.confidence = glSuggestion.confidence || 75;
      }
    }

    recentReceipts.unshift(receipt);
    renderReceipts();
    showToast(`✓ Receipt processed: ${receipt.vendor_info?.name || 'Unknown vendor'}`, 'success');
  } catch (error) {
    console.error('Error uploading receipt:', error);
    showToast(`Network error: ${error.message}. Check your connection and try again`, 'error');
  }

  event.target.value = '';
}

async function getSuggestedGL(vendor, amount) {
  try {
    const response = await fetch(`/api/receipts/suggest-gl?vendor=${encodeURIComponent(vendor)}&amount=${amount}&church_id=${CHURCH_ID}`);
    if (response.ok) {
      return await response.json();
    }
  } catch (error) {
    console.error('Error getting GL suggestion:', error);
  }
  return null;
}

function downloadMobileApp() {
  alert('Mobile app download:\n\n• iOS: App Store (EIME Books)\n• Android: Google Play (EIME Books)\n\nScanning receipts saves them securely to your church account.');
}

window.downloadMobileApp = downloadMobileApp;

init();
</script>

</body>
</html>
