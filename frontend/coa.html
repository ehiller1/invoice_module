<!DOCTYPE html>
<html>
<head>
<title>EIME — Chart of Accounts</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold text-slate-900 mb-2">Chart of Accounts</h1>
  <p class="text-slate-600 mb-6">Episcopal church GL structure with fund restrictions and semantic search</p>

  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Total Accounts</p>
      <p class="text-3xl font-bold text-slate-900" id="total-accounts">73</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Funds</p>
      <p class="text-3xl font-bold text-slate-900" id="total-funds">6</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Restricted</p>
      <p class="text-3xl font-bold text-orange-600" id="restricted-count">12</p>
    </div>
  </div>

  <div class="mb-6">
    <label class="text-sm font-semibold text-slate-700 mb-2 block">Search Semantic COA</label>
    <div class="flex gap-2">
      <input id="coa-search" type="text" placeholder="e.g., 'choir music expenses'" 
        class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none"
        onkeyup="searchCOA()" />
      <button onclick="searchCOA()" class="px-4 py-2 bg-navy-900 text-white rounded-lg hover:bg-navy-800">Search</button>
    </div>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-200">
      <h2 class="text-lg font-semibold text-slate-900">GL Accounts</h2>
    </div>
    <div id="coa-list" class="divide-y divide-slate-200"></div>
  </div>

  <!-- Account Detail Modal -->
  <div id="account-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4" id="modal-account-code">GL Account</h2>
      <div id="modal-account-content" class="space-y-4 mb-6"></div>
      <button onclick="closeAccountModal()" class="w-full px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Close</button>
    </div>
  </div>
</div>
</template>

<script>
const API = 'http://localhost:8000';
let allAccounts = [];

EIMEShell.mount({
  activeNav: 'settings',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    loadCOA();
  }
});

async function loadCOA() {
  try {
    const res = await fetch(`${API}/api/coa?church_id=holy_comforter`);
    const data = await res.json();
    allAccounts = data.accounts || [];
    
    document.getElementById('total-accounts').textContent = allAccounts.length;
    document.getElementById('total-funds').textContent = data.funds?.length || 6;
    document.getElementById('restricted-count').textContent = allAccounts.filter(a => a.fund_restriction).length;
    
    renderAccounts(allAccounts);
  } catch (e) {
    console.error('Error loading COA:', e);
  }
}

async function searchCOA() {
  const query = document.getElementById('coa-search').value;
  if (!query.trim()) {
    renderAccounts(allAccounts);
    return;
  }
  
  try {
    const res = await fetch(`${API}/api/coa/search?q=${encodeURIComponent(query)}&church_id=holy_comforter`);
    const results = await res.json();
    renderAccounts(results.matches || []);
  } catch (e) {
    console.error('Search error:', e);
  }
}

function renderAccounts(accounts) {
  const list = document.getElementById('coa-list');
  list.innerHTML = (accounts || []).map(acc => `
    <div class="px-6 py-4 hover:bg-slate-50 cursor-pointer transition-colors" onclick="showAccount('${acc.gl_code}')">
      <div class="flex items-center justify-between">
        <div>
          <p class="font-medium text-slate-900">${acc.gl_code}</p>
          <p class="text-sm text-slate-600">${acc.gl_name || 'Unknown'}</p>
          ${acc.fund_restriction ? `<p class="text-xs text-orange-600 mt-1">🔒 Restricted: ${acc.fund_restriction}</p>` : ''}
        </div>
        <div class="text-right">
          <span class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-800">${acc.fund || 'General'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

async function showAccount(glCode) {
  const acc = allAccounts.find(a => a.gl_code === glCode);
  if (!acc) return;
  
  document.getElementById('modal-account-code').textContent = `${glCode} — ${acc.gl_name}`;
  document.getElementById('modal-account-content').innerHTML = `
    <div class="space-y-3">
      <div class="bg-slate-50 rounded p-3">
        <p class="text-xs text-slate-500 mb-1 font-semibold">Account Type</p>
        <p class="text-sm font-medium text-slate-900">${acc.account_type || 'Unknown'}</p>
      </div>
      <div class="bg-slate-50 rounded p-3">
        <p class="text-xs text-slate-500 mb-1 font-semibold">Fund</p>
        <p class="text-sm font-medium text-slate-900">${acc.fund || 'General Fund'}</p>
      </div>
      ${acc.fund_restriction ? `
        <div class="bg-orange-50 border border-orange-200 rounded p-3">
          <p class="text-xs text-orange-700 font-semibold mb-1">Fund Restriction</p>
          <p class="text-sm text-orange-800">${acc.fund_restriction}</p>
        </div>
      ` : ''}
      ${acc.description ? `
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1 font-semibold">Description</p>
          <p class="text-sm text-slate-700">${acc.description}</p>
        </div>
      ` : ''}
    </div>
  `;
  
  document.getElementById('account-modal').classList.remove('hidden');
}

function closeAccountModal() {
  document.getElementById('account-modal').classList.add('hidden');
}
</script>

</body>
</html>
