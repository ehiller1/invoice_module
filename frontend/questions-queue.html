<!DOCTYPE html>
<html>
<head>
<title>EIME — Question Queue</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
<script src="/components/card-renderer.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-6xl mx-auto p-6">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Questions for You</h1>
    <p class="text-slate-600">The AI has questions about these transactions — <span id="queue-count">0</span> open</p>
  </div>

  <!-- Questions List -->
  <div id="questions-list" class="space-y-4">
    <p class="text-slate-500 text-center py-8">Loading question queue...</p>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
const CHURCH_ID = (window.EIMESession && EIMESession.getChurch()) || 'holy_comforter';
let currentUserTier = 2;
let allQuestions = [];

EIMEShell.mount({
  activeNav: 'council',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'questions-queue',
      payload: { church_id: CHURCH_ID }
    });
    loadQuestions();
    setInterval(loadQuestions, 10000);
  }
});

async function loadQuestions() {
  try {
    // Phase 3: Call real endpoint
    const res = await fetch(`${API}/api/churches/${CHURCH_ID}/questions`);
    const data = await res.json();

    if (data.cards && Array.isArray(data.cards) && data.cards.length > 0) {
      // Convert DB format to frontend format
      allQuestions = data.cards.map((card, idx) => ({
        question_id: card.card_id,
        state: card.status,
        query: card.title,
        intent: card.evidence?.intent || 'general_inquiry',
        answer: card.evidence?.answer || null,
        provenance: card.evidence?.provenance || [],
        follow_on_suggestions: card.evidence?.follow_on_suggestions || [],
        asker_id: card.assigned_to || 'analyst@example.com',
        privacy_class: card.evidence?.privacy_class || 'P2',
        version: 1,
        created_at: card.created_at,
        updated_at: card.resolved_at || card.created_at
      }));
    } else {
      // Fallback to mock data
      allQuestions = [
        {
          question_id: 'q_001',
          state: 'OPEN',
          query: 'What is our projected cash position for Q4 assuming 95% pledge fulfillment?',
          intent: 'pledge_fulfillment_cash_projection',
          answer: null,
          provenance: [],
          follow_on_suggestions: [
            'Show scenario at 85% fulfillment',
            'Compare to prior year Q4',
            'Flag major pledge gaps'
          ],
          asker_id: 'finance_analyst@example.com',
          privacy_class: 'P2',
          version: 1,
          created_at: new Date(Date.now() - 4 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 4 * 3600000).toISOString()
        },
        {
          question_id: 'q_002',
          state: 'OPEN',
          query: 'Which restricted funds have experienced mission drift?',
          intent: 'mission_drift_analysis',
          answer: null,
          provenance: [],
          follow_on_suggestions: [
            'Show donor communication templates',
            'List potential reallocations',
            'Flag legal restrictions'
          ],
          asker_id: 'cfo@example.com',
          privacy_class: 'P2',
          version: 1,
          created_at: new Date(Date.now() - 24 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 24 * 3600000).toISOString()
        }
      ];
    }

    renderQuestions();
  } catch (e) {
    console.error('Error loading questions:', e);
    allQuestions = [];
    renderQuestions();
  }
}

function renderQuestions() {
  document.getElementById('queue-count').textContent = allQuestions.filter(q => q.state === 'OPEN').length;

  const container = document.getElementById('questions-list');

  if (allQuestions.length === 0) {
    container.innerHTML = '<p class="text-slate-500 text-center py-8">✓ No questions in queue</p>';
    return;
  }

  container.innerHTML = allQuestions.map(q => {
    return `
      <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 transition-colors">
        <div class="mb-3">
          <div class="flex items-start justify-between mb-2">
            <p class="font-semibold text-slate-900">${q.query}</p>
            <p class="text-xs text-slate-500">${formatDate(q.created_at)}</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="hidden" data-intent="${q.intent}"></span>
            <span class="text-xs text-slate-600">Asker: ${q.asker_id}</span>
          </div>
        </div>
        ${q.answer ? `
          <div class="bg-green-50 border border-green-200 rounded p-3 mb-3">
            <p class="text-sm text-green-900"><strong>Answer:</strong> ${q.answer}</p>
          </div>
        ` : `
          <div class="bg-amber-50 border border-amber-200 rounded p-3 mb-3">
            <p class="text-sm text-amber-900">Awaiting response...</p>
          </div>
        `}
        ${q.follow_on_suggestions && q.follow_on_suggestions.length > 0 ? `
          <div class="text-xs text-slate-600">
            <p class="font-semibold mb-2">Suggested Follow-Ups</p>
            <ul class="space-y-1">
              ${q.follow_on_suggestions.map(s => `<li class="text-slate-700">• ${s}</li>`).join('')}
            </ul>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (hours < 1) return 'Just now';
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}
</script>

</body>
</html>
