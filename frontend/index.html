<!DOCTYPE html>
<html>
<head>
<title>Enter a Bill — Books</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  .drop-zone { transition: all 0.2s ease; }
  .drop-zone.drag-over { @apply border-navy-700 bg-blue-50; }
  .step-bar { transition: width 0.6s ease; }
  .fade-in { animation: fadeIn 0.3s ease-in; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .pill { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
</style>
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-4xl mx-auto p-6">
  <!-- Header -->
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">Enter a Bill</h1>
    <p class="text-slate-600">Upload a bill, invoice, or receipt &mdash; we'll read it, suggest where it goes, and route it for approval.</p>
  </div>

  <!-- Church Selector -->
  <div class="mb-6 flex items-end gap-4">
    <div class="flex-1">
      <label class="text-sm font-semibold text-slate-700 mb-2 block">Select Church</label>
      <select id="church-selector" class="w-full text-sm border border-slate-300 rounded-lg px-4 py-2.5 bg-white text-slate-700 focus:ring-2 focus:ring-navy-600 focus:border-transparent outline-none">
        <option value="">Loading churches…</option>
      </select>
    </div>
  </div>

  <!-- Upload Card -->
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 mb-6">
    <h2 class="text-lg font-semibold text-slate-800 mb-1">Document Upload</h2>
    <p class="text-sm text-slate-500 mb-6">Accepts PDF invoices, utility bills, credit memos, and payment remittances. Max 50 MB.</p>

    <div id="drop-zone"
      class="drop-zone border-2 border-dashed border-slate-300 rounded-xl p-12 text-center cursor-pointer hover:border-navy-600 hover:bg-slate-50 transition-all"
      ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)"
      onclick="document.getElementById('file-input').click()">
      <div class="flex flex-col items-center gap-3">
        <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center">
          <svg class="w-8 h-8 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <div>
          <p class="text-slate-600 font-medium text-sm">Drop PDF here or click to browse</p>
          <p class="text-slate-400 text-xs mt-1">PDF only • Up to 50 MB</p>
        </div>
      </div>
      <input type="file" id="file-input" accept=".pdf" class="hidden" />
    </div>

    <div class="mt-6 grid grid-cols-2 gap-4">
      <div>
        <label class="text-xs font-medium text-slate-600 mb-1.5 block">Document Type</label>
        <select id="doc-type" class="w-full text-sm border border-slate-200 rounded-lg px-3 py-2.5 bg-white text-slate-700 focus:ring-2 focus:ring-navy-600 outline-none">
          <option value="INVOICE">Invoice</option>
          <option value="UTILITY_BILL">Utility Bill</option>
          <option value="PAYMENT_REMITTANCE">Payment Remittance</option>
          <option value="CREDIT_MEMO">Credit Memo</option>
          <option value="DONATION_RECEIPT">Donation Receipt</option>
        </select>
      </div>
      <div class="flex items-end">
        <button id="upload-btn" onclick="uploadInvoice()"
          class="w-full bg-navy-900 hover:bg-navy-800 text-white font-medium text-sm py-2.5 px-4 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          Process Invoice
        </button>
      </div>
    </div>
  </div>

  <!-- Pipeline Status (hidden until upload starts) -->
  <div id="pipeline-panel" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-8 fade-in">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-lg font-semibold text-slate-800">Processing Pipeline</h2>
      <span id="pipeline-status-badge" class="pill bg-blue-100 text-blue-800">Running</span>
    </div>
    <div class="space-y-3" id="pipeline-steps"></div>
  </div>

  <!-- Results (hidden until complete) -->
  <div id="results-panel" class="hidden bg-white rounded-2xl shadow-sm border border-slate-200 p-8 fade-in">
    <h2 class="text-lg font-semibold text-slate-800 mb-4">Processing Complete</h2>
    <div id="results-content"></div>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
let currentChurch = 'holy_comforter';
let currentJobId = null;

EIMEShell.mount({
  activeNav: 'invoices',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'invoices',
      payload: { church_id: currentChurch, job_id: null }
    });
    loadChurches();
    setupUploadHandlers();
  }
});

async function loadChurches() {
  try {
    const res = await fetch(`${API}/api/churches`);
    const churches = await res.json();
    const select = document.getElementById('church-selector');
    select.innerHTML = churches.map(c => `<option value="${c.church_id}">${c.church_name}</option>`).join('');
    select.addEventListener('change', (e) => {
      currentChurch = e.target.value;
      window.eime.setContext({
        page: 'invoices',
        payload: { church_id: currentChurch, job_id: currentJobId }
      });
    });
  } catch (e) {
    console.error('Failed to load churches:', e);
  }
}

function setupUploadHandlers() {
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', handleDragOver);
  dropZone.addEventListener('dragleave', handleDragLeave);
  dropZone.addEventListener('drop', handleDrop);
  fileInput.addEventListener('change', handleFileSelect);
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}

function handleDragLeave(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    document.getElementById('file-input').files = files;
    uploadInvoice();
  }
}

function handleFileSelect(e) {
  if (e.target.files.length > 0) {
    uploadInvoice();
  }
}

async function uploadInvoice() {
  const fileInput = document.getElementById('file-input');
  const file = fileInput.files[0];
  if (!file) return;

  const docType = document.getElementById('doc-type').value;
  const uploadBtn = document.getElementById('upload-btn');
  uploadBtn.disabled = true;

  const fd = new FormData();
  fd.append('file', file);
  fd.append('doc_type', docType);
  fd.append('church_id', currentChurch);

  try {
    const res = await fetch(`${API}/api/invoice/upload`, { method: 'POST', body: fd });
    const job = await res.json();
    currentJobId = job.job_id;

    window.eime.setContext({
      page: 'invoices',
      payload: { church_id: currentChurch, job_id: currentJobId }
    });

    document.getElementById('pipeline-panel').classList.remove('hidden');
    initPipelineSteps();
    pollJobStatus();
  } catch (e) {
    alert(`Upload failed: ${e.message}`);
    uploadBtn.disabled = false;
  }
}

function initPipelineSteps() {
  const steps = ['EXTRACTING', 'CLASSIFYING', 'MAPPING', 'BUDGETING', 'RISK_ASSESSMENT', 'EMITTING'];
  const container = document.getElementById('pipeline-steps');
  container.innerHTML = steps.map(step => `
    <div class="step-item flex items-center gap-4" data-step="${step}">
      <div class="step-icon w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="text-sm font-medium text-slate-700">${step}</p>
      </div>
      <div class="step-status text-xs text-slate-400">Pending</div>
    </div>
  `).join('');
}

async function pollJobStatus() {
  let lastStep = null;

  const stepNarration = {
    EXTRACTING: '📄 Extracting invoice data from PDF...',
    CLASSIFYING: '🏷️ Classifying line items...',
    MAPPING: '📊 Mapping to general ledger accounts...',
    BUDGETING: '💰 Checking budget impact and fund restrictions...',
    RISK_ASSESSMENT: '⚠️ Assessing risk signals...',
    EMITTING: '📝 Generating journal entry draft...',
  };

  const updateStep = (step, status, color) => {
    const item = document.querySelector(`[data-step="${step}"]`);
    if (item) {
      item.querySelector('.step-status').textContent = status;
      item.querySelector('.step-status').className = `step-status text-xs ${color}`;
    }
  };

  const checkJob = async () => {
    try {
      const res = await fetch(`${API}/api/jobs/${currentJobId}`);
      const job = await res.json();

      // On step transition, emit narration to chat rail (FR-01.3)
      if (job.current_step && job.current_step !== lastStep) {
        lastStep = job.current_step;
        if (stepNarration[job.current_step] && window.EIMEChatRail) {
          window.EIMEChatRail.appendSystemNarration(stepNarration[job.current_step]);
        }
      }

      // Update context with current step so chat knows progress
      window.eime.setContext({
        page: 'invoices',
        payload: { church_id: currentChurch, job_id: currentJobId, step: job.current_step }
      });

      updateStep(job.current_step, 'In Progress', 'text-blue-600');

      if (job.status === 'COMPLETED') {
        updateStep(job.current_step, 'Complete', 'text-green-600');
        document.getElementById('pipeline-status-badge').textContent = 'Complete';
        document.getElementById('pipeline-status-badge').className = 'pill bg-green-100 text-green-800';
        if (window.EIMEChatRail) {
          window.EIMEChatRail.appendSystemNarration('✅ Invoice processing complete. Ready for review.');
        }
        showResults(job);
        return;
      }

      if (job.status === 'FAILED') {
        updateStep(job.current_step, 'Failed', 'text-red-600');
        document.getElementById('pipeline-status-badge').textContent = 'Failed';
        document.getElementById('pipeline-status-badge').className = 'pill bg-red-100 text-red-800';
        if (window.EIMEChatRail) {
          window.EIMEChatRail.appendSystemNarration('❌ Processing failed. Please check the error logs.');
        }
        return;
      }

      setTimeout(checkJob, 2000);
    } catch (e) {
      console.error('Poll failed:', e);
    }
  };

  checkJob();
}

function showResults(job) {
  const resultsPanel = document.getElementById('results-panel');
  const resultsContent = document.getElementById('results-content');

  resultsContent.innerHTML = `
    <div class="space-y-4">
      <div class="bg-green-50 border border-green-200 rounded-lg p-4">
        <p class="text-sm text-green-800"><strong>Job ID:</strong> ${job.job_id}</p>
        <p class="text-sm text-green-800 mt-2">Extracted <strong>${job.line_items?.length || 0}</strong> line items</p>
      </div>
      <button onclick="location.href='/jobs.html'" class="px-4 py-2 bg-navy-900 text-white rounded-lg hover:bg-navy-800">
        Review in Processing Queue →
      </button>
    </div>
  `;

  resultsPanel.classList.remove('hidden');
}
</script>

</body>
</html>
