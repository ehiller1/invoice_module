<!DOCTYPE html>
<html>
<head>
<title>EIME — Exception Queue</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
<script src="/components/card-renderer.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-6xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 mb-2">Items Needing Review</h1>
      <p class="text-slate-600">Flagged items that need your decision — <span id="queue-count">0</span> open</p>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleFilterPanel()" class="px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700">🔍 Filter</button>
      <button onclick="toggleBatchMode()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" id="batch-toggle">☑️ Batch</button>
    </div>
  </div>

  <!-- Filter Panel (hidden by default) -->
  <div id="filter-panel" class="hidden bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
    <div class="grid grid-cols-4 gap-4">
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">Priority</label>
        <select id="filter-priority" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All Priorities</option>
          <option value="HIGH">High</option>
          <option value="NORMAL">Normal</option>
          <option value="LOW">Low</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">State</label>
        <select id="filter-state" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All States</option>
          <option value="OPEN">Open</option>
          <option value="IN_REVIEW">In Review</option>
          <option value="RESOLVED">Resolved</option>
          <option value="CLOSED">Closed</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">Type</label>
        <select id="filter-type" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All Types</option>
          <option value="ambiguous_gift">Ambiguous Gift</option>
          <option value="capitalization_gap">Capitalization Gap</option>
          <option value="pastoral_conflict">Pastoral Conflict</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">Assigned</label>
        <select id="filter-assigned" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All Users</option>
          <option value="me">Assigned to Me</option>
          <option value="unassigned">Unassigned</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Batch Actions (hidden by default) -->
  <div id="batch-actions" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
    <div class="flex items-center justify-between">
      <p class="text-sm text-blue-900">
        <input type="checkbox" id="select-all" onchange="toggleSelectAll()" class="mr-2" />
        <span id="selected-count">0 selected</span>
      </p>
      <div class="flex gap-2">
        <button onclick="batchApprove()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm">✓ Approve All</button>
        <button onclick="batchReject()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm">✗ Reject All</button>
        <button onclick="batchRoute()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">→ Route Selected</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

  <!-- Exception Cards List -->
  <div id="exceptions-list" class="space-y-4">
    <p class="text-slate-500 text-center py-8">Loading exception queue...</p>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
const CHURCH_ID = 'holy_comforter';
let currentUserTier = 2;
let allExceptions = [];
let filteredExceptions = [];
let batchMode = false;
let selectedIds = new Set();

EIMEShell.mount({
  activeNav: 'council',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'exceptions-queue',
      payload: { church_id: CHURCH_ID }
    });
    loadExceptions();
    setInterval(loadExceptions, 10000);
  }
});

/**
 * Load exceptions from backend (Phase 3).
 * Calls GET /api/churches/{church_id}/exceptions
 * Falls back to mock data if endpoint not yet implemented.
 */
async function loadExceptions() {
  try {
    // Phase 3: Call real endpoint
    const res = await fetch(`${API}/api/churches/${CHURCH_ID}/exceptions`);
    const data = await res.json();

    // If endpoint returns exceptions array, use it; otherwise use mock
    if (data.cards && Array.isArray(data.cards) && data.cards.length > 0) {
      // Convert DB format to frontend format
      allExceptions = data.cards.map((card, idx) => ({
        exception_id: card.card_id,
        exception_type: card.exception_type,
        state: card.status,
        summary: card.title,
        details: {
          reason: card.description,
          ...card.evidence
        },
        assigned_to: card.assigned_to,
        priority: card.evidence?.priority || 'NORMAL',
        privacy_class: card.evidence?.privacy_class || 'P2',
        version: 1,
        created_at: card.created_at,
        updated_at: card.resolved_at || card.created_at
      }));
    } else {
      // Fallback to mock data for Phase 3 testing
      allExceptions = [
        {
          exception_id: 'exc_001',
          exception_type: 'ambiguous_gift',
          state: 'OPEN',
          summary: '$50K anonymous gift with unclear intent',
          details: {
            reason: 'Donor letter references both endowment and operations; need clarification.',
            gift_amount: 50000,
            donor_name: 'Anonymous'
          },
          assigned_to: null,
          priority: 'HIGH',
          privacy_class: 'P1',
          version: 1,
          created_at: new Date(Date.now() - 2 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 2 * 3600000).toISOString()
        },
        {
          exception_id: 'exc_002',
          exception_type: 'capitalization_gap',
          state: 'IN_REVIEW',
          summary: 'Capitalization threshold variance on $250K equipment purchase',
          details: {
            reason: 'Asset cost in expense account; needs reclassification per policy.',
            amount: 250000
          },
          assigned_to: 'treasurer@example.com',
          priority: 'NORMAL',
          privacy_class: 'P2',
          version: 1,
          created_at: new Date(Date.now() - 24 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 12 * 3600000).toISOString()
        }
      ];
    }

    filteredExceptions = [...allExceptions];
    applyFilters();
    renderExceptions();
  } catch (e) {
    console.error('Error loading exceptions:', e);
    // Still render with empty state on error
    filteredExceptions = [];
    renderExceptions();
  }
}

function toggleFilterPanel() {
  const panel = document.getElementById('filter-panel');
  panel.classList.toggle('hidden');
}

function toggleBatchMode() {
  batchMode = !batchMode;
  const actions = document.getElementById('batch-actions');
  const toggle = document.getElementById('batch-toggle');

  if (batchMode) {
    actions.classList.remove('hidden');
    toggle.classList.add('bg-blue-700');
  } else {
    actions.classList.add('hidden');
    toggle.classList.remove('bg-blue-700');
    selectedIds.clear();
  }

  renderExceptions();
}

function applyFilters() {
  const priority = document.getElementById('filter-priority').value;
  const state = document.getElementById('filter-state').value;
  const type = document.getElementById('filter-type').value;
  const assigned = document.getElementById('filter-assigned').value;

  filteredExceptions = allExceptions.filter(exc => {
    if (priority && exc.priority !== priority) return false;
    if (state && exc.state !== state) return false;
    if (type && exc.exception_type !== type) return false;
    if (assigned === 'me' && exc.assigned_to !== 'current_user@example.com') return false;
    if (assigned === 'unassigned' && exc.assigned_to !== null) return false;
    return true;
  });

  renderExceptions();
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const bgColor = type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : type === 'success' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-blue-50 border-blue-200 text-blue-700';
  const icon = type === 'error' ? '❌' : type === 'success' ? '✓' : 'ℹ️';
  toast.className = `border rounded-lg px-4 py-3 text-sm ${bgColor} shadow-lg`;
  toast.innerHTML = `<div class="flex items-center gap-2"><span>${icon}</span><span>${message}</span></div>`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function renderExceptions() {
  document.getElementById('queue-count').textContent = filteredExceptions.filter(e => e.state === 'OPEN').length;

  const container = document.getElementById('exceptions-list');

  if (filteredExceptions.length === 0) {
    container.innerHTML = `
      <div class="bg-blue-50 border border-blue-200 rounded-lg p-8 text-center">
        <div class="text-5xl mb-3">📋</div>
        <h3 class="text-lg font-semibold text-blue-900 mb-2">No Exceptions Currently</h3>
        <p class="text-sm text-blue-800 mb-4">Exceptions flag items that need your attention:</p>
        <ul class="text-sm text-blue-800 space-y-2 mb-6 max-w-lg mx-auto text-left">
          <li class="flex items-start gap-2">
            <span class="text-lg mt-0">🎁</span>
            <span><strong>Ambiguous Gifts:</strong> Donations with unclear intent (endowment vs operations)</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-lg">💰</span>
            <span><strong>Capitalization Issues:</strong> Assets coded to expense accounts; need reclassification</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="text-lg">⚠️</span>
            <span><strong>Policy Violations:</strong> Transactions that conflict with church governance rules</span>
          </li>
        </ul>
        <p class="text-xs text-blue-700">Exceptions are created when the system detects unusual transactions or when staff members flag items for review.</p>
      </div>
    `;
    return;
  }

  container.innerHTML = filteredExceptions.map(exc => {
    const priorityColor = {
      HIGH: 'bg-red-100 border-red-300 text-red-900',
      NORMAL: 'bg-yellow-100 border-yellow-300 text-yellow-900',
      LOW: 'bg-blue-100 border-blue-300 text-blue-900'
    }[exc.priority] || 'bg-slate-100';

    const stateColor = {
      OPEN: 'bg-red-50 text-red-700',
      IN_REVIEW: 'bg-yellow-50 text-yellow-700',
      RESOLVED: 'bg-green-50 text-green-700',
      CLOSED: 'bg-slate-50 text-slate-700'
    }[exc.state] || 'bg-slate-50';

    return `
      <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 transition-colors">
        <div class="flex items-start gap-4">
          ${batchMode ? `
            <input type="checkbox" data-id="${exc.exception_id}" onchange="updateSelected()" class="mt-1" />
          ` : ''}
          <div class="flex-1">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-xs font-semibold rounded px-2 py-1 ${priorityColor}">${exc.priority}</span>
                  <span class="text-xs font-semibold rounded px-2 py-1 ${stateColor}">${exc.state}</span>
                </div>
                <p class="font-semibold text-slate-900">${exc.summary}</p>
              </div>
              <p class="text-xs text-slate-500 whitespace-nowrap">${formatDate(exc.created_at)}</p>
            </div>
            <p class="text-sm text-slate-700 mb-3">${exc.details?.reason || ''}</p>
            <div class="flex gap-2">
              ${exc.state === 'OPEN' ? `
                <button onclick="approveException('${exc.exception_id}')" class="text-xs px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700">Approve</button>
                <button onclick="rejectException('${exc.exception_id}')" class="text-xs px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">Reject</button>
                <button onclick="routeException('${exc.exception_id}')" class="text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">Route</button>
              ` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all').checked;
  const checkboxes = document.querySelectorAll('input[data-id]');

  selectedIds.clear();
  checkboxes.forEach(cb => {
    cb.checked = checked;
    if (checked) selectedIds.add(cb.getAttribute('data-id'));
  });

  updateSelected();
}

function updateSelected() {
  const checkboxes = document.querySelectorAll('input[data-id]:checked');
  selectedIds.clear();
  checkboxes.forEach(cb => selectedIds.add(cb.getAttribute('data-id')));

  document.getElementById('selected-count').textContent = `${selectedIds.size} selected`;
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (hours < 1) return 'Just now';
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}

async function approveException(id) {
  showConfirmDialog('Approve this exception?', 'Approving will mark this as resolved and remove it from the queue.', async () => {
    try {
      const res = await fetch(`${API}/api/exceptions/${id}/approve`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast('✓ Exception approved and marked resolved', 'success');
      loadExceptions();
    } catch (e) {
      showToast(`Error: ${e.message}`, 'error');
    }
  });
}

async function rejectException(id) {
  showConfirmDialog('Reject this exception?', 'Rejecting will close this exception without resolving the underlying issue. Route it to the appropriate owner instead if needed.', async () => {
    try {
      const res = await fetch(`${API}/api/exceptions/${id}/reject`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast('✓ Exception rejected', 'success');
      loadExceptions();
    } catch (e) {
      showToast(`Error: ${e.message}`, 'error');
    }
  });
}

async function routeException(id) {
  showRouteDialog(async (principal) => {
    if (!principal) return;
    try {
      const res = await fetch(`${API}/api/exceptions/${id}/route`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ principal })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      showToast(`✓ Exception routed to ${principal}`, 'success');
      loadExceptions();
    } catch (e) {
      showToast(`Error: ${e.message}`, 'error');
    }
  });
}

async function batchApprove() {
  if (selectedIds.size === 0) { showToast('No exceptions selected', 'info'); return; }
  showConfirmDialog(`Approve ${selectedIds.size} exception(s)?`, 'This will approve all selected exceptions and mark them as resolved.', async () => {
    for (const id of selectedIds) {
      try {
        await fetch(`${API}/api/exceptions/${id}/approve`, { method: 'POST' });
      } catch (e) {
        console.error('Error approving', id, e);
      }
    }
    showToast(`✓ ${selectedIds.size} exceptions approved`, 'success');
    selectedIds.clear();
    loadExceptions();
  });
}

async function batchReject() {
  if (selectedIds.size === 0) { showToast('No exceptions selected', 'info'); return; }
  showConfirmDialog(`Reject ${selectedIds.size} exception(s)?`, 'This will reject the selected exceptions without resolving them. Consider routing to the appropriate owner instead.', async () => {
    for (const id of selectedIds) {
      try {
        await fetch(`${API}/api/exceptions/${id}/reject`, { method: 'POST' });
      } catch (e) {
        console.error('Error rejecting', id, e);
      }
    }
    showToast(`✓ ${selectedIds.size} exceptions rejected`, 'success');
    selectedIds.clear();
    loadExceptions();
  });
}

async function batchRoute() {
  if (selectedIds.size === 0) { showToast('No exceptions selected', 'info'); return; }
  showRouteDialog(async (principal) => {
    if (!principal) return;
    for (const id of selectedIds) {
      try {
        await fetch(`${API}/api/exceptions/${id}/route`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ principal })
        });
      } catch (e) {
        console.error('Error routing', id, e);
      }
    }
    showToast(`✓ ${selectedIds.size} exceptions routed to ${principal}`, 'success');
    selectedIds.clear();
    loadExceptions();
  });
}

function showConfirmDialog(title, message, onConfirm) {
  const dialogHTML = `
    <div id="confirm-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-lg max-w-sm w-full mx-4">
        <div class="px-6 py-4 border-b border-slate-200">
          <h3 class="font-semibold text-slate-900">${title}</h3>
        </div>
        <div class="px-6 py-3">
          <p class="text-sm text-slate-700">${message}</p>
        </div>
        <div class="px-6 py-4 bg-slate-50 flex gap-2 justify-end border-t border-slate-200">
          <button onclick="document.getElementById('confirm-modal').remove()" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg">Cancel</button>
          <button onclick="(function() { document.getElementById('confirm-modal').remove(); })(); window._confirmAction?.();" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Confirm</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', dialogHTML);
  window._confirmAction = onConfirm;
}

function showRouteDialog(onSubmit) {
  const dialogHTML = `
    <div id="route-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg shadow-lg max-w-sm w-full mx-4">
        <div class="px-6 py-4 border-b border-slate-200">
          <h3 class="font-semibold text-slate-900">Route Exception</h3>
        </div>
        <div class="px-6 py-3">
          <label class="block text-sm font-medium text-slate-700 mb-2">Send to (email or role)</label>
          <input type="text" id="route-principal" placeholder="e.g. treasurer@church.org or 'Treasurer'" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-600 outline-none" />
          <p class="text-xs text-slate-500 mt-2">Assign this exception to a specific person or role for action.</p>
        </div>
        <div class="px-6 py-4 bg-slate-50 flex gap-2 justify-end border-t border-slate-200">
          <button onclick="document.getElementById('route-modal').remove()" class="px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100 rounded-lg">Cancel</button>
          <button onclick="(function() { const principal = document.getElementById('route-principal').value; document.getElementById('route-modal').remove(); window._routeAction?.(principal); })();" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg">Route</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', dialogHTML);
  window._routeAction = onSubmit;
  document.getElementById('route-principal').focus();
}
</script>

</body>
</html>
