<!DOCTYPE html>
<html>
<head>
<title>EIME — Exception Queue</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
<script src="/components/card-renderer.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-6xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 mb-2">Items Needing Review</h1>
      <p class="text-slate-600">Flagged items that need your decision — <span id="queue-count">0</span> open</p>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleFilterPanel()" class="px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700">🔍 Filter</button>
      <button onclick="toggleBatchMode()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700" id="batch-toggle">☑️ Batch</button>
    </div>
  </div>

  <!-- Filter Panel (hidden by default) -->
  <div id="filter-panel" class="hidden bg-slate-50 border border-slate-200 rounded-lg p-4 mb-6">
    <div class="grid grid-cols-4 gap-4">
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">Priority</label>
        <select id="filter-priority" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All Priorities</option>
          <option value="HIGH">High</option>
          <option value="NORMAL">Normal</option>
          <option value="LOW">Low</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">State</label>
        <select id="filter-state" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All States</option>
          <option value="OPEN">Open</option>
          <option value="IN_REVIEW">In Review</option>
          <option value="RESOLVED">Resolved</option>
          <option value="CLOSED">Closed</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">Type</label>
        <select id="filter-type" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All Types</option>
          <option value="ambiguous_gift">Ambiguous Gift</option>
          <option value="capitalization_gap">Capitalization Gap</option>
          <option value="pastoral_conflict">Pastoral Conflict</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-slate-700 block mb-2">Assigned</label>
        <select id="filter-assigned" onchange="applyFilters()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm">
          <option value="">All Users</option>
          <option value="me">Assigned to Me</option>
          <option value="unassigned">Unassigned</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Batch Actions (hidden by default) -->
  <div id="batch-actions" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
    <div class="flex items-center justify-between">
      <p class="text-sm text-blue-900">
        <input type="checkbox" id="select-all" onchange="toggleSelectAll()" class="mr-2" />
        <span id="selected-count">0 selected</span>
      </p>
      <div class="flex gap-2">
        <button onclick="batchApprove()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm">✓ Approve All</button>
        <button onclick="batchReject()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm">✗ Reject All</button>
        <button onclick="batchRoute()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">→ Route Selected</button>
      </div>
    </div>
  </div>

  <!-- Exception Cards List -->
  <div id="exceptions-list" class="space-y-4">
    <p class="text-slate-500 text-center py-8">Loading exception queue...</p>
  </div>
</div>
</template>

<script>
const API = 'http://localhost:8000';
const CHURCH_ID = 'holy_comforter';
let currentUserTier = 2;
let allExceptions = [];
let filteredExceptions = [];
let batchMode = false;
let selectedIds = new Set();

EIMEShell.mount({
  activeNav: 'council',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'exceptions-queue',
      payload: { church_id: CHURCH_ID }
    });
    loadExceptions();
    setInterval(loadExceptions, 10000);
  }
});

/**
 * Load exceptions from backend (Phase 3).
 * Calls GET /api/churches/{church_id}/exceptions
 * Falls back to mock data if endpoint not yet implemented.
 */
async function loadExceptions() {
  try {
    // Phase 3: Call real endpoint
    const res = await fetch(`${API}/api/churches/${CHURCH_ID}/exceptions`);
    const data = await res.json();

    // If endpoint returns exceptions array, use it; otherwise use mock
    if (data.exceptions && Array.isArray(data.exceptions) && data.exceptions.length > 0) {
      allExceptions = data.exceptions;
    } else {
      // Fallback to mock data for Phase 3 testing
      allExceptions = [
        {
          exception_id: 'exc_001',
          exception_type: 'ambiguous_gift',
          state: 'OPEN',
          summary: '$50K anonymous gift with unclear intent',
          details: {
            reason: 'Donor letter references both endowment and operations; need clarification.',
            gift_amount: 50000,
            donor_name: 'Anonymous'
          },
          assigned_to: null,
          priority: 'HIGH',
          privacy_class: 'P1',
          version: 1,
          created_at: new Date(Date.now() - 2 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 2 * 3600000).toISOString()
        },
        {
          exception_id: 'exc_002',
          exception_type: 'capitalization_gap',
          state: 'IN_REVIEW',
          summary: 'Capitalization threshold variance on $250K equipment purchase',
          details: {
            reason: 'Asset cost in expense account; needs reclassification per policy.',
            amount: 250000
          },
          assigned_to: 'treasurer@example.com',
          priority: 'NORMAL',
          privacy_class: 'P2',
          version: 1,
          created_at: new Date(Date.now() - 24 * 3600000).toISOString(),
          updated_at: new Date(Date.now() - 12 * 3600000).toISOString()
        }
      ];
    }

    filteredExceptions = [...allExceptions];
    applyFilters();
    renderExceptions();
  } catch (e) {
    console.error('Error loading exceptions:', e);
    // Still render with empty state on error
    filteredExceptions = [];
    renderExceptions();
  }
}

function toggleFilterPanel() {
  const panel = document.getElementById('filter-panel');
  panel.classList.toggle('hidden');
}

function toggleBatchMode() {
  batchMode = !batchMode;
  const actions = document.getElementById('batch-actions');
  const toggle = document.getElementById('batch-toggle');

  if (batchMode) {
    actions.classList.remove('hidden');
    toggle.classList.add('bg-blue-700');
  } else {
    actions.classList.add('hidden');
    toggle.classList.remove('bg-blue-700');
    selectedIds.clear();
  }

  renderExceptions();
}

function applyFilters() {
  const priority = document.getElementById('filter-priority').value;
  const state = document.getElementById('filter-state').value;
  const type = document.getElementById('filter-type').value;
  const assigned = document.getElementById('filter-assigned').value;

  filteredExceptions = allExceptions.filter(exc => {
    if (priority && exc.priority !== priority) return false;
    if (state && exc.state !== state) return false;
    if (type && exc.exception_type !== type) return false;
    if (assigned === 'me' && exc.assigned_to !== 'current_user@example.com') return false;
    if (assigned === 'unassigned' && exc.assigned_to !== null) return false;
    return true;
  });

  renderExceptions();
}

function renderExceptions() {
  document.getElementById('queue-count').textContent = filteredExceptions.filter(e => e.state === 'OPEN').length;

  const container = document.getElementById('exceptions-list');

  if (filteredExceptions.length === 0) {
    container.innerHTML = '<p class="text-slate-500 text-center py-8">✓ No exceptions match the current filter</p>';
    return;
  }

  container.innerHTML = filteredExceptions.map(exc => {
    const priorityColor = {
      HIGH: 'bg-red-100 border-red-300 text-red-900',
      NORMAL: 'bg-yellow-100 border-yellow-300 text-yellow-900',
      LOW: 'bg-blue-100 border-blue-300 text-blue-900'
    }[exc.priority] || 'bg-slate-100';

    const stateColor = {
      OPEN: 'bg-red-50 text-red-700',
      IN_REVIEW: 'bg-yellow-50 text-yellow-700',
      RESOLVED: 'bg-green-50 text-green-700',
      CLOSED: 'bg-slate-50 text-slate-700'
    }[exc.state] || 'bg-slate-50';

    return `
      <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 transition-colors">
        <div class="flex items-start gap-4">
          ${batchMode ? `
            <input type="checkbox" data-id="${exc.exception_id}" onchange="updateSelected()" class="mt-1" />
          ` : ''}
          <div class="flex-1">
            <div class="flex items-start justify-between mb-3">
              <div>
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-xs font-semibold rounded px-2 py-1 ${priorityColor}">${exc.priority}</span>
                  <span class="text-xs font-semibold rounded px-2 py-1 ${stateColor}">${exc.state}</span>
                </div>
                <p class="font-semibold text-slate-900">${exc.summary}</p>
              </div>
              <p class="text-xs text-slate-500 whitespace-nowrap">${formatDate(exc.created_at)}</p>
            </div>
            <p class="text-sm text-slate-700 mb-3">${exc.details?.reason || ''}</p>
            <div class="flex gap-2">
              ${exc.state === 'OPEN' ? `
                <button onclick="approveException('${exc.exception_id}')" class="text-xs px-3 py-1 bg-green-600 text-white rounded hover:bg-green-700">Approve</button>
                <button onclick="rejectException('${exc.exception_id}')" class="text-xs px-3 py-1 bg-red-600 text-white rounded hover:bg-red-700">Reject</button>
                <button onclick="routeException('${exc.exception_id}')" class="text-xs px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700">Route</button>
              ` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all').checked;
  const checkboxes = document.querySelectorAll('input[data-id]');

  selectedIds.clear();
  checkboxes.forEach(cb => {
    cb.checked = checked;
    if (checked) selectedIds.add(cb.getAttribute('data-id'));
  });

  updateSelected();
}

function updateSelected() {
  const checkboxes = document.querySelectorAll('input[data-id]:checked');
  selectedIds.clear();
  checkboxes.forEach(cb => selectedIds.add(cb.getAttribute('data-id')));

  document.getElementById('selected-count').textContent = `${selectedIds.size} selected`;
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);

  if (hours < 1) return 'Just now';
  if (hours < 24) return `${hours}h ago`;
  if (days < 7) return `${days}d ago`;
  return date.toLocaleDateString();
}

async function approveException(id) {
  if (!confirm('Approve this exception?')) return;
  try {
    const res = await fetch(`${API}/api/exceptions/${id}/approve`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('Exception approved');
    loadExceptions();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function rejectException(id) {
  if (!confirm('Reject this exception?')) return;
  try {
    const res = await fetch(`${API}/api/exceptions/${id}/reject`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('Exception rejected');
    loadExceptions();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function routeException(id) {
  const tier = prompt('Route to tier (1, 2, or 3+)?', '2');
  if (!tier) return;
  try {
    const res = await fetch(`${API}/api/exceptions/${id}/route`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ next_tier: parseInt(tier) })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('Exception routed');
    loadExceptions();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function batchApprove() {
  if (selectedIds.size === 0) { alert('No exceptions selected'); return; }
  if (!confirm(`Approve ${selectedIds.size} exceptions?`)) return;

  for (const id of selectedIds) {
    try {
      await fetch(`${API}/api/exceptions/${id}/approve`, { method: 'POST' });
    } catch (e) {
      console.error('Error approving', id, e);
    }
  }

  alert(`${selectedIds.size} exceptions approved`);
  loadExceptions();
}

async function batchReject() {
  if (selectedIds.size === 0) { alert('No exceptions selected'); return; }
  if (!confirm(`Reject ${selectedIds.size} exceptions?`)) return;

  for (const id of selectedIds) {
    try {
      await fetch(`${API}/api/exceptions/${id}/reject`, { method: 'POST' });
    } catch (e) {
      console.error('Error rejecting', id, e);
    }
  }

  alert(`${selectedIds.size} exceptions rejected`);
  loadExceptions();
}

async function batchRoute() {
  if (selectedIds.size === 0) { alert('No exceptions selected'); return; }

  const tier = prompt('Route to tier (1, 2, or 3+)?', '2');
  if (!tier) return;

  for (const id of selectedIds) {
    try {
      await fetch(`${API}/api/exceptions/${id}/route`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ next_tier: parseInt(tier) })
      });
    } catch (e) {
      console.error('Error routing', id, e);
    }
  }

  alert(`${selectedIds.size} exceptions routed`);
  loadExceptions();
}
</script>

</body>
</html>
