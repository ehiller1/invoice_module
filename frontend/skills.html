<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Library — EIME</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
            gold: { 500: '#c9a227' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .fade-in { animation: fadeIn 0.25s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .pill { @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
  <link rel="stylesheet" href="/responsive.css" />
  <script src="/eime-bus.js"></script>
  <script src="/eime-shell.js"></script>
  <script src="/eime-chat-rail.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans">

<template id="page-center-content">
  <div class="flex h-full overflow-hidden">
    <!-- Skills list -->
    <div class="w-80 border-r border-slate-200 bg-white flex flex-col flex-shrink-0">
      <div class="px-5 py-4 border-b border-slate-200">
        <h1 class="text-base font-semibold text-slate-800">Skill Library</h1>
        <p class="text-xs text-slate-500 mt-0.5">SKILL.md files loaded at runtime by the agent skill router</p>
      </div>

      <!-- Archetype filter -->
      <div class="px-5 py-3 border-b border-slate-100 flex gap-1.5 flex-wrap">
        <button onclick="filterSkills('')" id="filter-all" class="filter-btn pill bg-navy-900 text-white">All</button>
        <button onclick="filterSkills('orchestrator')" id="filter-orchestrator" class="filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200">Orchestrator</button>
        <button onclick="filterSkills('researcher')" id="filter-researcher" class="filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200">Researcher</button>
        <button onclick="filterSkills('worker')" id="filter-worker" class="filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200">Worker</button>
        <button onclick="filterSkills('reviewer')" id="filter-reviewer" class="filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200">Reviewer</button>
        <button onclick="filterSkills('conversationalist')" id="filter-conversationalist" class="filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200">Asks You</button>
        <button onclick="filterSkills('membrane')" id="filter-membrane" class="filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200">Watchdog</button>
      </div>

      <div id="skills-list" class="flex-1 overflow-y-auto divide-y divide-slate-100"></div>
    </div>

    <!-- Skill detail -->
    <div class="flex-1 overflow-auto bg-slate-50">
      <div id="skill-detail" class="hidden h-full flex flex-col fade-in">
        <div class="bg-white border-b border-slate-200 px-8 py-5">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span id="detail-archetype-badge" class="pill bg-blue-100 text-blue-700"></span>
              </div>
              <h2 id="detail-name" class="text-xl font-semibold text-slate-800 font-mono"></h2>
              <p id="detail-description" class="text-sm text-slate-500 mt-1 max-w-2xl"></p>
            </div>
          </div>
          <div class="mt-4 grid grid-cols-3 gap-4">
            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Inputs</p>
              <div id="detail-inputs" class="flex flex-wrap gap-1"></div>
            </div>
            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Allowed Tools</p>
              <div id="detail-tools" class="flex flex-wrap gap-1"></div>
            </div>
            <div class="bg-slate-50 rounded-lg p-3">
              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Skill Path</p>
              <p id="detail-path" class="text-xs font-mono text-slate-600 break-all"></p>
            </div>
          </div>
          <div class="mt-3 bg-slate-50 rounded-lg p-3">
            <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1">Expected Output</p>
            <p id="detail-output" class="text-xs text-slate-600"></p>
          </div>
        </div>
        <div class="flex-1 px-8 py-6">
          <h3 class="text-sm font-semibold text-slate-700 mb-3">Workflow Body (SKILL.md)</h3>
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <pre id="detail-body" class="px-5 py-4 text-xs text-slate-700 leading-relaxed font-mono"></pre>
          </div>
        </div>
      </div>
      <div id="skill-placeholder" class="flex items-center justify-center h-full">
        <div class="text-center">
          <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
          </div>
          <p class="text-sm font-medium text-slate-500">Select a skill to view its specification</p>
          <p class="text-xs text-slate-400 mt-1">Skills encode accounting expertise discoverable at runtime</p>
        </div>
      </div>
    </div>
    </div>
  </div>
</template>

<script>
const API = 'http://localhost:8000';
let allSkills = [];
let activeFilter = '';

const ARCHETYPE_COLORS = {
  orchestrator: 'bg-purple-100 text-purple-700',
  researcher:   'bg-blue-100 text-blue-700',
  worker:       'bg-teal-100 text-teal-700',
  reviewer:     'bg-amber-100 text-amber-700',
  conversationalist: 'bg-orange-100 text-orange-700',
  membrane:     'bg-pink-100 text-pink-700',
};

async function loadSkills() {
  const res = await fetch(`${API}/api/skills`);
  allSkills = await res.json();
  renderList(allSkills);
}

function renderList(skills) {
  const el = document.getElementById('skills-list');
  el.innerHTML = skills.map(s => `
    <button onclick="loadSkillDetail('${s.name}')"
      class="skill-item w-full text-left px-5 py-3.5 hover:bg-slate-50 transition-colors" data-name="${s.name}">
      <div class="flex items-center justify-between mb-1">
        <span class="text-sm font-medium text-slate-800">${s.name}</span>
        <span class="pill ${ARCHETYPE_COLORS[s.archetype] || 'bg-slate-100 text-slate-600'}">${s.archetype}</span>
      </div>
      <p class="text-xs text-slate-400 line-clamp-2">${s.description}</p>
    </button>
  `).join('');
}

function filterSkills(archetype) {
  activeFilter = archetype;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn pill bg-slate-100 text-slate-600 hover:bg-slate-200';
  });
  const activeId = archetype ? `filter-${archetype}` : 'filter-all';
  document.getElementById(activeId).className = 'filter-btn pill bg-navy-900 text-white';
  const filtered = archetype ? allSkills.filter(s => s.archetype === archetype) : allSkills;
  renderList(filtered);
}

async function loadSkillDetail(name) {
  // highlight
  document.querySelectorAll('.skill-item').forEach(el => el.classList.remove('bg-navy-50', 'border-l-2', 'border-navy-600'));
  const item = document.querySelector(`.skill-item[data-name="${name}"]`);
  if (item) item.classList.add('bg-navy-50', 'border-l-2', 'border-navy-600');

  const res = await fetch(`${API}/api/skills/${name}`);
  const skill = await res.json();

  const colors = ARCHETYPE_COLORS[skill.archetype] || 'bg-slate-100 text-slate-600';
  document.getElementById('detail-archetype-badge').className = `pill ${colors}`;
  document.getElementById('detail-archetype-badge').textContent = skill.archetype.toUpperCase();
  document.getElementById('detail-name').textContent = skill.name;
  document.getElementById('detail-description').textContent = skill.description;
  document.getElementById('detail-path').textContent = skill.path?.replace(/.*\/backend\//, '') || '—';
  document.getElementById('detail-output').textContent = skill.expected_output;

  const inputs = skill.inputs || [];
  document.getElementById('detail-inputs').innerHTML = inputs.map(i =>
    `<span class="pill bg-slate-200 text-slate-700 font-mono">${i}</span>`
  ).join('') || '<span class="text-xs text-slate-400">none</span>';

  const tools = skill.allowed_tools || [];
  document.getElementById('detail-tools').innerHTML = tools.map(t =>
    `<span class="pill bg-green-100 text-green-700 font-mono">${t}</span>`
  ).join('') || '<span class="text-xs text-slate-400">none</span>';

  document.getElementById('detail-body').textContent = skill.body || '(no workflow body)';

  document.getElementById('skill-detail').classList.remove('hidden');
  document.getElementById('skill-placeholder').classList.add('hidden');
}

EIMEShell.mount({
  activeNav: 'skills',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'skills',
      payload: {}
    });
    loadSkills();
  }
});
</script>
<script src="/eime-responsive.js"></script>
</body>
</html>
