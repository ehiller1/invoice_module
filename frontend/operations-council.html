<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Operations Council — Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <template id="page-center-content">
        <div class="p-6 max-w-7xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Operations Council</h1>
                <p class="text-gray-600">Unified judgment surface: exceptions needing judgment, policy decisions, questions being asked of the firm</p>
            </div>

            <!-- KPI Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <p class="text-gray-600 text-sm font-medium mb-2">Exceptions Pending</p>
                    <p id="kpiExceptions" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-500 mt-1">Requiring judgment</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <p class="text-gray-600 text-sm font-medium mb-2">Policy Drifts</p>
                    <p id="kpiDrifts" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-500 mt-1">Pattern changes detected</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <p class="text-gray-600 text-sm font-medium mb-2">Questions Pending</p>
                    <p id="kpiQuestions" class="text-3xl font-bold text-gray-900">-</p>
                    <p class="text-xs text-gray-500 mt-1">From stakeholders</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <p class="text-gray-600 text-sm font-medium mb-2">Covenant Health</p>
                    <p id="kpiCovenant" class="text-3xl font-bold text-green-600">GREEN</p>
                    <p class="text-xs text-gray-500 mt-1">No breach risk</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="mb-6 border-b border-gray-200">
                <div class="flex gap-4">
                    <button onclick="switchTab('exceptions')" id="tabExceptions" class="pb-3 px-1 border-b-2 border-blue-600 text-blue-600 font-medium text-sm">
                        Exceptions
                    </button>
                    <button onclick="switchTab('policies')" id="tabPolicies" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm hover:text-gray-900">
                        Policy Decisions
                    </button>
                    <button onclick="switchTab('questions')" id="tabQuestions" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm hover:text-gray-900">
                        Questions
                    </button>
                    <button onclick="switchTab('accruals')" id="tabAccruals" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm hover:text-gray-900">
                        Live Accruals
                    </button>
                    <button onclick="switchTab('compliance')" id="tabCompliance" class="pb-3 px-1 border-b-2 border-transparent text-gray-600 font-medium text-sm hover:text-gray-900">
                        Compliance
                    </button>
                </div>
            </div>

            <!-- EXCEPTIONS Tab -->
            <div id="tabContentExceptions" class="space-y-4">
                <div id="exceptionsList"></div>
            </div>

            <!-- POLICIES Tab -->
            <div id="tabContentPolicies" class="hidden space-y-4">
                <div id="policiesList"></div>
            </div>

            <!-- QUESTIONS Tab -->
            <div id="tabContentQuestions" class="hidden space-y-4">
                <div id="questionsList"></div>
            </div>

            <!-- ACCRUALS Tab -->
            <div id="tabContentAccruals" class="hidden space-y-4">
                <div id="accrualsList"></div>
            </div>

            <!-- COMPLIANCE Tab -->
            <div id="tabContentCompliance" class="hidden space-y-4">
                <div id="complianceList"></div>
            </div>
        </div>

        <!-- Exception Detail Modal -->
        <div id="exceptionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-lg max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 id="exceptionModalTitle" class="text-xl font-bold text-gray-900">Exception</h2>
                    <button onclick="closeExceptionModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-6">
                    <div id="exceptionDetail"></div>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                        <p class="text-sm font-medium text-gray-900 mb-3">Recommended Action</p>
                        <p id="exceptionAction" class="text-sm text-gray-700"></p>
                        <button class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
                            Resolve Exception
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="eime-bus.js"></script>
    <script src="eime-shell.js"></script>
    <script src="eime-chat-rail.js"></script>
    <script>
        let councilData = {};
        const CHURCH_ID = 'holy_comforter';

        async function loadCouncilData() {
            try {
                const response = await fetch(`/api/operations-council?church_id=${CHURCH_ID}`);
                councilData = await response.json();

                // Update KPIs
                document.getElementById('kpiExceptions').textContent = councilData.exceptions?.length || 0;
                document.getElementById('kpiDrifts').textContent = councilData.policy_drifts?.length || 0;
                document.getElementById('kpiQuestions').textContent = councilData.questions_for_firm?.length || 0;

                // Render all sections
                renderExceptions();
                renderPolicies();
                renderQuestions();
                renderAccruals();
                renderCompliance();
            } catch (error) {
                console.error('Error loading council data:', error);
            }
        }

        function renderExceptions() {
            const container = document.getElementById('exceptionsList');
            const exceptions = councilData.exceptions || [];

            if (exceptions.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-white rounded-lg">No exceptions pending</div>';
                return;
            }

            container.innerHTML = exceptions.map(exc => `
                <div onclick="showExceptionDetail('${exc.exception_id}')" class="bg-white rounded-lg shadow-sm p-4 hover:shadow-md cursor-pointer transition border-l-4 border-red-500">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <p class="font-semibold text-gray-900">${exc.description}</p>
                            <p class="text-xs text-gray-600">Exception ID: ${exc.exception_id}</p>
                        </div>
                        <span class="px-2 py-1 rounded-full text-xs font-medium ${
                            exc.severity === 'high' ? 'bg-red-100 text-red-800' :
                            exc.severity === 'medium' ? 'bg-yellow-100 text-yellow-800' :
                            'bg-blue-100 text-blue-800'
                        }">
                            ${exc.severity.toUpperCase()}
                        </span>
                    </div>
                    <p class="text-sm text-gray-700 mb-3">${exc.description}</p>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <p class="text-xs font-medium text-gray-600">Agent Belief</p>
                            <p class="text-sm text-gray-900">${exc.agent_belief}</p>
                        </div>
                        <div>
                            <p class="text-xs font-medium text-gray-600">Alternatives</p>
                            <p class="text-sm text-gray-900">${exc.alternatives?.length || 0} options</p>
                        </div>
                    </div>
                    <p class="text-xs text-gray-600">Recommended: ${exc.recommended_action}</p>
                </div>
            `).join('');
        }

        function renderPolicies() {
            const container = document.getElementById('policiesList');
            const drifts = councilData.policy_drifts || [];

            if (drifts.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-white rounded-lg">No policy drifts detected</div>';
                return;
            }

            container.innerHTML = drifts.map(drift => `
                <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-amber-500">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <p class="font-semibold text-gray-900">${drift.description}</p>
                            <p class="text-xs text-gray-600">Drift ID: ${drift.drift_id}</p>
                        </div>
                        <span class="px-2 py-1 rounded-full text-xs font-medium bg-amber-100 text-amber-800">
                            ACTION NEEDED
                        </span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <p class="text-xs font-medium text-gray-600 mb-1">Historical Pattern</p>
                            <p class="text-sm text-gray-900 font-mono">${drift.historical_pattern}</p>
                        </div>
                        <div>
                            <p class="text-xs font-medium text-gray-600 mb-1">Current Pattern</p>
                            <p class="text-sm text-gray-900 font-mono">${drift.current_pattern}</p>
                        </div>
                    </div>
                    <p class="text-sm text-gray-700 mb-3">${drift.controller_action_needed}</p>
                    <div class="flex gap-2">
                        <button class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Confirm Policy</button>
                        <button class="px-3 py-1 text-sm bg-gray-200 text-gray-700 rounded hover:bg-gray-300">Investigate</button>
                    </div>
                </div>
            `).join('');
        }

        function renderQuestions() {
            const container = document.getElementById('questionsList');
            const questions = councilData.questions_for_firm || [];

            if (questions.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-white rounded-lg">No pending questions</div>';
                return;
            }

            container.innerHTML = questions.map(q => {
                const status = q.status || 'pending';
                return `
                    <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 ${
                        status === 'pending' ? 'border-blue-500' : 'border-green-500'
                    }">
                        <div class="flex items-start justify-between mb-2">
                            <div>
                                <p class="font-semibold text-gray-900">${q.question}</p>
                                <p class="text-xs text-gray-600">From: ${q.asker} • Asked: ${new Date(q.requested_at).toLocaleDateString()}</p>
                            </div>
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${
                                status === 'pending' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'
                            }">
                                ${status.toUpperCase()}
                            </span>
                        </div>
                        ${status === 'pending' ? `
                            <p class="text-sm text-gray-600 mb-3">Projected ready: ${new Date(q.projected_ready).toLocaleDateString()}</p>
                            <button class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">
                                View Projection
                            </button>
                        ` : `
                            <p class="text-sm text-green-600 font-medium">✓ Ready for review</p>
                        `}
                    </div>
                `;
            }).join('');
        }

        function renderAccruals() {
            const container = document.getElementById('accrualsList');
            const accruals = councilData.live_accruals || {};

            if (Object.keys(accruals).length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-white rounded-lg">No accruals recorded</div>';
                return;
            }

            container.innerHTML = Object.entries(accruals).map(([name, data]) => `
                <div class="bg-white rounded-lg shadow-sm p-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-semibold text-gray-900">${formatAccrualName(name)}</h3>
                        <p class="text-lg font-bold text-gray-900">$${(data.amount || 0).toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                    </div>
                    <div class="bg-gray-50 rounded p-3">
                        <p class="text-xs text-gray-600 mb-2">Confidence Range</p>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs text-gray-600">Low: $${(data.confidence_low || 0).toLocaleString()}</span>
                            <span class="text-xs text-gray-600">High: $${(data.confidence_high || 0).toLocaleString()}</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: 60%"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderCompliance() {
            const container = document.getElementById('complianceList');
            const trajectory = councilData.compliance_trajectory || {};

            if (Object.keys(trajectory).length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-white rounded-lg">No compliance data</div>';
                return;
            }

            container.innerHTML = Object.entries(trajectory).map(([key, covenant]) => {
                const pBreach = covenant.trajectory_p_breach_6m || 0;
                const status = pBreach < 0.1 ? 'green' : pBreach < 0.3 ? 'yellow' : 'red';
                return `
                    <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 ${
                        status === 'green' ? 'border-green-500' :
                        status === 'yellow' ? 'border-yellow-500' :
                        'border-red-500'
                    }">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <p class="font-semibold text-gray-900">${covenant.name}</p>
                                <p class="text-xs text-gray-600">Current: $${(covenant.current_position || 0).toLocaleString()} / Threshold: $${(covenant.threshold || 0).toLocaleString()}</p>
                            </div>
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${
                                status === 'green' ? 'bg-green-100 text-green-800' :
                                status === 'yellow' ? 'bg-yellow-100 text-yellow-800' :
                                'bg-red-100 text-red-800'
                            }">
                                ${status.toUpperCase()} - ${(pBreach * 100).toFixed(0)}% breach risk
                            </span>
                        </div>
                        ${covenant.recovery_levers && covenant.recovery_levers.length > 0 ? `
                            <div class="mb-3">
                                <p class="text-xs font-medium text-gray-600 mb-2">Recovery Levers</p>
                                <div class="space-y-1">
                                    ${covenant.recovery_levers.map(lever => `
                                        <div class="text-xs text-gray-700">
                                            <strong>${lever.lever}</strong> (${lever.impact}, ${lever.timeline})
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function formatAccrualName(name) {
            return name.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function switchTab(tab) {
            // Hide all tabs
            ['exceptions', 'policies', 'questions', 'accruals', 'compliance'].forEach(t => {
                document.getElementById(`tabContent${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.add('hidden');
                document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
                document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).classList.add('border-transparent', 'text-gray-600');
            });

            // Show selected tab
            document.getElementById(`tabContent${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('hidden');
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.remove('border-transparent', 'text-gray-600');
            document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        }

        function showExceptionDetail(exceptionId) {
            const exceptions = councilData.exceptions || [];
            const exc = exceptions.find(e => e.exception_id === exceptionId);
            if (!exc) return;

            document.getElementById('exceptionModalTitle').textContent = exc.description;

            const detail = `
                <div class="space-y-4">
                    <div>
                        <p class="text-sm font-medium text-gray-600 mb-2">Agent Belief</p>
                        <div class="bg-gray-50 p-3 rounded text-sm text-gray-900">${exc.agent_belief}</div>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-gray-600 mb-2">Alternatives Considered</p>
                        <div class="space-y-2">
                            ${(exc.alternatives || []).map(alt => `
                                <div class="border border-gray-200 rounded p-3">
                                    <p class="font-medium text-gray-900">${alt.option}</p>
                                    <p class="text-xs text-gray-600 mt-1">Confidence: ${(alt.confidence * 100).toFixed(0)}%</p>
                                    <p class="text-sm text-gray-700 mt-1">${alt.rationale}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ${exc.evidence_gaps && exc.evidence_gaps.length > 0 ? `
                        <div>
                            <p class="text-sm font-medium text-gray-600 mb-2">Evidence Gaps</p>
                            <ul class="list-disc list-inside space-y-1 text-sm text-gray-700">
                                ${exc.evidence_gaps.map(gap => `<li>${gap}</li>`).join('')}
                            </ul>
                        </div>
                    ` : ''}
                </div>
            `;
            document.getElementById('exceptionDetail').innerHTML = detail;
            document.getElementById('exceptionAction').textContent = exc.recommended_action;
            document.getElementById('exceptionModal').classList.remove('hidden');
        }

        function closeExceptionModal() {
            document.getElementById('exceptionModal').classList.add('hidden');
        }

        async function onMounted() {
            await loadCouncilData();
            eime.setContext({
                page: 'operations-council',
                payload: { churchId: CHURCH_ID }
            });
        }

        EIMEShell.mount({
            onMounted: onMounted,
            navAttribute: 'data-nav'
        });
    </script>
</body>
</html>
