<!DOCTYPE html>
<html>
<head>
<title>Budget vs Actual — Books</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 mb-2">Budget vs Actual</h1>
      <p class="text-slate-600">How you're tracking against budget, line by line. See what's on pace, what's over, and where the year is heading.</p>
    </div>
    <div class="flex gap-2">
      <button onclick="showImportModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">📥 Import Budget</button>
      <button onclick="showAdminMenu()" class="px-4 py-2 bg-slate-600 text-white rounded-lg hover:bg-slate-700">⚙️ Admin</button>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Total Budget</p>
      <p class="text-3xl font-bold text-slate-900" id="total-budget">$0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Spent This Year</p>
      <p class="text-3xl font-bold text-orange-600" id="ytd-spent">$0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Remaining</p>
      <p class="text-3xl font-bold text-green-600" id="remaining">$0</p>
    </div>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 p-6">
    <h2 class="text-lg font-semibold text-slate-900 mb-4">Account Balances</h2>
    <div id="budget-lines" class="space-y-3"></div>
  </div>

  <!-- Line Detail Modal -->
  <div id="line-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4" id="modal-line-name">GL Account</h2>
      <div id="modal-line-content" class="space-y-4 mb-6"></div>
      <button onclick="closeLineModal()" class="w-full px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Close</button>
    </div>
  </div>

  <!-- Import Budget Modal -->
  <div id="import-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4">Import Budget</h2>
      <div class="mb-6">
        <p class="text-sm text-slate-600 mb-4">Upload a CSV or Excel file with GL code, GL name, and annual budget columns</p>
        <div id="budget-upload-zone" class="border-2 border-dashed border-slate-300 rounded-lg p-8 text-center hover:border-navy-600 hover:bg-slate-50 transition-all cursor-pointer" onclick="document.getElementById('budget-file-input').click()">
          <svg class="w-8 h-8 text-slate-400 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          <p class="text-slate-600 font-medium text-sm">Drop file here or click to browse</p>
          <p class="text-slate-400 text-xs mt-1">CSV or XLSX • Max 10 MB</p>
          <input type="file" id="budget-file-input" accept=".csv,.xlsx,.xls" class="hidden" onchange="importBudget()" />
        </div>
        <div id="import-status" class="hidden mt-3 text-sm"></div>
      </div>
      <button onclick="closeImportModal()" class="w-full px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Close</button>
    </div>
  </div>

  <!-- Admin Menu Modal -->
  <div id="admin-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4">Budget Administration</h2>
      <div class="space-y-3 mb-6">
        <button onclick="resetYTD()" class="w-full px-4 py-3 bg-amber-100 text-amber-900 rounded-lg hover:bg-amber-200 text-left font-medium">
          Reset Year-to-Date Actuals to Zero
        </button>
        <button onclick="yearEndRollover()" class="w-full px-4 py-3 bg-orange-100 text-orange-900 rounded-lg hover:bg-orange-200 text-left font-medium">
          Year-End Rollover
        </button>
        <div class="border-t border-slate-200 pt-3 mt-3">
          <label class="text-sm font-semibold text-slate-700 block mb-2">Budget Warning Threshold (%)</label>
          <div class="flex gap-2">
            <input type="number" id="threshold-input" min="0" max="100" value="85" class="flex-1 px-3 py-2 border border-slate-300 rounded-lg" />
            <button onclick="updateThreshold()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Update</button>
          </div>
        </div>
      </div>
      <button onclick="closeAdminModal()" class="w-full px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Close</button>
    </div>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
let selectedLine = null;

EIMEShell.mount({
  activeNav: 'budget',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'budget',
      payload: { church_id: 'holy_comforter' }
    });
    loadBudget();
    setInterval(loadBudget, 10000);
  }
});

async function loadBudget() {
  try {
    const res = await fetch(`${API}/api/budget/variance?church_id=holy_comforter`);
    const data = await res.json();
    
    const total = data.lines.reduce((sum, l) => sum + (l.annual_budget || 0), 0);
    const spent = data.lines.reduce((sum, l) => sum + (l.ytd_actual || 0), 0);
    const remaining = total - spent;
    
    document.getElementById('total-budget').textContent = `$${total.toFixed(2)}`;
    document.getElementById('ytd-spent').textContent = `$${spent.toFixed(2)}`;
    document.getElementById('remaining').textContent = `$${remaining.toFixed(2)}`;
    
    const lines = data.lines.map(line => {
      const pct = (line.ytd_actual / line.annual_budget * 100).toFixed(0);
      const health = pct < 70 ? 'text-green-600' : pct < 90 ? 'text-yellow-600' : 'text-red-600';
      return `
        <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 cursor-pointer transition-colors" onclick="showLine('${line.gl_code}')">
          <div class="flex items-center justify-between mb-3">
            <div>
              <p class="font-medium text-slate-900">${line.gl_name || line.gl_code}</p>
              <p class="text-xs text-slate-500">${line.gl_code}</p>
            </div>
            <div class="text-right">
              <p class="font-bold ${health}">${pct}%</p>
              <p class="text-sm text-slate-600">$${(line.ytd_actual || 0).toFixed(2)} / $${(line.annual_budget || 0).toFixed(2)}</p>
            </div>
          </div>
          <div class="w-full bg-slate-200 rounded-full h-2">
            <div class="bg-slate-700 h-2 rounded-full transition-all" style="width: ${Math.min(pct, 100)}%"></div>
          </div>
        </div>
      `;
    }).join('');
    
    document.getElementById('budget-lines').innerHTML = lines;
  } catch (e) {
    console.error('Error loading budget:', e);
  }
}

async function showLine(glCode) {
  try {
    const res = await fetch(`${API}/api/budget/variance?church_id=holy_comforter`);
    const data = await res.json();
    const line = data.lines.find(l => l.gl_code === glCode);
    
    if (!line) return;
    
    const pct = (line.ytd_actual / line.annual_budget * 100).toFixed(0);
    const projected = line.ytd_actual / (new Date().getMonth() + 1) * 12;
    
    document.getElementById('modal-line-name').textContent = `${line.gl_name || line.gl_code}`;
    document.getElementById('modal-line-content').innerHTML = `
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">Annual Budget</p>
          <p class="text-2xl font-bold text-slate-900">$${(line.annual_budget || 0).toFixed(2)}</p>
        </div>
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">YTD Spent</p>
          <p class="text-2xl font-bold text-slate-900">$${(line.ytd_actual || 0).toFixed(2)}</p>
        </div>
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">Remaining</p>
          <p class="text-2xl font-bold text-green-600">$${(line.annual_budget - line.ytd_actual).toFixed(2)}</p>
        </div>
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">Utilization</p>
          <p class="text-2xl font-bold text-slate-900">${pct}%</p>
        </div>
      </div>
      <div class="bg-blue-50 border border-blue-200 rounded p-3">
        <p class="text-sm text-blue-800"><strong>Projected Year-End:</strong> $${projected.toFixed(2)} (${((projected / line.annual_budget) * 100).toFixed(0)}%)</p>
      </div>
    `;
    
    document.getElementById('line-modal').classList.remove('hidden');
  } catch (e) {
    console.error('Error loading line:', e);
  }
}

function closeLineModal() {
  document.getElementById('line-modal').classList.add('hidden');
  selectedLine = null;
}

function showImportModal() {
  document.getElementById('import-modal').classList.remove('hidden');
}

function closeImportModal() {
  document.getElementById('import-modal').classList.add('hidden');
}

function showAdminMenu() {
  document.getElementById('admin-modal').classList.remove('hidden');
}

function closeAdminModal() {
  document.getElementById('admin-modal').classList.add('hidden');
}

async function importBudget() {
  const fileInput = document.getElementById('budget-file-input');
  const file = fileInput.files[0];
  if (!file) return;

  const status = document.getElementById('import-status');
  status.classList.remove('hidden');
  status.className = 'mt-3 text-sm text-slate-600';
  status.innerHTML = `<p>📤 Uploading ${file.name}...</p>`;

  const fd = new FormData();
  fd.append('file', file);

  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/budget/import-spreadsheet`, {
      method: 'POST',
      body: fd
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    status.className = 'mt-3 text-sm text-emerald-600';
    status.innerHTML = `<p>✅ Budget imported: ${data.lines_imported || 0} lines loaded</p>`;
    setTimeout(() => { closeImportModal(); loadBudget(); }, 2000);
  } catch (e) {
    status.className = 'mt-3 text-sm text-red-600';
    status.innerHTML = `<p>❌ Error: ${e.message}</p>`;
  }
}

async function resetYTD() {
  if (!confirm('Reset YTD actuals to zero? This cannot be undone.')) return;
  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/budget/ytd-reset`, { method: 'PUT' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('YTD actuals reset to zero');
    closeAdminModal();
    loadBudget();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function yearEndRollover() {
  if (!confirm('Perform year-end rollover? This closes the current budget and prepares for the next year.')) return;
  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/budget/year-end-reset`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert('Year-end rollover complete');
    closeAdminModal();
    loadBudget();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function updateThreshold() {
  const threshold = document.getElementById('threshold-input').value;
  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/budget-warning-threshold`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ threshold: parseInt(threshold) })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    alert(`Warning threshold updated to ${threshold}%`);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}
</script>

</body>
</html>
