<!DOCTYPE html>
<html>
<head>
<title>EIME — Budget Tracking</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold text-slate-900 mb-2">Budget Tracking</h1>
  <p class="text-slate-600 mb-6">Monitor GL lines, track spending, and project year-end positions</p>

  <div class="grid grid-cols-3 gap-4 mb-8">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Total Budget</p>
      <p class="text-3xl font-bold text-slate-900" id="total-budget">$0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">YTD Spent</p>
      <p class="text-3xl font-bold text-orange-600" id="ytd-spent">$0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Remaining</p>
      <p class="text-3xl font-bold text-green-600" id="remaining">$0</p>
    </div>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 p-6">
    <h2 class="text-lg font-semibold text-slate-900 mb-4">GL Line Balances</h2>
    <div id="budget-lines" class="space-y-3"></div>
  </div>

  <!-- Line Detail Modal -->
  <div id="line-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4" id="modal-line-name">GL Account</h2>
      <div id="modal-line-content" class="space-y-4 mb-6"></div>
      <button onclick="closeLineModal()" class="w-full px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Close</button>
    </div>
  </div>
</div>
</template>

<script>
const API = 'http://localhost:8000';
let selectedLine = null;

EIMEShell.mount({
  activeNav: 'budget',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    loadBudget();
    setInterval(loadBudget, 10000);
  }
});

async function loadBudget() {
  try {
    const res = await fetch(`${API}/api/budget/variance?church_id=holy_comforter`);
    const data = await res.json();
    
    const total = data.lines.reduce((sum, l) => sum + (l.annual_budget || 0), 0);
    const spent = data.lines.reduce((sum, l) => sum + (l.ytd_actual || 0), 0);
    const remaining = total - spent;
    
    document.getElementById('total-budget').textContent = `$${total.toFixed(2)}`;
    document.getElementById('ytd-spent').textContent = `$${spent.toFixed(2)}`;
    document.getElementById('remaining').textContent = `$${remaining.toFixed(2)}`;
    
    const lines = data.lines.map(line => {
      const pct = (line.ytd_actual / line.annual_budget * 100).toFixed(0);
      const health = pct < 70 ? 'text-green-600' : pct < 90 ? 'text-yellow-600' : 'text-red-600';
      return `
        <div class="border border-slate-200 rounded-lg p-4 hover:bg-slate-50 cursor-pointer transition-colors" onclick="showLine('${line.gl_code}')">
          <div class="flex items-center justify-between mb-3">
            <div>
              <p class="font-medium text-slate-900">${line.gl_name || line.gl_code}</p>
              <p class="text-xs text-slate-500">${line.gl_code}</p>
            </div>
            <div class="text-right">
              <p class="font-bold ${health}">${pct}%</p>
              <p class="text-sm text-slate-600">$${(line.ytd_actual || 0).toFixed(2)} / $${(line.annual_budget || 0).toFixed(2)}</p>
            </div>
          </div>
          <div class="w-full bg-slate-200 rounded-full h-2">
            <div class="bg-slate-700 h-2 rounded-full transition-all" style="width: ${Math.min(pct, 100)}%"></div>
          </div>
        </div>
      `;
    }).join('');
    
    document.getElementById('budget-lines').innerHTML = lines;
  } catch (e) {
    console.error('Error loading budget:', e);
  }
}

async function showLine(glCode) {
  try {
    const res = await fetch(`${API}/api/budget/variance?church_id=holy_comforter`);
    const data = await res.json();
    const line = data.lines.find(l => l.gl_code === glCode);
    
    if (!line) return;
    
    const pct = (line.ytd_actual / line.annual_budget * 100).toFixed(0);
    const projected = line.ytd_actual / (new Date().getMonth() + 1) * 12;
    
    document.getElementById('modal-line-name').textContent = `${line.gl_name || line.gl_code}`;
    document.getElementById('modal-line-content').innerHTML = `
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">Annual Budget</p>
          <p class="text-2xl font-bold text-slate-900">$${(line.annual_budget || 0).toFixed(2)}</p>
        </div>
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">YTD Spent</p>
          <p class="text-2xl font-bold text-slate-900">$${(line.ytd_actual || 0).toFixed(2)}</p>
        </div>
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">Remaining</p>
          <p class="text-2xl font-bold text-green-600">$${(line.annual_budget - line.ytd_actual).toFixed(2)}</p>
        </div>
        <div class="bg-slate-50 rounded p-3">
          <p class="text-xs text-slate-500 mb-1">Utilization</p>
          <p class="text-2xl font-bold text-slate-900">${pct}%</p>
        </div>
      </div>
      <div class="bg-blue-50 border border-blue-200 rounded p-3">
        <p class="text-sm text-blue-800"><strong>Projected Year-End:</strong> $${projected.toFixed(2)} (${((projected / line.annual_budget) * 100).toFixed(0)}%)</p>
      </div>
    `;
    
    document.getElementById('line-modal').classList.remove('hidden');
  } catch (e) {
    console.error('Error loading line:', e);
  }
}

function closeLineModal() {
  document.getElementById('line-modal').classList.add('hidden');
  selectedLine = null;
}
</script>

</body>
</html>
