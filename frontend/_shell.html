<!--
  EIME Three-Panel Shell
  Loaded by eime-shell.js via fetch and injected into the page.

  Layout (>=1024px): [Left Nav 240px] [Center fluid] [Right Chat Rail 360px]
  Layout (<1024px): collapsible left nav (hamburger) + collapsible chat rail (FAB toggle)
-->
<div id="eime-shell-root" class="flex h-full w-full overflow-hidden">

  <!-- ============== LEFT NAV (240px) ============== -->
  <aside id="eime-left-nav"
    class="eime-left-nav w-60 bg-navy-900 flex-col shadow-xl flex-shrink-0
           hidden lg:flex
           fixed lg:relative inset-y-0 left-0 z-40 lg:z-auto">
    <div class="px-5 py-5 border-b border-navy-700 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gold-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-semibold text-sm leading-tight">EIME</p>
          <p class="text-slate-400 text-xs">Invoice Mapping Engine</p>
        </div>
      </div>
      <button id="eime-nav-close" class="lg:hidden text-slate-400 hover:text-white" onclick="EIMEShell.toggleNav(false)">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <a data-nav="invoices" href="/index.html" class="eime-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-navy-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
        Invoices
      </a>
      <a data-nav="jobs" href="/jobs.html" class="eime-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-navy-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Journal Entries
        <span id="eime-hitl-badge" class="hidden ml-auto bg-red-500 text-white text-xs rounded-full px-2 py-0.5"></span>
      </a>
      <a data-nav="reconciliation" href="/jobs.html#recon" class="eime-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-navy-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
        Reconciliation
      </a>
      <a data-nav="budget" href="/budget.html" class="eime-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-navy-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Budget
      </a>
      <a data-nav="kb" href="/knowledge-base.html" class="eime-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-navy-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Knowledge Base
      </a>
      <a data-nav="settings" href="/coa.html" class="eime-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-slate-300 hover:text-white hover:bg-navy-700 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings (CoA)
      </a>
    </nav>

    <div class="px-3 py-4 border-t border-navy-700">
      <div class="flex items-center gap-2 px-3 py-2 bg-navy-800 rounded-lg">
        <div class="w-2 h-2 bg-green-400 rounded-full"></div>
        <span class="text-slate-300 text-xs" id="eime-church-name-label">Loading…</span>
      </div>
    </div>
  </aside>

  <!-- mobile nav backdrop -->
  <div id="eime-nav-backdrop" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden" onclick="EIMEShell.toggleNav(false)"></div>

  <!-- ============== CENTER PANEL ============== -->
  <main id="eime-center-wrap" class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Mobile top bar -->
    <div class="lg:hidden bg-navy-900 text-white px-2 py-2 flex items-center justify-between flex-shrink-0">
      <button onclick="EIMEShell.toggleNav(true)" class="text-white min-h-[44px] min-w-[44px] flex items-center justify-center" aria-label="Open menu">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <p class="text-sm font-semibold">EIME</p>
      <button onclick="EIMEShell.toggleChat(true)" class="text-white min-h-[44px] min-w-[44px] flex items-center justify-center" aria-label="Open chat">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
      </button>
    </div>

    <div id="eime-center" class="flex-1 overflow-auto">
      <!-- Page content injected here -->
    </div>
  </main>

  <!-- ============== RIGHT CHAT RAIL (360px desktop, bottom-sheet mobile) ============== -->
  <aside id="eime-chat-rail"
    class="eime-chat-rail bg-white border-l border-slate-200 flex-shrink-0
           hidden lg:flex flex-col shadow-xl lg:shadow-none
           lg:w-[360px] lg:relative lg:inset-y-0 lg:right-0
           fixed inset-x-0 bottom-0 z-40 max-h-[80vh] rounded-t-2xl lg:rounded-none
           lg:max-h-none w-full">
    <!-- mobile-only close handle/button -->
    <button id="eime-chat-close" class="lg:hidden self-end m-2 text-slate-500 hover:text-slate-800 min-h-[44px] min-w-[44px] flex items-center justify-center" onclick="EIMEShell.toggleChat(false)" aria-label="Close chat">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <!-- chat rail injected by eime-chat-rail.js -->
  </aside>

  <!-- mobile chat FAB toggle -->
  <button id="eime-chat-fab"
    class="lg:hidden fixed bottom-5 right-5 z-30 bg-navy-900 hover:bg-navy-800 text-white rounded-full w-14 h-14 shadow-lg flex items-center justify-center"
    onclick="EIMEShell.toggleChat(true)">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
  </button>

  <!-- mobile chat backdrop -->
  <div id="eime-chat-backdrop" class="hidden fixed inset-0 bg-black/40 z-30 lg:hidden" onclick="EIMEShell.toggleChat(false)"></div>

</div>
