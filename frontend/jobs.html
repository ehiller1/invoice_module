<!DOCTYPE html>
<html>
<head>
<title>Bills to Approve — Books</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
<script src="/components/invoice-review-card.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <h1 class="text-3xl font-bold text-slate-900 mb-2">Bills to Approve</h1>
  <p class="text-slate-600 mb-6">Bills waiting on you to review and approve before they're paid.</p>

  <div class="grid grid-cols-4 gap-4 mb-8">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">NEEDS CODING</p>
      <p class="text-3xl font-bold text-orange-600" id="count-pending">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">AWAITING YOUR APPROVAL</p>
      <p class="text-3xl font-bold text-blue-600" id="count-approval">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">READY TO PAY</p>
      <p class="text-3xl font-bold text-green-600" id="count-ready">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">DONE THIS MONTH</p>
      <p class="text-3xl font-bold text-slate-700" id="count-total">0</p>
    </div>
  </div>

  <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
      <h2 class="text-lg font-semibold text-slate-900">Bills</h2>
      <button onclick="loadJobs()" class="px-3 py-1.5 text-sm bg-navy-900 text-white rounded hover:bg-navy-800">Refresh</button>
    </div>
    <div id="jobs-list" class="divide-y divide-slate-200"></div>
  </div>

  <!-- Detail Modal with InvoiceReviewCard -->
  <div id="detail-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full max-h-[90vh] overflow-y-auto">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
        <h2 class="text-2xl font-bold text-slate-900">Invoice Review</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="invoice-review-container" class="overflow-y-auto"></div>
    </div>
  </div>
</div>
</template>

<script>
const API = 'http://localhost:8000';
let currentJob = null;
let lastPollTs = null;

EIMEShell.mount({
  activeNav: 'jobs',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'jobs',
      payload: { church_id: 'holy_comforter', job_id: null }
    });
    loadJobs();              // initial full load
    setInterval(pollJobs, 2000);  // efficient delta polling every 2s
  }
});

async function pollJobs() {
  try {
    const url = lastPollTs ? `${API}/api/jobs-poll?since=${encodeURIComponent(lastPollTs)}` : `${API}/api/jobs-poll`;
    const res = await fetch(url);
    const data = await res.json();
    lastPollTs = data.as_of;
    // Only re-render if there are deltas
    if (data.count > 0) {
      loadJobs();
    }
  } catch (e) {
    console.warn('Poll error (will retry):', e.message);
  }
}

async function loadJobs() {
  try {
    const res = await fetch(`${API}/api/jobs`);
    const jobs = await res.json();
    
    let pending = 0, approval = 0, ready = 0;
    jobs.forEach(j => {
      if (j.status === 'PENDING_HITL') pending++;
      else if (j.status === 'HITL_APPROVED') approval++;
      else if (j.status === 'READY_JE') ready++;
    });
    
    document.getElementById('count-pending').textContent = pending;
    document.getElementById('count-approval').textContent = approval;
    document.getElementById('count-ready').textContent = ready;
    document.getElementById('count-total').textContent = jobs.length;
    
    const list = document.getElementById('jobs-list');
    list.innerHTML = jobs.map(j => `
      <div class="px-6 py-4 hover:bg-slate-50 cursor-pointer transition-colors" onclick="showJob('${j.job_id}')">
        <div class="flex items-center justify-between">
          <div>
            <p class="font-medium text-slate-900">${j.vendor_name || 'Unknown'}</p>
            <p class="text-sm text-slate-500">${j.job_id}</p>
          </div>
          <div class="flex items-center gap-4">
            <span class="text-sm text-slate-600">$${(j.total_amount || 0).toFixed(2)}</span>
            <span class="px-3 py-1 rounded-full text-xs font-medium ${statusColor(j.status)}">${statusLabel(j.status)}</span>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    console.error('Error loading jobs:', e);
  }
}

function statusColor(status) {
  const colors = {
    'PENDING_HITL': 'bg-orange-100 text-orange-800',
    'HITL_APPROVED': 'bg-blue-100 text-blue-800',
    'READY_JE': 'bg-green-100 text-green-800',
    'COMPLETED': 'bg-slate-100 text-slate-800',
    'PENDING_TREASURER': 'bg-blue-100 text-blue-800',
    'POSTED': 'bg-green-100 text-green-800',
    'REJECTED': 'bg-red-100 text-red-800',
    'BLOCKED_FUND_RESTRICTION': 'bg-red-100 text-red-800',
    'INSUFFICIENT_CONTEXT': 'bg-amber-100 text-amber-800',
  };
  return colors[status] || 'bg-slate-100 text-slate-600';
}

function statusLabel(status) {
  const labels = {
    'PENDING_HITL': 'Needs Review',
    'HITL_APPROVED': 'Approved — Ready for Treasurer',
    'READY_JE': 'Ready to Pay',
    'COMPLETED': 'Done',
    'PENDING_APPROVAL': 'Needs Approval',
    'PENDING_TREASURER': 'Awaiting Treasurer',
    'APPROVED': 'Approved',
    'POSTED': 'Posted',
    'SENT': 'Sent',
    'REJECTED': 'Rejected',
    'FAILED': 'Failed',
    'BLOCKED_FUND_RESTRICTION': 'Blocked — Restricted Fund',
    'INSUFFICIENT_CONTEXT': 'Needs Info',
    'OPEN': 'Open',
    'DRAFT': 'Draft',
  };
  return labels[status] || status.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

async function showJob(jobId) {
  try {
    const res = await fetch(`${API}/api/jobs/${jobId}`);
    currentJob = await res.json();

    window.eime.setContext({
      page: 'jobs',
      payload: { church_id: 'holy_comforter', job_id: jobId }
    });

    // Render the InvoiceReviewCard with callbacks for Approve, Reject, Override
    InvoiceReviewCard.render(currentJob, {
      containerId: 'invoice-review-container',
      onApprove: handleApproveDecision,
      onReject: handleRejectDecision,
      onOverride: handleOverrideDecision,
    });

    document.getElementById('detail-modal').classList.remove('hidden');
  } catch (e) {
    alert('Error loading job: ' + e.message);
  }
}

/**
 * Handle Approve decision — all line items accepted as-is
 */
async function handleApproveDecision(decisions) {
  if (!currentJob) return;
  try {
    const lineDecisions = (currentJob.line_items || []).map(li => ({
      line_id: li.line_id || li.description,
      action: 'ACCEPT',
      reviewer_id: 'staff',
    }));

    const res = await fetch(`${API}/api/jobs/${currentJob.job_id}/hitl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_decisions: lineDecisions,
        budget_approval_attestation: true,
      }),
    });

    if (!res.ok) {
      const data = await res.json();
      alert('Error approving job: ' + (data.detail || res.statusText));
      return;
    }

    closeModal();
    loadJobs();
  } catch (e) {
    alert('Error approving job: ' + e.message);
  }
}

/**
 * Handle Reject decision — all line items rejected
 */
async function handleRejectDecision(decisions) {
  if (!currentJob) return;
  if (!confirm('Are you sure you want to reject this invoice? It will return to the upload queue.')) return;

  try {
    const lineDecisions = (currentJob.line_items || []).map(li => ({
      line_id: li.line_id || li.description,
      action: 'REJECT',
      reviewer_id: 'staff',
    }));

    const res = await fetch(`${API}/api/jobs/${currentJob.job_id}/hitl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_decisions: lineDecisions,
      }),
    });

    if (!res.ok) {
      const data = await res.json();
      alert('Error rejecting job: ' + (data.detail || res.statusText));
      return;
    }

    closeModal();
    loadJobs();
  } catch (e) {
    alert('Error rejecting job: ' + e.message);
  }
}

/**
 * Handle Override decision — GL accounts have been changed with rationale
 */
async function handleOverrideDecision(decisions) {
  if (!currentJob) return;

  try {
    // Build line decisions with OVERRIDE action and new GL codes
    const lineDecisions = (decisions.overrides || []).map(override => ({
      line_id: override.line_id,
      action: 'OVERRIDE',
      new_gl_code: override.new_account,
      rationale: decisions.rationale,
      reviewer_id: 'staff',
    }));

    // Include non-overridden lines as ACCEPT
    const overriddenLineIds = new Set(decisions.overrides.map(o => o.line_id));
    (currentJob.line_items || []).forEach(li => {
      const lineId = li.line_id || li.description;
      if (!overriddenLineIds.has(lineId)) {
        lineDecisions.push({
          line_id: lineId,
          action: 'ACCEPT',
          reviewer_id: 'staff',
        });
      }
    });

    const res = await fetch(`${API}/api/jobs/${currentJob.job_id}/hitl`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        line_decisions: lineDecisions,
        budget_approval_attestation: true,
        override_rationale: decisions.rationale,
      }),
    });

    if (!res.ok) {
      const data = await res.json();
      alert('Error saving override: ' + (data.detail || res.statusText));
      return;
    }

    closeModal();
    loadJobs();
  } catch (e) {
    alert('Error saving override: ' + e.message);
  }
}

function closeModal() {
  document.getElementById('detail-modal').classList.add('hidden');
  currentJob = null;
}
</script>

</body>
</html>
