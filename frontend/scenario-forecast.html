  <script>

    let scenarios = [];

    let charts = {};

          ],
          margin_impact: [

            { metric: 'Operating Margin %', current: 12, projected: 10, direction: 'negative' },

          ],
          cash_impact: [
            { month: 'Oct', balance: 145000, projected: 143000 },

        }

      {

        name: 'Optimistic Case',
        description: 'New revenue stream + cost controls',
        parameters: { new_revenue_rate: 0.15, opex_reduction: 0.05 },
        results: {
          covenant_impact: [
            { covenant: 'Debt-to-Equity', current: 0.72, projected: 0.58, threshold: 1.5, p_breach: 0 },
            { covenant: 'Interest Coverage', current: 4.2, projected: 5.8, threshold: 2.0, p_breach: 0 },
            { covenant: 'Current Ratio', current: 1.8, projected: 2.1, threshold: 1.0, p_breach: 0 }
          ],
          margin_impact: [
            { metric: 'Gross Margin %', current: 68, projected: 70, direction: 'positive' },
            { metric: 'Operating Margin %', current: 12, projected: 16, direction: 'positive' },
            { metric: 'Net Margin %', current: 8, projected: 12, direction: 'positive' }
          ],
          cash_impact: [
            { month: 'Oct', balance: 145000, projected: 158000 },
            { month: 'Nov', balance: 152000, projected: 174000 },
            { month: 'Dec', balance: 168000, projected: 195000 }
          ],
          levers: [
            { lever: 'Pursue new revenue stream', impact: '+15% revenue', timing: '3-6 months', difficulty: 'hard' },
            { lever: 'Maintain cost discipline', impact: '-5% OPEX', timing: 'ongoing', difficulty: 'medium' }
          ]
        }
      }
    ];

    function loadScenarios() {
      return fetch('/api/scenarios/list')
        .then(r => r.ok ? r.json() : Promise.reject())
        .catch(() => ({ scenarios: [] }))
        .then(data => {
          const raw = Array.isArray(data?.scenarios) ? data.scenarios : [];
          // Normalize backend rows ({scenario_id, scenario_name, ...}) and merge with MOCK presets.
          const fromApi = raw.map(s => ({
            id: s.id || s.scenario_id || s.card_id,
            name: s.name || s.scenario_name || 'Untitled scenario',
            description: s.description || s.scenario_type || '',
            parameters: s.parameters || s.assumptions || {},
            results: s.results || null,
          })).filter(s => s.id);
          scenarios = fromApi.length > 0 ? [...MOCK_SCENARIOS, ...fromApi] : MOCK_SCENARIOS;
          renderScenarioList();
          if (scenarios[0]) selectScenario(scenarios[0].id);
        });
    }

    function renderScenarioList() {
      const container = document.getElementById('scenario-list');
      container.innerHTML = scenarios.map(s => `
        <button onclick="selectScenario('${s.id}')"
          class="scenario-btn w-full text-left p-4 rounded-lg border transition-all ${
            selectedScenario?.id === s.id
              ? 'bg-amber-600/20 border-amber-600 text-slate-900'
              : 'bg-slate-50 border-slate-200 text-slate-700 hover:border-slate-300'
          }">
          <p class="font-semibold text-sm mb-1">${s.name}</p>
          <p class="text-xs text-slate-600">${s.description}</p>
        </button>
      `).join('');
    }

    // Monthly budget baseline (loaded once from API for shock calculations)
    let budgetBaseline = null;
    async function ensureBudget() {
      if (budgetBaseline) return budgetBaseline;
      try {
        const r = await fetch('/api/churches/holy_comforter/budget');
        const d = await r.json();
        budgetBaseline = d.budget || {};
      } catch { budgetBaseline = {}; }
      return budgetBaseline;
    }

    // Convert human shock descriptors → GL account changes for simulate endpoint
    async function shocksToGlChanges(shocks) {
      const budget = await ensureBudget();
      const accounts = budget.accounts || {};
      const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];

      function annualSum(prefix) {
        return Object.entries(accounts)
          .filter(([k]) => k.startsWith(prefix))
          .reduce((s, [, v]) => {
            const row = typeof v === 'object' ? v : {};
            return s + months.reduce((ms, m) => ms + parseFloat(row[m] || 0), 0);
          }, 0);
      }

      const annualRev = annualSum('4');
      const annualExp = annualSum('5') + annualSum('6');
      const changes = {};

      for (const shock of shocks) {
        switch (shock.type) {
          case 'revenue_pct':
            // Apply proportionally across all 4xxx accounts
            for (const [acct, v] of Object.entries(accounts)) {
              if (!acct.startsWith('4')) continue;
              const row = typeof v === 'object' ? v : {};
              const annual = months.reduce((s, m) => s + parseFloat(row[m] || 0), 0);
              changes[acct] = (changes[acct] || 0) + annual * shock.value;
            }
            break;
          case 'expense_pct':
            for (const [acct, v] of Object.entries(accounts)) {
              if (!acct.startsWith('5') && !acct.startsWith('6')) continue;
              const row = typeof v === 'object' ? v : {};
              const annual = months.reduce((s, m) => s + parseFloat(row[m] || 0), 0);
              changes[acct] = (changes[acct] || 0) + annual * shock.value;
            }
            break;
          case 'pledge_drop':
            // Pledges usually hit account 4100
            changes['4100'] = (changes['4100'] || 0) + (annualRev * 0.65 * shock.value);
            break;
          case 'grant_change':
            changes['4300'] = (changes['4300'] || 0) + shock.value;
            break;
          case 'capex_add':
            changes['7000'] = (changes['7000'] || 0) + shock.value;
            break;
          case 'interest_bps':
            // bps change on assumed $2M debt
            changes['5500'] = (changes['5500'] || 0) + (2_000_000 * shock.value / 10000);
            break;
        }
      }
      return changes;
    }

    async function selectScenario(id) {
      selectedScenario = scenarios.find(s => s.id === id);
      renderScenarioList();

      if (selectedScenario && selectedScenario.id !== 'base') {
        try {
          const shocks = selectedScenario.shocks || [];
          const changes = shocks.length > 0
            ? await shocksToGlChanges(shocks)
            : {};
          const params = new URLSearchParams({
            scenario_name: selectedScenario.name,
            scenario_type: 'custom',
          });
          const response = await fetch(`/api/scenario/simulate?${params}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              assumptions: selectedScenario.parameters || {},
              changes,
            })
          });

          if (response.ok) {
            const simResult = await response.json();
            // Merge backend net_change into results for display
            if (simResult.impact_summary) {
              const netChange = simResult.impact_summary.net_change || 0;
              const pct = Math.abs(netChange) > 0 ? (netChange / Math.max(1, Math.abs(simResult.impact_summary.total_base_gl || netChange))) : 0;
              if (selectedScenario.results) {
                // Propagate net_change into margin and cash impact rows
                selectedScenario.results.margin_impact = selectedScenario.results.margin_impact.map((m, i) => ({
                  ...m,
                  projected: i === 0 ? Math.max(0, m.current + netChange / 10000).toFixed(1) : m.projected,
                  direction: netChange < 0 ? 'negative' : netChange > 0 ? 'positive' : 'stable',
                }));
                selectedScenario.results.cash_impact = selectedScenario.results.cash_impact.map(c => ({
                  ...c,
                  projected: Math.round(c.balance + netChange / 12),
                }));
              }
              selectedScenario._simResult = simResult;
            }
          }
        } catch (error) {
          console.error('Error simulating scenario:', error);
        }
      }

      renderScenarioResults();
    }

    function renderScenarioResults() {
      if (!selectedScenario) return;

      const results = selectedScenario.results;
      document.getElementById('scenario-title').textContent = selectedScenario.name;
      document.getElementById('scenario-desc').textContent = selectedScenario.description;

      // Show composed shock chips if this is a user-built scenario
      const shocksEl = document.getElementById('scenario-shocks');
      const shocks = selectedScenario.shocks || [];
      if (shocksEl) {
        if (shocks.length > 0) {
          const sim = selectedScenario._simResult;
          const netChange = sim?.impact_summary?.net_change;
          const netBadge = netChange != null
            ? `<span class="px-2 py-1 rounded text-xs font-bold ${netChange >= 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-700'}">
                Net: ${netChange >= 0 ? '+' : ''}$${Math.abs(netChange/1000).toFixed(0)}K
               </span>`
            : '';
          shocksEl.innerHTML = `
            <div class="mb-5 p-3 bg-slate-100 rounded-lg">
              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Active Shocks ${netBadge}</p>
              <div class="flex flex-wrap gap-2">
                ${shocks.map(s => `
                  <span class="px-2 py-1 rounded text-xs font-medium ${s.raw < 0 ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}">
                    ${s.label}: ${s.raw > 0 ? '+' : ''}${s.raw}${s.unit}
                  </span>`).join('')}
              </div>
            </div>`;
        } else {
          shocksEl.innerHTML = '';
        }
      }

      // Covenant Impact
      const covenantHtml = results.covenant_impact.map(c => {
        const riskLevel = c.p_breach >= 15 ? 'red' : c.p_breach >= 5 ? 'amber' : 'green';
        const riskColor = {
          red: 'text-red-400 bg-red-500/10',
          amber: 'text-amber-400 bg-amber-500/10',
          green: 'text-green-400 bg-green-500/10'
        }[riskLevel];

        return `
          <div class="bg-slate-200/50 rounded p-3 flex items-center justify-between">
            <div>
              <p class="text-sm font-medium text-slate-200">${c.covenant}</p>
              <div class="flex gap-4 mt-1">
                <span class="text-xs text-slate-600">Current: <span class="text-slate-900 font-semibold">${c.current}</span></span>
                <span class="text-xs text-slate-600">Projected: <span class="text-slate-900 font-semibold">${c.projected}</span></span>
                <span class="text-xs text-slate-600">Threshold: <span class="text-slate-900 font-semibold">${c.threshold}</span></span>
              </div>
            </div>
            <div class="text-right">
              <p class="text-xs font-semibold mb-1">Breach Risk</p>
              <span class="inline-block px-2 py-1 rounded text-xs font-medium ${riskColor}">${c.p_breach}%</span>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('covenant-impact').innerHTML = covenantHtml;

      // Margin Impact
      const marginHtml = results.margin_impact.map(m => {
        const isNegative = m.direction === 'negative';
        const color = m.direction === 'stable' ? 'text-slate-700' : isNegative ? 'text-red-400' : 'text-green-400';
        const icon = m.direction === 'stable' ? '→' : isNegative ? '↓' : '↑';

        return `
          <div class="bg-slate-200/50 rounded p-3">
            <p class="text-sm font-medium text-slate-200 mb-2">${m.metric}</p>
            <div class="flex items-center justify-between">
              <div class="flex gap-4">
                <span class="text-xs text-slate-600">Current: <span class="text-slate-900 font-semibold">${m.current}%</span></span>
                <span class="text-xs text-slate-600">Projected: <span class="text-slate-900 font-semibold">${m.projected}%</span></span>
              </div>
              <span class="text-sm font-semibold ${color}">${icon} ${Math.abs(m.projected - m.current)}%</span>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('margin-impact').innerHTML = marginHtml;

      // Cash Impact Chart
      const cashCtx = document.getElementById('cash-chart');
      if (charts.cash) charts.cash.destroy();
      charts.cash = new Chart(cashCtx, {
        type: 'line',
        data: {
          labels: results.cash_impact.map(c => c.month),
          datasets: [
            {
              label: 'Current Forecast',
              data: results.cash_impact.map(c => c.balance),
              borderColor: '#60a5fa',
              backgroundColor: 'rgba(96, 165, 250, 0.1)',
              tension: 0.4,
              fill: true,
              pointRadius: 4,
              pointBackgroundColor: '#60a5fa'
            },
            {
              label: selectedScenario.name,
              data: results.cash_impact.map(c => c.projected),
              borderColor: '#fbbf24',
              backgroundColor: 'rgba(251, 191, 36, 0.1)',
              tension: 0.4,
              fill: true,
              pointRadius: 4,
              pointBackgroundColor: '#fbbf24'
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#cbd5e1' } }
          },
          scales: {
            y: {
              ticks: { color: '#94a3b8' },
              grid: { color: 'rgba(148, 163, 184, 0.1)' }
            },
            x: {
              ticks: { color: '#94a3b8' },
              grid: { color: 'rgba(148, 163, 184, 0.1)' }
            }
          }
        }
      });

      // Levers
      const leversHtml = results.levers.length > 0 ? results.levers.map(l => `
        <div class="bg-sky-500/10 border border-sky-500/20 rounded p-3">
          <div class="flex items-start justify-between mb-1">
            <p class="font-medium text-sm text-sky-400">${l.lever}</p>
            <span class="text-xs px-2 py-0.5 bg-sky-500/20 text-sky-300 rounded">${l.difficulty}</span>
          </div>
          <p class="text-xs text-slate-600 mb-2">Impact: <span class="text-slate-200 font-semibold">${l.impact}</span></p>
          <p class="text-xs text-slate-600">Timing: ${l.timing}</p>
        </div>
      `).join('') : '<p class="text-sm text-slate-600">No mitigation levers for this scenario</p>';
      document.getElementById('levers').innerHTML = leversHtml;
    }

    // ── Shock descriptors ─────────────────────────────────────────────────
    // Each variable has: id, label, unit, min, max, step, default, shockType
    const SHOCK_VARS = [
      { id: 'pledge_pct',    label: 'Pledge / Giving',     unit: '%',   min: -50,      max: 30,       step: 1,      def: 0,    type: 'pledge_drop',  scale: 0.01,   description: 'Change in congregation pledge income' },
      { id: 'grant_amt',     label: 'Grants / Donations',  unit: '$K',  min: -200,     max: 500,      step: 10,     def: 0,    type: 'grant_change', scale: 1000,   description: 'One-time or recurring grant change' },
      { id: 'opex_pct',      label: 'Operating Expenses',  unit: '%',   min: -30,      max: 50,       step: 1,      def: 0,    type: 'expense_pct',  scale: 0.01,   description: 'Broad OPEX change (staffing, utilities, etc.)' },
      { id: 'capex_amt',     label: 'Capital Expenditure', unit: '$K',  min: 0,        max: 2000,     step: 25,     def: 0,    type: 'capex_add',    scale: 1000,   description: 'Planned capital projects (adds to expenses)' },
      { id: 'interest_bps',  label: 'Interest Rate',       unit: 'bps', min: -200,     max: 300,      step: 25,     def: 0,    type: 'interest_bps', scale: 1,      description: 'Change in debt service cost (basis points)' },
      { id: 'revenue_misc',  label: 'Other Revenue',       unit: '%',   min: -50,      max: 100,      step: 1,      def: 0,    type: 'revenue_pct',  scale: 0.01,   description: 'Facility rentals, events, other income' },
    ];

    let composerValues = Object.fromEntries(SHOCK_VARS.map(v => [v.id, v.def]));

    function createCustomScenario() {
      const modal = document.createElement('div');
      modal.id = 'compose-modal';
      modal.className = 'fixed inset-0 bg-black/60 z-40 flex items-center justify-center p-4';
      modal.onclick = e => e.target === modal && modal.remove();

      modal.innerHTML = `
        <div class="bg-white rounded-xl max-w-2xl w-full border border-slate-200 shadow-xl max-h-[90vh] flex flex-col">
          <div class="border-b border-slate-200 px-6 py-4 flex items-center justify-between">
            <div>
              <h2 class="text-lg font-semibold text-slate-900">Compose Scenario</h2>
              <p class="text-xs text-slate-500 mt-0.5">Combine multiple shocks — the model compounds them against your live budget baseline</p>
            </div>
            <button onclick="document.getElementById('compose-modal').remove()" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
          </div>

          <div class="overflow-y-auto flex-1">
            <div class="p-6 space-y-1">
              <div class="mb-4">
                <label class="text-xs font-semibold text-slate-600 block mb-1">Scenario Name</label>
                <input id="compose-name" type="text" placeholder="e.g., Recession + Deferred Capex"
                  class="w-full px-3 py-2 border border-slate-300 rounded-lg text-slate-900 text-sm focus:ring-2 focus:ring-amber-500 focus:border-transparent outline-none">
              </div>

              <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Shock Variables</p>

              ${SHOCK_VARS.map(v => `
              <div class="bg-slate-50 rounded-lg p-4 mb-2">
                <div class="flex items-start justify-between mb-2">
                  <div>
                    <p class="text-sm font-semibold text-slate-800">${v.label}</p>
                    <p class="text-xs text-slate-500">${v.description}</p>
                  </div>
                  <div class="text-right ml-4">
                    <span id="compose-val-${v.id}" class="text-base font-bold ${composerValues[v.id] < 0 ? 'text-red-600' : composerValues[v.id] > 0 ? 'text-green-700' : 'text-slate-400'}">
                      ${composerValues[v.id] > 0 ? '+' : ''}${composerValues[v.id]}${v.unit}
                    </span>
                  </div>
                </div>
                <input type="range" id="compose-slider-${v.id}"
                  min="${v.min}" max="${v.max}" step="${v.step}" value="${composerValues[v.id]}"
                  class="w-full h-2 accent-amber-500 cursor-pointer"
                  oninput="updateShockSlider('${v.id}', this.value, '${v.unit}')">
                <div class="flex justify-between text-xs text-slate-400 mt-1">
                  <span>${v.min > 0 ? '+' : ''}${v.min}${v.unit}</span>
                  <span>0</span>
                  <span>+${v.max}${v.unit}</span>
                </div>
              </div>`).join('')}
            </div>

            <!-- Live impact preview -->
            <div class="px-6 pb-4">
              <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
                <p class="text-xs font-semibold text-amber-800 mb-2">Estimated Annual Impact</p>
                <div id="compose-preview" class="grid grid-cols-3 gap-3 text-sm"></div>
              </div>
            </div>
          </div>

          <div class="border-t border-slate-200 px-6 py-4 flex gap-2 justify-end bg-white rounded-b-xl">
            <button onclick="document.getElementById('compose-modal').remove()"
              class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg font-medium text-sm transition-colors">
              Cancel
            </button>
            <button onclick="saveComposedScenario()"
              class="px-4 py-2 bg-amber-600 hover:bg-amber-700 text-white rounded-lg font-medium text-sm transition-colors">
              Add to Scenarios
            </button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      updateComposePreview();
    }

    function updateShockSlider(id, value, unit) {
      composerValues[id] = parseFloat(value);
      const valEl = document.getElementById(`compose-val-${id}`);
      if (valEl) {
        const v = composerValues[id];
        valEl.textContent = `${v > 0 ? '+' : ''}${v}${unit}`;
        valEl.className = `text-base font-bold ${v < 0 ? 'text-red-600' : v > 0 ? 'text-green-700' : 'text-slate-400'}`;
      }
      updateComposePreview();
    }

    function updateComposePreview() {
      const preview = document.getElementById('compose-preview');
      if (!preview) return;

      // Quick estimate without hitting the API
      const annualRev = 213000;  // from budget baseline
      const annualExp = 165698;

      let revDelta = 0, expDelta = 0;
      for (const v of SHOCK_VARS) {
        const raw = composerValues[v.id] * v.scale;
        if (['pledge_drop','grant_change','revenue_pct'].includes(v.type)) {
          revDelta += v.type === 'grant_change' ? raw : annualRev * raw;
        } else {
          expDelta += v.type === 'capex_add' ? raw : annualExp * raw;
        }
      }
      const netDelta = revDelta - expDelta;
      const fmt = n => (n >= 0 ? '+' : '−') + '$' + Math.abs(n/1000).toFixed(0) + 'K';
      const color = n => n >= 0 ? 'text-green-700' : 'text-red-600';

      preview.innerHTML = `
        <div class="text-center">
          <p class="text-xs text-amber-700 mb-1">Revenue Δ</p>
          <p class="font-bold ${color(revDelta)}">${fmt(revDelta)}</p>
        </div>
        <div class="text-center">
          <p class="text-xs text-amber-700 mb-1">Expense Δ</p>
          <p class="font-bold ${color(-expDelta)}">${fmt(-expDelta)}</p>
        </div>
        <div class="text-center border-l border-amber-200 pl-3">
          <p class="text-xs text-amber-700 mb-1">Net Impact</p>
          <p class="font-bold text-lg ${color(netDelta)}">${fmt(netDelta)}</p>
        </div>
      `;
    }

    async function saveComposedScenario() {
      const name = document.getElementById('compose-name')?.value.trim() || 'Custom Scenario';
      const activeShocks = SHOCK_VARS
        .filter(v => composerValues[v.id] !== 0)
        .map(v => ({ type: v.type, value: composerValues[v.id] * v.scale, label: v.label, raw: composerValues[v.id], unit: v.unit }));

      if (activeShocks.length === 0) {
        alert('Set at least one shock variable before saving.');
        return;
      }

      const desc = activeShocks
        .map(s => `${s.label}: ${s.raw > 0 ? '+' : ''}${s.raw}${s.unit}`)
        .join(', ');

      const newScenario = {
        id: 'custom-' + Date.now(),
        name,
        description: desc,
        shocks: activeShocks,
        parameters: Object.fromEntries(activeShocks.map(s => [s.type, s.value])),
        results: {
          covenant_impact: [
            { covenant: 'Debt-to-Equity', current: 0.72, projected: 0.72, threshold: 1.5, p_breach: 0 },
            { covenant: 'Interest Coverage', current: 4.2, projected: 4.2, threshold: 2.0, p_breach: 0 },
            { covenant: 'Current Ratio', current: 1.8, projected: 1.8, threshold: 1.0, p_breach: 0 },
          ],
          margin_impact: [
            { metric: 'Gross Margin %', current: 68, projected: 68, direction: 'stable' },
            { metric: 'Operating Margin %', current: 12, projected: 12, direction: 'stable' },
            { metric: 'Net Margin %', current: 8, projected: 8, direction: 'stable' },
          ],
          cash_impact: [
            { month: 'Oct', balance: 145000, projected: 145000 },
            { month: 'Nov', balance: 152000, projected: 152000 },
            { month: 'Dec', balance: 168000, projected: 168000 },
          ],
          levers: activeShocks
            .filter(s => s.raw < 0)
            .map(s => ({ lever: `Offset ${s.label} decline`, impact: 'TBD after simulation', feasibility: 'medium' })),
        },
      };

      scenarios.push(newScenario);
      // Reset sliders for next compose
      composerValues = Object.fromEntries(SHOCK_VARS.map(v => [v.id, v.def]));
      document.getElementById('compose-modal')?.remove();
      renderScenarioList();
      await selectScenario(newScenario.id);
    }

    function initPage() {
      const centerContent = `
            <div class="max-w-7xl mx-auto p-6">
              <!-- Header -->
              <div class="mb-6">
                <h1 class="text-3xl font-bold text-slate-900 mb-2">What-If Planning</h1>
                <p class="text-slate-600">Try out scenarios &mdash; "what happens if pledges drop 20%?" &mdash; and see the effect on your cash, budget, and obligations.</p>
              </div>

              <div class="grid grid-cols-3 gap-6">
                <!-- Left: Scenario List -->
                <div>
                  <div class="mb-3 flex items-center justify-between">
                    <h2 class="text-sm font-semibold text-slate-700">Scenarios</h2>
                    <button onclick="createCustomScenario()" class="text-xs px-2 py-1 bg-amber-600 hover:bg-amber-700 text-white rounded font-medium transition-colors">
                      + New
                    </button>
                  </div>
                  <div id="scenario-list" class="space-y-2">
                    <!-- Scenarios will render here -->
                  </div>
                </div>

                <!-- Right: Results -->
                <div class="col-span-2">
                  <div class="bg-slate-50 rounded-lg p-6 border border-slate-200">
                    <h2 id="scenario-title" class="text-2xl font-bold text-slate-900 mb-1"></h2>
                    <p id="scenario-desc" class="text-sm text-slate-600 mb-3"></p>
                    <div id="scenario-shocks"></div>

                    <!-- Tabs -->
                    <div class="flex gap-2 mb-6 border-b border-slate-200">
                      <button class="tab-btn active px-3 py-2 text-sm font-medium text-slate-700 hover:text-white border-b-2 border-transparent hover:border-slate-300" onclick="switchTab(event, 'covenants')">
                        Covenants
                      </button>
                      <button class="tab-btn px-3 py-2 text-sm font-medium text-slate-700 hover:text-white border-b-2 border-transparent hover:border-slate-300" onclick="switchTab(event, 'margins')">
                        Margins
                      </button>
                      <button class="tab-btn px-3 py-2 text-sm font-medium text-slate-700 hover:text-white border-b-2 border-transparent hover:border-slate-300" onclick="switchTab(event, 'cash')">
                        Cash
                      </button>
                      <button class="tab-btn px-3 py-2 text-sm font-medium text-slate-700 hover:text-white border-b-2 border-transparent hover:border-slate-300" onclick="switchTab(event, 'levers')">
                        Levers
                      </button>
                    </div>

                    <!-- Covenants -->
                    <div id="tab-covenants" class="tab-content space-y-2">
                      <div id="covenant-impact"></div>
                    </div>

                    <!-- Margins -->
                    <div id="tab-margins" class="tab-content hidden space-y-2">
                      <div id="margin-impact"></div>
                    </div>

                    <!-- Cash -->
                    <div id="tab-cash" class="tab-content hidden">
                      <div style="height: 300px;">
                        <canvas id="cash-chart"></canvas>
                      </div>
                    </div>

                    <!-- Levers -->
                    <div id="tab-levers" class="tab-content hidden space-y-2">
                      <div id="levers"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
      `;

      EIMEShell.mount({
        activeNav: 'scenario-forecast',
        centerContent,
        onMounted: () => {
          loadScenarios();
        }
      });

      window.switchTab = function(e, tab) {
        // Update buttons
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.classList.remove('active');
          btn.classList.add('border-transparent');
        });
        e.target.classList.add('active');
        e.target.classList.remove('border-transparent');
        e.target.classList.add('border-amber-600');

        // Update content
        document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
      };

      loadScenarios();
    }

    document.addEventListener('DOMContentLoaded', initPage);
  </script>
</body>
</html>
