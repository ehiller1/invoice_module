<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exceptions — Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <template id="page-center-content">
        <div class="p-6 max-w-7xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Exceptions</h1>
                <p class="text-gray-600">Transactions that look unusual &mdash; bigger than normal, from an odd vendor, or different from your usual patterns. Worth a second look.</p>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Severity</label>
                        <select id="filterSeverity" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Severities</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Type of Flag</label>
                        <select id="filterType" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Types</option>
                            <option value="vendor_pricing_anomaly">Vendor charged more than usual</option>
                            <option value="je_anomaly">Unusual transaction pattern</option>
                            <option value="override_pattern">Someone overrode the system</option>
                            <option value="related_party">Possible related party</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confidence</label>
                        <select id="filterConfidence" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Confidence</option>
                            <option value="high">High (80%+)</option>
                            <option value="medium">Medium (50-80%)</option>
                            <option value="low">Low (<50%)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                        <select id="filterStatus" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending Review</option>
                            <option value="approved">Approved as OK</option>
                            <option value="investigating">Investigating</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button id="btnFilter" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
                        Filter
                    </button>
                    <button id="btnClear" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-400">
                        Clear
                    </button>
                </div>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-red-500">
                    <p class="text-sm font-medium text-gray-600 mb-1">Total Findings</p>
                    <p id="statTotal" class="text-2xl font-bold text-gray-900">-</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-red-500">
                    <p class="text-sm font-medium text-gray-600 mb-1">High Severity</p>
                    <p id="statHigh" class="text-2xl font-bold text-red-600">-</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-yellow-500">
                    <p class="text-sm font-medium text-gray-600 mb-1">Medium Severity</p>
                    <p id="statMedium" class="text-2xl font-bold text-yellow-600">-</p>
                </div>
                <div class="bg-white rounded-lg shadow-sm p-4 border-l-4 border-blue-500">
                    <p class="text-sm font-medium text-gray-600 mb-1">Pending Review</p>
                    <p id="statPending" class="text-2xl font-bold text-blue-600">-</p>
                </div>
            </div>

            <!-- Findings List -->
            <div class="space-y-4">
                <div id="findingsList"></div>
            </div>
        </div>

        <!-- Finding Detail Modal -->
        <div id="findingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-lg max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 id="findingModalTitle" class="text-xl font-bold text-gray-900">Finding Details</h2>
                    <button onclick="closeFindingModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-6">
                    <div id="findingDetail"></div>
                    <!-- Rationale capture — shown before confirming an action -->
                    <div id="rationaleSection" class="hidden border-t border-gray-200 pt-4 space-y-3">
                        <p id="rationalePrompt" class="text-sm font-medium text-gray-700"></p>
                        <textarea id="rationaleText" rows="3" placeholder="e.g. This vendor changed their billing model in January per amended contract on file…" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                        <label id="baselineLabel" class="hidden flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="suppressCheck" class="rounded border-gray-300 text-green-600" />
                            <span class="text-sm text-gray-700">Mark as new baseline — this pattern won't alert again</span>
                        </label>
                        <div class="flex gap-2">
                            <button id="btnConfirmAction" class="px-4 py-2 text-white rounded-lg font-medium text-sm">Confirm</button>
                            <button onclick="cancelRationale()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium text-sm hover:bg-gray-200">Cancel</button>
                        </div>
                    </div>
                    <div id="adjudicationButtons" class="grid grid-cols-2 gap-4">
                        <button id="btnApprove" class="px-4 py-2 bg-green-600 text-white rounded-lg font-medium hover:bg-green-700">
                            ✓ Approve as OK
                        </button>
                        <button id="btnInvestigate" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">
                            🔍 Mark as Investigating
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="eime-bus.js"></script>
    <script src="eime-shell.js"></script>
    <script src="eime-chat-rail.js"></script>
    <script>
        let allFindings = [];
        const CHURCH_ID = 'holy_comforter';

        async function loadFindings() {
            try {
                const response = await fetch(`/api/audit/adversarial-findings?church_id=${CHURCH_ID}`);
                const data = await response.json();

                // Map the response format
                allFindings = (data.findings || data).map(f => ({
                    ...f,
                    status: f.status || 'pending'
                }));

                updateStats();
                renderFindings(allFindings);
            } catch (error) {
                console.error('Error loading findings:', error);
                document.getElementById('findingsList').innerHTML =
                    '<div class="p-6 text-center text-red-500">Error loading findings</div>';
            }
        }

        function updateStats() {
            const total = allFindings.length;
            const high = allFindings.filter(f => f.severity === 'high').length;
            const medium = allFindings.filter(f => f.severity === 'medium').length;
            const pending = allFindings.filter(f => f.status === 'pending').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statHigh').textContent = high;
            document.getElementById('statMedium').textContent = medium;
            document.getElementById('statPending').textContent = pending;
        }

        function renderFindings(findings) {
            const container = document.getElementById('findingsList');
            if (findings.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500 bg-white rounded-lg">No findings</div>';
                return;
            }

            container.innerHTML = findings.map(finding => {
                const severityColor = {
                    high: 'border-red-500 bg-red-50',
                    medium: 'border-yellow-500 bg-yellow-50',
                    low: 'border-blue-500 bg-blue-50'
                };

                const severityBadge = {
                    high: 'bg-red-100 text-red-800',
                    medium: 'bg-yellow-100 text-yellow-800',
                    low: 'bg-blue-100 text-blue-800'
                };

                const typeLabel = {
                    pricing_drift: 'Vendor Pricing Drift',
                    je_anomaly: 'JE Pattern Anomaly',
                    override_pattern: 'Override Pattern',
                    related_party: 'Related Party'
                };

                return `
                    <div onclick="showFindingDetail('${finding.finding_id}')" class="bg-white rounded-lg shadow-sm border-l-4 ${severityColor[finding.severity] || severityColor.low} p-4 hover:shadow-md cursor-pointer transition">
                        <div class="flex items-start justify-between mb-3">
                            <div>
                                <p class="font-semibold text-gray-900">${finding.summary}</p>
                                <p class="text-xs text-gray-600 mt-1">ID: ${finding.finding_id}</p>
                            </div>
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${severityBadge[finding.severity]}">
                                ${finding.severity.toUpperCase()}
                            </span>
                        </div>

                        <div class="grid grid-cols-3 gap-4 mb-3">
                            <div>
                                <p class="text-xs font-medium text-gray-600">Membrane</p>
                                <p class="text-sm text-gray-900 font-mono">${finding.membrane}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Category</p>
                                <p class="text-sm text-gray-900">${typeLabel[finding.category] || finding.category}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Status</p>
                                <p class="text-sm font-medium ${
                                    finding.status === 'pending' ? 'text-blue-600' :
                                    finding.status === 'approved' ? 'text-green-600' :
                                    'text-orange-600'
                                }">
                                    ${finding.status.charAt(0).toUpperCase() + finding.status.slice(1)}
                                </p>
                            </div>
                        </div>

                        <p class="text-sm text-gray-700 mb-3">${finding.recommendation || 'Review this transaction'}</p>

                        <div class="flex gap-2">
                            <span class="inline-block px-2 py-1 bg-gray-100 text-gray-700 rounded text-xs">
                                Finding ID: ${finding.finding_id}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function showFindingDetail(findingId) {
            const finding = allFindings.find(f => f.finding_id === findingId);
            if (!finding) return;

            document.getElementById('findingModalTitle').textContent = finding.summary;

            let detailHtml = `
                <div class="space-y-4">
                    <div class="bg-gray-50 p-4 rounded">
                        <p class="text-sm font-medium text-gray-600 mb-2">What's Suspicious</p>
                        <p class="text-sm text-gray-900">${finding.summary}</p>
                    </div>

                    <div class="bg-gray-50 p-4 rounded">
                        <p class="text-sm font-medium text-gray-600 mb-2">Recommendation</p>
                        <p class="text-sm text-gray-900">${finding.recommendation}</p>
                    </div>
            `;

            // Add type-specific details
            if (finding.membrane === 'pricing_drift' && finding.vendor) {
                detailHtml += `
                    <div class="border border-gray-200 rounded p-4">
                        <p class="text-sm font-medium text-gray-900 mb-3">Vendor: ${finding.vendor}</p>
                        <div class="grid grid-cols-3 gap-4 text-sm">
                            <div>
                                <p class="text-xs font-medium text-gray-600">Prior Price</p>
                                <p class="text-gray-900 font-mono">${finding.prior_unit_price}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Current Price</p>
                                <p class="text-gray-900 font-mono">${finding.current_unit_price}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Impact</p>
                                <p class="text-red-600 font-bold">${finding.impact}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (finding.membrane === 'je_anomaly') {
                detailHtml += `
                    <div class="border border-gray-200 rounded p-4">
                        <p class="text-sm font-medium text-gray-900 mb-3">JE Pattern</p>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>
                                <p class="text-xs font-medium text-gray-600">From</p>
                                <p class="text-gray-900">${finding.account_from}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">To</p>
                                <p class="text-gray-900">${finding.account_to}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Frequency</p>
                                <p class="text-gray-900">${finding.frequency}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Total Amount</p>
                                <p class="text-gray-900 font-bold">${finding.total_amount}</p>
                            </div>
                        </div>
                        <p class="text-sm text-red-700 mt-3">Supporting docs: ${finding.supporting_docs || 0}</p>
                    </div>
                `;
            } else if (finding.membrane === 'override_pattern') {
                detailHtml += `
                    <div class="border border-gray-200 rounded p-4">
                        <p class="text-sm font-medium text-gray-900 mb-3">Override Stats</p>
                        <div class="grid grid-cols-2 gap-4 text-sm">
                            <div>
                                <p class="text-xs font-medium text-gray-600">Actor</p>
                                <p class="text-gray-900">${finding.actor}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Authority Tier</p>
                                <p class="text-gray-900">T${finding.authority_tier}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Override Count</p>
                                <p class="text-red-600 font-bold">${finding.override_count}</p>
                            </div>
                            <div>
                                <p class="text-xs font-medium text-gray-600">Override Rate</p>
                                <p class="text-red-600 font-bold">${(finding.override_count / finding.total_decisions * 100).toFixed(1)}%</p>
                            </div>
                        </div>
                    </div>
                `;
            }

            detailHtml += `</div>`;
            document.getElementById('findingDetail').innerHTML = detailHtml;

            document.getElementById('btnApprove').onclick = () => {
                showRationaleCapture(finding, 'approved');
            };

            document.getElementById('btnInvestigate').onclick = () => {
                showRationaleCapture(finding, 'investigating');
            };

            document.getElementById('findingModal').classList.remove('hidden');
        }

        function showRationaleCapture(finding, action) {
            const isApprove = action === 'approved';
            document.getElementById('adjudicationButtons').classList.add('hidden');
            const section = document.getElementById('rationaleSection');
            section.classList.remove('hidden');
            document.getElementById('rationalePrompt').textContent = isApprove
                ? 'Why is this finding OK? Your rationale will improve future detection.'
                : 'What are you investigating? Add context for the audit trail.';
            const baselineLabel = document.getElementById('baselineLabel');
            if (isApprove) baselineLabel.classList.remove('hidden');
            else baselineLabel.classList.add('hidden');
            document.getElementById('rationaleText').value = '';
            document.getElementById('suppressCheck').checked = false;
            const btn = document.getElementById('btnConfirmAction');
            btn.textContent = isApprove ? 'Approve as OK' : 'Start Investigation';
            btn.className = `px-4 py-2 text-white rounded-lg font-medium text-sm ${isApprove ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'}`;
            btn.onclick = async () => {
                const reasoning = document.getElementById('rationaleText').value.trim() || null;
                const suppress = isApprove && document.getElementById('suppressCheck').checked;
                try {
                    await fetch(`/api/audit/adversarial-findings/${finding.finding_id}/adjudicate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ verdict: action, reasoning, suppress_recurrence: suppress, actor: 'current_user' })
                    });
                } catch (_) { /* best-effort */ }
                finding.status = action;
                if (suppress) finding.suppressed = true;
                updateStats();
                renderFindings(allFindings);
                closeFindingModal();
                const msg = suppress
                    ? '✓ Approved — this pattern is marked as new baseline and won\'t alert again'
                    : isApprove ? '✓ Finding approved as OK' : '🔍 Marked as investigating';
                showBanner(msg, isApprove ? 'green' : 'blue');
            };
            document.getElementById('rationaleText').focus();
        }

        function cancelRationale() {
            document.getElementById('rationaleSection').classList.add('hidden');
            document.getElementById('adjudicationButtons').classList.remove('hidden');
        }

        function showBanner(message, color) {
            const colors = { green: 'bg-green-100 text-green-800 border-green-300', blue: 'bg-blue-100 text-blue-800 border-blue-300' };
            const banner = document.createElement('div');
            banner.className = `fixed bottom-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-lg border text-sm font-medium shadow-lg z-50 ${colors[color] || colors.green}`;
            banner.textContent = message;
            document.body.appendChild(banner);
            setTimeout(() => banner.remove(), 4000);
        }

        function closeFindingModal() {
            document.getElementById('findingModal').classList.add('hidden');
            document.getElementById('rationaleSection').classList.add('hidden');
            document.getElementById('adjudicationButtons').classList.remove('hidden');
        }

        async function onMounted() {
            document.getElementById('btnFilter').addEventListener('click', () => {
                const severity = document.getElementById('filterSeverity').value;
                const type = document.getElementById('filterType').value;
                const status = document.getElementById('filterStatus').value;

                const filtered = allFindings.filter(f => {
                    if (severity && f.severity !== severity) return false;
                    if (type && f.category !== type) return false;
                    if (status && f.status !== status) return false;
                    return true;
                });

                renderFindings(filtered);
            });

            document.getElementById('btnClear').addEventListener('click', () => {
                document.getElementById('filterSeverity').value = '';
                document.getElementById('filterType').value = '';
                document.getElementById('filterStatus').value = '';
                renderFindings(allFindings);
            });

            await loadFindings();
            eime.setContext({
                page: 'adversarial-findings',
                payload: { churchId: CHURCH_ID }
            });
        }

        EIMEShell.mount({
            activeNav: 'adversarial-audit',
            pageTitle: 'Adversarial Findings',
            centerContent: document.getElementById('page-center-content').innerHTML,
            onMounted: onMounted
        });
    </script>
</body>
</html>
