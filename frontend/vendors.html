<!DOCTYPE html>
<html>
<head>
<title>Vendors — Books</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-7xl mx-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-900 mb-1">Vendors</h1>
      <p class="text-slate-600">Everyone you pay &mdash; their address, how they like to be paid, and their tax forms on file.</p>
    </div>
    <button onclick="openCreateModal()" class="px-4 py-2 bg-navy-900 text-white rounded-lg hover:bg-navy-800 flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      Add Vendor
    </button>
  </div>

  <div class="grid grid-cols-4 gap-4 mb-6">
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Total Vendors</p>
      <p class="text-3xl font-bold text-slate-900" id="count-total">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">ACH Enabled</p>
      <p class="text-3xl font-bold text-blue-600" id="count-ach">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">W9 On File</p>
      <p class="text-3xl font-bold text-green-600" id="count-w9">0</p>
    </div>
    <div class="bg-white border border-slate-200 rounded-lg p-4">
      <p class="text-xs text-slate-500 font-semibold uppercase">Flagged</p>
      <p class="text-3xl font-bold text-orange-600" id="count-flagged">0</p>
    </div>
  </div>

  <div class="mb-4">
    <input id="vendor-search" type="text" placeholder="Search vendors..." 
      class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none"
      onkeyup="filterVendors()" />
  </div>

  <div class="bg-white rounded-lg border border-slate-200 overflow-hidden">
    <table class="w-full">
      <thead class="bg-slate-50 border-b border-slate-200">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase">Vendor Name</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase">Payment Methods</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase">W9</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-slate-700 uppercase">Status</th>
          <th class="px-6 py-3 text-right text-xs font-semibold text-slate-700 uppercase">Actions</th>
        </tr>
      </thead>
      <tbody id="vendors-list" class="divide-y divide-slate-200"></tbody>
    </table>
  </div>

  <!-- Vendor Create/Edit Modal -->
  <div id="vendor-modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
      <h2 class="text-2xl font-bold text-slate-900 mb-4" id="modal-title">Add Vendor</h2>
      <form id="vendor-form" class="space-y-4">
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-1 block">Vendor Name *</label>
          <input type="text" id="v-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-slate-700 mb-1 block">Email</label>
            <input type="email" id="v-email" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none" />
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-700 mb-1 block">Phone</label>
            <input type="tel" id="v-phone" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none" />
          </div>
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-1 block">Address</label>
          <input type="text" id="v-address" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none" />
        </div>
        <div>
          <label class="text-sm font-semibold text-slate-700 mb-2 block">Payment Methods</label>
          <div class="flex gap-4">
            <label class="flex items-center gap-2"><input type="checkbox" id="pm-ach" /> ACH</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="pm-check" checked /> Check</label>
            <label class="flex items-center gap-2"><input type="checkbox" id="pm-cc" /> Credit Card</label>
          </div>
        </div>
        <div id="ach-fields" class="hidden grid grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-semibold text-slate-700 mb-1 block">ACH Routing #</label>
            <input type="text" id="v-routing" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none" />
          </div>
          <div>
            <label class="text-sm font-semibold text-slate-700 mb-1 block">ACH Account #</label>
            <input type="text" id="v-account" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-navy-600 outline-none" />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="v-w9" />
          <label for="v-w9" class="text-sm text-slate-700">W9 on file</label>
        </div>
        <div class="flex gap-2 pt-4">
          <button type="button" onclick="closeModal()" class="flex-1 px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50">Cancel</button>
          <button type="submit" class="flex-1 px-4 py-2 bg-navy-900 text-white rounded-lg hover:bg-navy-800">Save Vendor</button>
        </div>
      </form>
    </div>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
let allVendors = [];
let editingVendorId = null;

EIMEShell.mount({
  activeNav: 'vendors',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'vendors',
      payload: { church_id: 'holy_comforter' }
    });
    loadVendors();
    setupForm();
  }
});

async function loadVendors() {
  try {
    const res = await fetch(`${API}/api/churches/holy_comforter/vendors`);
    allVendors = await res.json();
    renderVendors(allVendors);
    updateCounts();
  } catch (e) {
    console.error('Error loading vendors:', e);
    document.getElementById('vendors-list').innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-slate-500">No vendors found. Click "Add Vendor" to get started.</td></tr>';
  }
}

function updateCounts() {
  document.getElementById('count-total').textContent = allVendors.length;
  document.getElementById('count-ach').textContent = allVendors.filter(v => v.payment_methods?.includes('ACH')).length;
  document.getElementById('count-w9').textContent = allVendors.filter(v => v.w9_on_file).length;
  document.getElementById('count-flagged').textContent = allVendors.filter(v => v.flagged).length;
}

function renderVendors(vendors) {
  const list = document.getElementById('vendors-list');
  if (vendors.length === 0) {
    list.innerHTML = '<tr><td colspan="5" class="px-6 py-12 text-center text-slate-500">No vendors found</td></tr>';
    return;
  }
  list.innerHTML = vendors.map(v => `
    <tr class="hover:bg-slate-50 cursor-pointer" onclick="editVendor('${v.vendor_id}')">
      <td class="px-6 py-4">
        <p class="font-medium text-slate-900">${v.name || 'Unknown'}</p>
        <p class="text-xs text-slate-500">${v.email || 'No email'}</p>
      </td>
      <td class="px-6 py-4">
        <div class="flex gap-1">
          ${(v.payment_methods || ['CHECK']).map(pm => `<span class="px-2 py-0.5 bg-slate-100 text-slate-700 rounded text-xs font-medium">${pm}</span>`).join('')}
        </div>
      </td>
      <td class="px-6 py-4">
        ${v.w9_on_file ? '<span class="text-green-600">✓ On File</span>' : '<span class="text-slate-400">Missing</span>'}
      </td>
      <td class="px-6 py-4">
        ${v.flagged ? '<span class="px-2 py-0.5 bg-orange-100 text-orange-800 rounded text-xs">⚠ Flagged</span>' : '<span class="px-2 py-0.5 bg-green-100 text-green-800 rounded text-xs">Active</span>'}
      </td>
      <td class="px-6 py-4 text-right">
        <button onclick="event.stopPropagation(); deleteVendor('${v.vendor_id}')" class="text-red-600 hover:text-red-800 text-sm">Delete</button>
      </td>
    </tr>
  `).join('');
}

function filterVendors() {
  const q = document.getElementById('vendor-search').value.toLowerCase();
  const filtered = allVendors.filter(v => 
    (v.name || '').toLowerCase().includes(q) || 
    (v.email || '').toLowerCase().includes(q)
  );
  renderVendors(filtered);
}

function openCreateModal() {
  editingVendorId = null;
  document.getElementById('modal-title').textContent = 'Add Vendor';
  document.getElementById('vendor-form').reset();
  document.getElementById('vendor-modal').classList.remove('hidden');
}

function editVendor(vendorId) {
  const v = allVendors.find(x => x.vendor_id === vendorId);
  if (!v) return;
  editingVendorId = vendorId;
  document.getElementById('modal-title').textContent = 'Edit Vendor';
  document.getElementById('v-name').value = v.name || '';
  document.getElementById('v-email').value = v.email || '';
  document.getElementById('v-phone').value = v.phone || '';
  document.getElementById('v-address').value = v.address || '';
  document.getElementById('pm-ach').checked = v.payment_methods?.includes('ACH') || false;
  document.getElementById('pm-check').checked = v.payment_methods?.includes('CHECK') || false;
  document.getElementById('pm-cc').checked = v.payment_methods?.includes('CC') || false;
  document.getElementById('v-routing').value = v.ach_routing || '';
  document.getElementById('v-w9').checked = v.w9_on_file || false;
  toggleAchFields();
  document.getElementById('vendor-modal').classList.remove('hidden');
}

async function deleteVendor(vendorId) {
  if (!confirm('Delete this vendor?')) return;
  try {
    await fetch(`${API}/api/churches/holy_comforter/vendors/${vendorId}`, { method: 'DELETE' });
    loadVendors();
  } catch (e) {
    alert('Error deleting vendor: ' + e.message);
  }
}

function closeModal() {
  document.getElementById('vendor-modal').classList.add('hidden');
}

function toggleAchFields() {
  const achChecked = document.getElementById('pm-ach').checked;
  document.getElementById('ach-fields').classList.toggle('hidden', !achChecked);
}

function setupForm() {
  document.getElementById('pm-ach').addEventListener('change', toggleAchFields);
  
  document.getElementById('vendor-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const methods = [];
    if (document.getElementById('pm-ach').checked) methods.push('ACH');
    if (document.getElementById('pm-check').checked) methods.push('CHECK');
    if (document.getElementById('pm-cc').checked) methods.push('CC');
    
    const data = {
      name: document.getElementById('v-name').value,
      email: document.getElementById('v-email').value,
      phone: document.getElementById('v-phone').value,
      address: document.getElementById('v-address').value,
      payment_methods: methods,
      ach_routing: document.getElementById('v-routing').value,
      ach_account: document.getElementById('v-account').value,
      w9_on_file: document.getElementById('v-w9').checked
    };
    
    try {
      const url = editingVendorId 
        ? `${API}/api/churches/holy_comforter/vendors/${editingVendorId}`
        : `${API}/api/churches/holy_comforter/vendors`;
      const method = editingVendorId ? 'PUT' : 'POST';
      
      await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      closeModal();
      loadVendors();
    } catch (e) {
      alert('Error saving vendor: ' + e.message);
    }
  });
}
</script>

</body>
</html>
