<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Decision Ledger — Books</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <template id="page-center-content">
        <div class="p-6 max-w-7xl mx-auto">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Decision Ledger</h1>
                <p class="text-gray-600">Why the system believes what it believes: reasoning, evidence, confidence, and alternatives for every non-trivial decision</p>
            </div>

            <!-- Filters -->
            <div class="bg-white rounded-lg shadow-sm p-4 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Decision Category</label>
                        <select id="filterCategory" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Categories</option>
                            <option value="recognize">Revenue Recognition</option>
                            <option value="code">GL Coding</option>
                            <option value="route">Approval Routing</option>
                            <option value="approve">Approval Decision</option>
                            <option value="override">Override</option>
                            <option value="disavow">Disavow</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Time Period</label>
                        <select id="filterPeriod" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Time</option>
                            <option value="7d">Last 7 Days</option>
                            <option value="30d">Last 30 Days</option>
                            <option value="90d">Last 90 Days</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confidence Level</label>
                        <select id="filterConfidence" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Confidence</option>
                            <option value="high">High (90%+)</option>
                            <option value="medium">Medium (70-90%)</option>
                            <option value="low">Low (<70%)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Has Override</label>
                        <select id="filterOverride" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="">All Decisions</option>
                            <option value="true">Human Overridden</option>
                            <option value="false">System Accepted</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4 flex gap-2">
                    <button id="btnFilter" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">
                        Filter
                    </button>
                    <button id="btnClear" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-400">
                        Clear
                    </button>
                </div>
            </div>

            <!-- Decisions List -->
            <div class="bg-white rounded-lg shadow-sm overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-200">
                    <h2 class="text-lg font-semibold text-gray-900">Decision History</h2>
                </div>
                <div id="decisionsList" class="divide-y divide-gray-200">
                    <div class="p-6 text-center text-gray-500">Loading decisions...</div>
                </div>
            </div>
        </div>

        <!-- Decision Detail Modal -->
        <div id="decisionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-lg max-w-3xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 id="modalTitle" class="text-xl font-bold text-gray-900">Decision Details</h2>
                    <button onclick="closeDecisionModal()" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="p-6 space-y-6">
                    <!-- Decision Summary -->
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Decision Summary</h3>
                        <div id="decisionSummary" class="bg-gray-50 p-4 rounded-lg space-y-2"></div>
                    </div>

                    <!-- Reasoning -->
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Reasoning</h3>
                        <div id="reasoning" class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-gray-900"></div>
                    </div>

                    <!-- Evidence -->
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Evidence</h3>
                        <div id="evidence" class="space-y-2"></div>
                    </div>

                    <!-- Citation Chain (Phase 6) -->
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Citation Chain</h3>
                        <div id="citationChain" class="space-y-2 text-sm">
                            <p class="text-gray-500">Events this decision cited as evidence</p>
                        </div>
                    </div>

                    <!-- Confidence & Alternatives -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 mb-3">Confidence</h3>
                            <div class="bg-gray-50 p-4 rounded-lg">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="text-sm font-medium text-gray-600">System Confidence</span>
                                    <span id="confidenceScore" class="text-xl font-bold text-blue-600">-</span>
                                </div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div id="confidenceBar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 mb-3">Model Info</h3>
                            <div class="bg-gray-50 p-4 rounded-lg space-y-1 text-sm">
                                <p><strong>Model:</strong> <span id="modelVersion">-</span></p>
                                <p><strong>Agent:</strong> <span id="agentName">-</span></p>
                                <p><strong>Timestamp:</strong> <span id="decisionTime">-</span></p>
                            </div>
                        </div>
                    </div>

                    <!-- Alternatives Considered -->
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Alternatives Considered</h3>
                        <div id="alternatives" class="space-y-3"></div>
                    </div>

                    <!-- Human Override Information -->
                    <div id="overrideSection" class="hidden">
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Human Override</h3>
                        <div class="bg-amber-50 border border-amber-200 rounded-lg p-4">
                            <p class="text-sm"><strong>Overridden By:</strong> <span id="overriddenBy">-</span></p>
                            <p class="text-sm"><strong>Reason:</strong> <span id="overrideReason">-</span></p>
                            <p class="text-sm"><strong>Timestamp:</strong> <span id="overrideTime">-</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="eime-bus.js"></script>
    <script src="eime-shell.js"></script>
    <script src="eime-chat-rail.js"></script>
    <script>
        let allDecisions = [];
        const CHURCH_ID = 'holy_comforter';

        const categoryColors = {
            recognize: 'bg-purple-100 text-purple-800',
            code: 'bg-blue-100 text-blue-800',
            route: 'bg-green-100 text-green-800',
            approve: 'bg-amber-100 text-amber-800',
            override: 'bg-red-100 text-red-800',
            disavow: 'bg-gray-100 text-gray-800'
        };

        const categoryLabels = {
            recognize: 'Revenue Recognition',
            code: 'GL Coding',
            route: 'Approval Routing',
            approve: 'Approval Decision',
            override: 'Override',
            disavow: 'Disavow'
        };

        async function loadDecisions() {
            try {
                const response = await fetch(`/api/churches/${CHURCH_ID}/decision-ledger?limit=100`);
                const data = await response.json();
                allDecisions = data.entries || [];
                renderDecisions(allDecisions);
            } catch (error) {
                console.error('Error loading decisions:', error);
                document.getElementById('decisionsList').innerHTML =
                    '<div class="p-6 text-center text-red-500">Error loading decisions</div>';
            }
        }

        function renderDecisions(decisions) {
            const container = document.getElementById('decisionsList');
            if (decisions.length === 0) {
                container.innerHTML = '<div class="p-6 text-center text-gray-500">No decisions found</div>';
                return;
            }

            container.innerHTML = decisions.map(decision => {
                const confidence = decision.confidence || 0;
                const confidenceColor = confidence >= 0.9 ? 'bg-green-100 text-green-800' :
                                       confidence >= 0.7 ? 'bg-yellow-100 text-yellow-800' :
                                       'bg-red-100 text-red-800';

                return `
                    <div onclick="showDecisionDetail('${decision.decision_id}')" class="p-4 hover:bg-gray-50 cursor-pointer transition">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex items-center gap-3 flex-1">
                                <span class="px-2 py-1 rounded text-xs font-medium ${categoryColors[decision.category.value] || 'bg-gray-100 text-gray-800'}">
                                    ${categoryLabels[decision.category.value] || decision.category.value}
                                </span>
                                <div>
                                    <p class="font-semibold text-gray-900">${decision.outcome || 'Decision'}</p>
                                    <p class="text-xs text-gray-600">${new Date(decision.created_at).toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <span class="px-2 py-1 rounded text-xs font-medium ${confidenceColor}">
                                    ${(confidence * 100).toFixed(0)}%
                                </span>
                                ${decision.human_override ? '<p class="text-xs text-amber-600 font-medium mt-1">Overridden</p>' : ''}
                            </div>
                        </div>
                        <p class="text-sm text-gray-700 mb-2">${decision.reasoning || 'No reasoning provided'}</p>
                    </div>
                `;
            }).join('');
        }

        async function showDecisionDetail(decisionId) {
            const decision = allDecisions.find(d => d.decision_id === decisionId);
            if (!decision) return;

            document.getElementById('modalTitle').textContent = `Decision ${decisionId}`;

            // Summary
            const summaryHtml = `
                <div><strong>Category:</strong> ${categoryLabels[decision.category.value]}</div>
                <div><strong>Outcome:</strong> ${decision.outcome}</div>
                <div><strong>Created:</strong> ${new Date(decision.created_at).toLocaleString()}</div>
            `;
            document.getElementById('decisionSummary').innerHTML = summaryHtml;

            // Reasoning
            document.getElementById('reasoning').textContent = decision.reasoning || 'No reasoning provided';

            // Evidence
            const evidence = decision.evidence || [];
            const evidenceHtml = evidence.length > 0
                ? evidence.map(e => `<div class="bg-white p-3 rounded border border-gray-200"><strong>${e.type}:</strong> ${e.description}</div>`).join('')
                : '<div class="text-gray-500">No evidence recorded</div>';
            document.getElementById('evidence').innerHTML = evidenceHtml;

            // Citation Chain (Phase 6)
            const citedEventIds = decision.cited_event_ids || decision.evidence_refs || [];
            const citationHtml = citedEventIds.length > 0
                ? citedEventIds.map(eventId => `
                    <div class="bg-white p-3 rounded border border-blue-200 hover:bg-blue-50 cursor-pointer transition"
                         onclick="showEventDetail('${eventId}')">
                        <div class="flex items-center justify-between">
                            <span class="font-mono text-sm text-blue-600">${eventId.substring(0, 8)}...</span>
                            <span class="text-xs text-gray-500">Click to view event</span>
                        </div>
                    </div>
                `).join('')
                : '<div class="text-gray-500">No events cited</div>';
            document.getElementById('citationChain').innerHTML = citationHtml;

            // Confidence
            const confidence = decision.confidence || 0;
            document.getElementById('confidenceScore').textContent = `${(confidence * 100).toFixed(0)}%`;
            document.getElementById('confidenceBar').style.width = `${confidence * 100}%`;

            // Model Info
            document.getElementById('modelVersion').textContent = decision.model_version || 'v1.0';
            document.getElementById('agentName').textContent = decision.agent_name || 'classifier';
            document.getElementById('decisionTime').textContent = new Date(decision.created_at).toLocaleString();

            // Alternatives
            const alternatives = decision.alternatives || [];
            const alternativesHtml = alternatives.length > 0
                ? alternatives.map(alt => `
                    <div class="border border-gray-200 rounded p-3">
                        <p class="font-medium text-gray-900">${alt.option}</p>
                        <p class="text-sm text-gray-600 mt-1">Confidence: ${(alt.confidence * 100).toFixed(0)}%</p>
                        <p class="text-sm text-gray-700 mt-1">${alt.rationale}</p>
                    </div>
                `).join('')
                : '<div class="text-gray-500">No alternatives considered</div>';
            document.getElementById('alternatives').innerHTML = alternativesHtml;

            // Override Information
            const overrideSection = document.getElementById('overrideSection');
            if (decision.human_override) {
                document.getElementById('overriddenBy').textContent = decision.override_by_user || 'Unknown';
                document.getElementById('overrideReason').textContent = decision.override_reason || 'Not provided';
                document.getElementById('overrideTime').textContent = new Date(decision.override_at).toLocaleString();
                overrideSection.classList.remove('hidden');
            } else {
                overrideSection.classList.add('hidden');
            }

            document.getElementById('decisionModal').classList.remove('hidden');
        }

        function closeDecisionModal() {
            document.getElementById('decisionModal').classList.add('hidden');
        }

        async function showEventDetail(eventId) {
            try {
                const response = await fetch(`/api/churches/${CHURCH_ID}/events/${eventId}`);
                if (!response.ok) {
                    alert(`Event ${eventId} not found`);
                    return;
                }
                const event = await response.json();

                // Show event in an alert for now (Phase 6: minimal implementation)
                const eventInfo = `
Event ID: ${event.event_id || eventId}
Type: ${event.event_type || '—'}
Occurred: ${new Date(event.occurred_at).toLocaleString()}
Actor: ${event.actor || 'system'}

Payload:
${JSON.stringify(event.payload, null, 2)}

Tags: ${(event.tags || []).map(t => `${t.tag_kind}=${t.tag_value}`).join(', ') || 'none'}
                `.trim();

                alert(eventInfo);
            } catch (error) {
                console.error('Error loading event:', error);
                alert(`Failed to load event ${eventId}`);
            }
        }

        document.getElementById('btnFilter').addEventListener('click', () => {
            const category = document.getElementById('filterCategory').value;
            const filtered = allDecisions.filter(d => {
                if (category && d.category.value !== category) return false;
                return true;
            });
            renderDecisions(filtered);
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterPeriod').value = '';
            document.getElementById('filterConfidence').value = '';
            document.getElementById('filterOverride').value = '';
            renderDecisions(allDecisions);
        });

        async function onMounted() {
            await loadDecisions();
            eime.setContext({
                page: 'decision-ledger',
                payload: { churchId: CHURCH_ID }
            });
        }

        EIMEShell.mount({
            onMounted: onMounted,
            navAttribute: 'data-nav'
        });
    </script>
</body>
</html>
