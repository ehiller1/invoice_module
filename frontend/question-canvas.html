<!DOCTYPE html>
<html>
<head>
<title>EIME — Question Canvas</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: { 900: '#0f1f3d', 800: '#162952', 700: '#1e3a6e', 600: '#2d5399' },
          gold: { 500: '#c9a227', 400: '#d4ad3a', 300: '#e0c46a' },
        },
        fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
      }
    }
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="/eime-bus.js"></script>
<script src="/eime-shell.js"></script>
<script src="/eime-chat-rail.js"></script>
<script src="/components/card-renderer.js"></script>
</head>
<body>

<template id="page-center-content">
<div class="max-w-5xl mx-auto p-6">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">❓ Ask Anything</h1>
    <p class="text-slate-600">Type a question about your church's money &mdash; cash, giving, budget, projections, or donor restrictions. We'll figure out where to look and give you a real answer.</p>
  </div>

  <!-- Query Input -->
  <div class="bg-white rounded-lg border border-slate-200 p-6 mb-8">
    <label class="text-sm font-semibold text-slate-700 block mb-3">Your Question</label>
    <div class="flex gap-4">
      <input type="text" id="query-input" placeholder="e.g., 'What happens to cash if pledges drop 20%?' or 'Are any restricted funds being used outside their purpose?'"
        class="flex-1 px-4 py-3 border border-slate-300 rounded-lg text-base"
        onkeypress="if(event.key==='Enter') submitQuestion()" />
      <button onclick="submitQuestion()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium whitespace-nowrap">
        Ask
      </button>
    </div>
  </div>

  <!-- Example Intents (Phase 4) -->
  <div class="bg-slate-50 rounded-lg border border-slate-200 p-6 mb-8">
    <p class="text-sm font-semibold text-slate-900 mb-4">💡 Example Questions (15 default intents)</p>
    <div class="grid grid-cols-2 gap-3">
      <button onclick="useExample('What is our all-in program cost per unit of impact?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        💰 All-in program cost
      </button>
      <button onclick="useExample('What is our projected cash position for Q4 assuming 95% pledge fulfillment?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        📊 Pledge fulfillment projection
      </button>
      <button onclick="useExample('Show a 5-year projection under conservative, base, and growth scenarios')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        📈 Multi-year scenarios
      </button>
      <button onclick="useExample('Trace this $100K gift from donor intent to actual use')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        🎁 Gift trace to use
      </button>
      <button onclick="useExample('Which restricted funds have drifted from original intent?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        🔀 Mission drift analysis
      </button>
      <button onclick="useExample('Are we tracking toward covenant violations?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        ⚠️ Covenant gap analysis
      </button>
      <button onclick="useExample('How do we compare to peer organizations on financial health?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        📍 Peer benchmarking
      </button>
      <button onclick="useExample('Why did facilities spending spike 40%?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        🔍 Variance deep dive
      </button>
      <button onclick="useExample('Which underperforming funds could be reallocated?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        ↔️ Fund reallocation
      </button>
      <button onclick="useExample('What are our typical Q4 cash flow patterns?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        📅 Seasonality forecast
      </button>
      <button onclick="useExample('Show me the key metrics I need for next board meeting')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        📋 CFO dashboard
      </button>
      <button onclick="useExample('Which donors are at risk of lapsing?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        💔 Donor risk profile
      </button>
      <button onclick="useExample('Why are we 12% over on program expenses?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        💸 Budget variance attribution
      </button>
      <button onclick="useExample('Can we afford the proposed salary increases?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        👥 Headcount projection
      </button>
      <button onclick="useExample('What if pledge revenue drops 20%?')" class="text-xs text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 transition-colors text-slate-700">
        📉 Stress test
      </button>
    </div>
  </div>

  <!-- Query Results -->
  <div id="results" class="hidden space-y-6">
    <!-- Intent Classification -->
    <div class="bg-blue-50 rounded-lg border border-blue-200 p-4">
      <p class="text-sm text-blue-900">
        <strong>Intent Classified:</strong> <span id="intent-display"></span>
        <span id="confidence-display" class="text-xs text-blue-800 ml-2"></span>
      </p>
    </div>

    <!-- Answer Section (Phase 5) -->
    <div class="bg-white rounded-lg border border-slate-200 p-6">
      <h2 class="text-lg font-bold text-slate-900 mb-4">Answer</h2>
      <div id="answer-display" class="text-slate-700 mb-4">
        <p class="text-sm italic text-slate-600">Loading answer... (Phase 5: Claude API integration)</p>
      </div>

      <!-- Provenance Footer -->
      <div class="border-t border-slate-200 pt-4 mt-4">
        <p class="text-xs font-semibold text-slate-700 mb-2">📎 Provenance</p>
        <div id="provenance-display" class="text-xs text-slate-600 space-y-1">
          <p>Evidence trace will appear here (Phase 5)</p>
        </div>
      </div>
    </div>

    <!-- Follow-On Suggestions -->
    <div class="bg-slate-50 rounded-lg border border-slate-200 p-4">
      <p class="text-sm font-semibold text-slate-900 mb-3">💡 Follow-On Suggestions</p>
      <div id="follow-ons" class="space-y-2"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div id="empty-state" class="text-center py-12">
    <p class="text-slate-600 text-lg">Ask a question to get started</p>
  </div>
</div>
</template>

<script>
const API = (window.EIME_API ?? '');
const CHURCH_ID = 'holy_comforter';
let currentUserTier = 2;
let queryHistory = [];

EIMEShell.mount({
  activeNav: 'question-canvas',
  pageTitle: 'Question Canvas',
  centerContent: document.getElementById('page-center-content').innerHTML,
  onMounted() {
    window.eime.setContext({
      page: 'question-canvas',
      payload: { church_id: CHURCH_ID }
    });
  }
});

function useExample(exampleQuery) {
  document.getElementById('query-input').value = exampleQuery;
  submitQuestion();
}

/**
 * Submit question to intent router (Phase 4).
 */
async function submitQuestion() {
  const query = document.getElementById('query-input').value.trim();
  if (!query) {
    alert('Please enter a question');
    return;
  }

  try {
    // Step 1: Route to intent
    const routeRes = await fetch(`${API}/api/intents/route`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, church_id: CHURCH_ID })
    });

    if (!routeRes.ok) throw new Error(`Intent routing failed: ${routeRes.status}`);
    const routeData = await routeRes.json();

    // Step 2: Get answer (Phase 4 placeholder; Phase 5 will be real)
    const answerRes = await fetch(`${API}/api/intents/answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query,
        intent: routeData.intent,
        church_id: CHURCH_ID
      })
    });

    if (!answerRes.ok) throw new Error(`Answer generation failed: ${answerRes.status}`);
    const answerData = await answerRes.json();

    // Display results
    renderResults(routeData, answerData);
    queryHistory.push({ query, intent: routeData.intent, timestamp: new Date() });

  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function renderResults(routeData, answerData) {
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  // Intent display
  const intentName = routeData.intent.replace(/_/g, ' ').toUpperCase();
  document.getElementById('intent-display').textContent = intentName;
  document.getElementById('confidence-display').textContent = `(${(routeData.confidence * 100).toFixed(0)}% confidence)`;

  // Answer display (Phase 4: template; Phase 5: Claude API)
  document.getElementById('answer-display').innerHTML = `
    <div class="bg-blue-50 border-l-4 border-blue-400 p-4">
      <p class="text-sm text-blue-900">
        <strong>Phase 4 Preview:</strong> ${answerData.answer}
      </p>
      <p class="text-xs text-blue-800 mt-2">Phase 5 will integrate Claude API for natural language answers with real data projections.</p>
    </div>
  `;

  // Provenance
  const provenanceHtml = answerData.provenance && answerData.provenance.length > 0 ?
    answerData.provenance.map(p => `<p>📊 ${p}</p>`).join('') :
    '<p class="text-slate-500">Provenance trace coming in Phase 5 (decision ledger links)</p>';
  document.getElementById('provenance-display').innerHTML = provenanceHtml;

  // Follow-ons
  const followOnsHtml = answerData.follow_ons.map(s =>
    `<button onclick="useExample('${s.replace(/'/g, "\\'")}')" class="block w-full text-left px-3 py-2 bg-white border border-slate-300 rounded hover:bg-blue-50 text-sm text-slate-700 transition-colors">
      → ${s}
    </button>`
  ).join('');
  document.getElementById('follow-ons').innerHTML = followOnsHtml;

  window.scrollTo(0, document.getElementById('results').offsetTop);
}

function formatDate(dateStr) {
  const date = new Date(dateStr);
  const now = new Date();
  const diff = now - date;
  const hours = Math.floor(diff / 3600000);
  if (hours < 1) return 'Just now';
  if (hours < 24) return `${hours}h ago`;
  return date.toLocaleDateString();
}
</script>

</body>
</html>
