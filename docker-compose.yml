version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eime-postgres
    environment:
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: claude_dev
      POSTGRES_DB: eime_accounting
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
